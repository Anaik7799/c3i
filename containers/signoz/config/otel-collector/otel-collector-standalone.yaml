# OTEL Collector Configuration - Standalone Mode
# For use in unified observability container
# SOPv5.11 Compliance: SC-OBS-071
# Note: Using standard otelcol (not contrib), so clickhouse exporter unavailable

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  # Prometheus metrics endpoint (for Grafana to scrape)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: indrajaal
    const_labels:
      source: otel-collector

  # Debug output (replaces deprecated logging exporter)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

  # File exporter for traces/logs (since clickhouse unavailable in standard otelcol)
  file:
    path: /var/log/otel-traces.json
    rotation:
      max_megabytes: 100
      max_days: 3
      max_backups: 3

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [file, debug]

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
