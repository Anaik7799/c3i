# Redis Demo Configuration
# Production-ready settings for demo environment

# Network and Security
bind 0.0.0.0
port 6379
protected-mode no
timeout 0
tcp-keepalive 300

# General
databases 16
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile ""

# Memory Management
maxmemory-policy allkeys-lru

# Performance
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Disable dangerous commands (demo safety)
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG "CONFIG_DEMO_ONLY"

# Enable persistence for demo data
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Append only file settings
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec