# SC-SCRIPT-GLEAM-001 cross-compilation linker hints.
#
# Used by `scripts/tools/build_nif_cross` when building for Raspberry Pi
# (aarch64). Assumes the operator has installed either:
#
#   1. `sudo apt install gcc-aarch64-linux-gnu`
#      + `rustup target add aarch64-unknown-linux-gnu`
#   2. Nix: add `pkgs.pkgsCross.aarch64-multiplatform.stdenv.cc` to the dev shell
#   3. Docker: run `cross build --target aarch64-unknown-linux-gnu --release`
#
# The NIF loader (`src/scripts_nif.erl`) picks the correct .so per-host at
# load time, keyed off `erlang:system_info(system_architecture)`.

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-musl-gcc"
