version: '3.8'

# SigNoz Observability Stack - Container Orchestration Configuration
# Policy Compliance: EXC-001 - All images from localhost/ registry
# Date: 2025-11-22
# SOPv5.11 STAMP Safety Integration

networks:
  signoz:
    driver: bridge
    name: signoz-network
    ipam:
      config:
        - subnet: 10.89.4.0/24
          gateway: 10.89.4.1

volumes:
  signoz-clickhouse-data:
    driver: local
  signoz-query-service-data:
    driver: local
  signoz-otel-collector-data:
    driver: local

services:
  # ClickHouse - OLAP Database for metrics and traces
  clickhouse:
    image: localhost/signoz-clickhouse:latest
    container_name: signoz-clickhouse
    hostname: clickhouse
    networks:
      signoz:
        ipv4_address: 10.89.4.10
    ports:
      - "9000:9000"     # Native protocol
      - "8123:8123"     # HTTP interface
    volumes:
      - signoz-clickhouse-data:/var/lib/clickhouse
      - ./config/clickhouse/clickhouse-config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./config/clickhouse/clickhouse-users.xml:/etc/clickhouse-server/users.d/logging.xml:ro
    environment:
      - CLICKHOUSE_DB=signoz
      - CLICKHOUSE_USER=signoz
      - CLICKHOUSE_PASSWORD=signoz
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    # Resource limits aligned with STAMP safety constraints
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # OTEL Collector - OpenTelemetry data ingestion
  otel-collector:
    image: localhost/signoz-otel-collector:latest
    container_name: signoz-otel-collector
    hostname: otel-collector
    networks:
      signoz:
        ipv4_address: 10.89.4.11
    ports:
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
      - "8888:8888"     # Prometheus metrics
      - "13133:13133"   # Health check
    volumes:
      - ./config/otel-collector/otel-collector-config.yaml:/etc/otel-collector/config.yaml:ro
      - signoz-otel-collector-data:/var/lib/otelcol
    command: ["--config=/etc/otel-collector/config.yaml"]
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=signoz-otel-collector
    healthcheck:
      test: ["NONE"]
      # Distroless image has no shell/wget/curl utilities
      # Health can be verified via the exposed port 13133 from host
      # Real monitoring should use external checks rather than exec-based healthchecks
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Query Service - API layer for data retrieval
  query-service:
    image: localhost/signoz-query-service:latest
    container_name: signoz-query-service
    hostname: query-service
    command: ["-config", "/root/config/config.yaml"]  # Override wrong default prometheus.yml
    extra_hosts:
      - "localhost:10.89.4.10"  # Map localhost to ClickHouse static IP
    networks:
      signoz:
        ipv4_address: 10.89.4.12
    ports:
      - "8080:8080"     # HTTP API
    volumes:
      - signoz-query-service-data:/var/lib/signoz
      - ./config/query-service/config.yaml:/root/config/config.yaml:ro
    environment:
      - ClickHouseUrl=tcp://signoz:signoz@localhost:9000/?database=signoz
      - STORAGE=clickhouse
      - TELEMETRY_ENABLED=true
      - DEPLOYMENT_TYPE=docker-standalone
      - SIGNOZ_LOCAL_DB_PATH=/var/lib/signoz/signoz.db
      - ALERTMANAGER_API_PREFIX=http://alertmanager:9093/api/
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_started  # No healthcheck available (distroless image)
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend - Web UI
  frontend:
    image: localhost/signoz-frontend:latest
    container_name: signoz-frontend
    hostname: frontend
    networks:
      signoz:
        ipv4_address: 10.89.4.13
    ports:
      - "3301:3301"     # Frontend UI
    environment:
      - FRONTEND_API_ENDPOINT=http://query-service:8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3301/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      query-service:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
