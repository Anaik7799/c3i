# OpenTelemetry Collector Configuration for Fractal Logging System
# Version: 5.10.0 | STAMP Compliant
#
# Receives logs, traces, and metrics from Indrajaal/CEPAF applications
# Routes based on fractal level (L1-L5) to appropriate backends
#
# Usage:
#   Mount this file to /etc/otel/config.yaml in the fractal-obs container

receivers:
  # OTLP gRPC receiver (primary)
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:*"
            - "http://127.0.0.1:*"

  # Prometheus scraping for app metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: 'indrajaal-app'
          scrape_interval: 15s
          static_configs:
            - targets: ['fractal-app:4000']
              labels:
                service: 'indrajaal'
                fractal_level: 'L3'

        - job_name: 'cepaf-bridge'
          scrape_interval: 15s
          static_configs:
            - targets: ['fractal-bridge:9876']
              labels:
                service: 'cepaf'
                fractal_level: 'L3'

processors:
  # Batch processor for efficiency
  batch:
    timeout: 10ms
    send_batch_size: 100
    send_batch_max_size: 1000

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

  # Resource detection for automatic metadata
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

  # Attribute processor for fractal level routing
  attributes:
    actions:
      # Extract fractal level from log attributes
      - key: fractal_level
        action: upsert
        value: "L3"  # Default if not specified

      # Add deployment metadata
      - key: deployment.environment
        action: insert
        value: "standalone"

  # Filter processor for level-based routing
  filter/l1l2:
    logs:
      include:
        match_type: regexp
        resource_attributes:
          - key: fractal_level
            value: "^(L1|L2)$"

  filter/l3l4:
    logs:
      include:
        match_type: regexp
        resource_attributes:
          - key: fractal_level
            value: "^(L3|L4)$"

  filter/l5:
    logs:
      include:
        match_type: regexp
        resource_attributes:
          - key: fractal_level
            value: "^L5$"

  # Transform processor for HLC timestamp handling
  transform:
    log_statements:
      - context: log
        statements:
          # Preserve HLC timestamp in attributes
          - set(attributes["hlc.physical"], observed_time_unix_nano)
          - set(attributes["hlc.node"], resource.attributes["host.name"])

exporters:
  # Debug exporter for development
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 100

  # Note: debug exporter (stdout) is already defined above
  # Removed deprecated logging exporter - use debug instead

  # OTLP exporter to external SigNoz (if configured)
  otlp/signoz:
    endpoint: "${SIGNOZ_ENDPOINT:-localhost:4317}"
    tls:
      insecure: true
    headers:
      signoz-access-token: "${SIGNOZ_ACCESS_TOKEN:-}"

  # Prometheus exporter for metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    const_labels:
      service: indrajaal-fractal
      version: "5.10.0"
    namespace: fractal
    send_timestamps: true
    metric_expiration: 180m

  # File exporter for L4/L5 persistence (WAL-style)
  file/l4l5:
    path: /var/lib/otel/fractal-l4l5.jsonl
    rotation:
      max_megabytes: 100
      max_days: 30
      max_backups: 10

  # File exporter for L1/L2 ephemeral
  file/l1l2:
    path: /var/lib/otel/fractal-l1l2.jsonl
    rotation:
      max_megabytes: 10
      max_days: 1
      max_backups: 2

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133
    path: /health
    tls:
      insecure: true

  # pprof extension for profiling
  pprof:
    endpoint: 0.0.0.0:1777

  # zpages for debugging
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    # Traces pipeline
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resourcedetection, attributes]
      exporters: [debug, otlp/signoz]

    # Metrics pipeline
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, resourcedetection]
      exporters: [prometheus, debug]

    # Logs pipeline - L1/L2 (ephemeral, low retention)
    logs/ephemeral:
      receivers: [otlp]
      processors: [memory_limiter, filter/l1l2, batch]
      exporters: [file/l1l2, debug]

    # Logs pipeline - L3/L4 (persistent, medium retention)
    logs/persistent:
      receivers: [otlp]
      processors: [memory_limiter, filter/l3l4, batch, resourcedetection, attributes, transform]
      exporters: [file/l4l5, otlp/signoz, debug]

    # Logs pipeline - L5 (cognitive, long retention)
    logs/cognitive:
      receivers: [otlp]
      processors: [memory_limiter, filter/l5, batch, resourcedetection, attributes, transform]
      exporters: [file/l4l5, otlp/signoz, debug]

  telemetry:
    logs:
      level: info
      development: false
      encoding: json
      disable_caller: true
      disable_stacktrace: true
      output_paths: [stdout]
      error_output_paths: [stderr]

    metrics:
      level: detailed
      address: 0.0.0.0:8888

