# podman-compose-verification-phase2.yml
# PHASE 2: Dual App Cluster Verification with Directed Telescope
# Purpose: Verify SC-FIX-006/006b in 2-node cluster mode
# Logging: Full Quadplex + 7-Level Directed Telescope
# STAMP: SC-FIX-006, SC-FIX-006b, SC-FUNC-001, SC-BIO-001

version: '3.8'

networks:
  indrajaal-cluster-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.33.0.0/16
          gateway: 172.33.0.1

services:
  # =============================================================================
  # DATABASE (172.33.0.20)
  # =============================================================================
  indrajaal-db-cluster:
    image: localhost/indrajaal-timescaledb-demo:nixos-devenv
    container_name: indrajaal-db-cluster
    hostname: db.cluster.indrajaal
    networks:
      indrajaal-cluster-mesh:
        ipv4_address: 172.33.0.20
    environment:
      POSTGRES_DB: indrajaal_cluster
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGPORT: "5433"
      TS_TUNE_MEMORY: 2GB
      TS_TUNE_NUM_CPUS: 2
      PGDATA: /var/lib/postgresql/pgdata
    ports:
      - "5435:5433"
    volumes:
      - cluster_db_data:/var/lib/postgresql/pgdata:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indrajaal_cluster -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    restart: unless-stopped

  # =============================================================================
  # OBSERVABILITY (172.33.0.30)
  # =============================================================================
  indrajaal-obs-cluster:
    image: localhost/indrajaal-obs-unified:nixos-devenv
    container_name: indrajaal-obs-cluster
    hostname: obs.cluster.indrajaal
    networks:
      indrajaal-cluster-mesh:
        ipv4_address: 172.33.0.30
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
      GRAFANA_ADMIN_PASSWORD: indrajaal
      GF_SECURITY_ADMIN_PASSWORD: indrajaal
    ports:
      - "4320:4317"
      - "4321:4318"
      - "9092:9090"
      - "3002:3000"
      - "3102:3100"
    volumes:
      - cluster_obs_data:/data:z
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # =============================================================================
  # ZENOH ROUTER (172.33.0.40)
  # =============================================================================
  zenoh-router-cluster:
    image: docker.io/eclipse/zenoh:1.0.0
    container_name: zenoh-cluster
    hostname: zenoh.cluster.indrajaal
    networks:
      indrajaal-cluster-mesh:
        ipv4_address: 172.33.0.40
    ports:
      - "7451:7447"
      - "8004:8000"
    environment:
      ZENOH_LOG: "debug"
    command: ["--no-multicast-scouting"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # APP NODE 1 (172.33.0.10) - Primary Node
  # DIRECTED TELESCOPE: All 7 levels enabled with debug logging
  # QUADPLEX LOGGING: Console + File + OTEL + Zenoh
  # =============================================================================
  app-node-1:
    image: localhost/indrajaal-app-unified:nixos-devenv
    # SC-NAME-001: Standardized app naming convention: indrajaal-ex-app-{N}
    container_name: indrajaal-ex-app-1
    hostname: app-1.cluster.indrajaal
    networks:
      indrajaal-cluster-mesh:
        ipv4_address: 172.33.0.10
    depends_on:
      indrajaal-db-cluster:
        condition: service_healthy
      indrajaal-obs-cluster:
        condition: service_started
      zenoh-router-cluster:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: ecto://postgres:postgres@db.cluster.indrajaal:5433/indrajaal_cluster
      POSTGRES_HOST: db.cluster.indrajaal
      POSTGRES_PORT: "5433"

      # Phoenix
      PHX_HOST: localhost
      PHX_PORT: "4000"
      SECRET_KEY_BASE: cluster_secret_key_base_64_chars_minimum_change_me_in_production

      # CLUSTERING ENABLED for Phase 2
      CLUSTERING_ENABLED: "true"
      RELEASE_NODE: indrajaal@app-1.cluster.indrajaal
      RELEASE_COOKIE: cluster_verify_cookie_sil6
      LIBCLUSTER_STRATEGY: dns
      LIBCLUSTER_DNS_QUERY: "app-1.cluster.indrajaal,app-2.cluster.indrajaal"

      # Prajna Cockpit
      PRAJNA_COCKPIT_ENABLED: "true"
      PRAJNA_DARK_MODE: "true"
      PRAJNA_AI_COPILOT_ENABLED: "true"

      # =======================================================================
      # DIRECTED TELESCOPE - 7-Level Fractal Logging
      # =======================================================================
      FRACTAL_LOGGING_ENABLED: "true"
      FRACTAL_LOG_LEVEL: debug
      FRACTAL_TELESCOPE_ENABLED: "true"
      FRACTAL_L1_FUNCTION: "true"
      FRACTAL_L1_LEVEL: debug
      FRACTAL_L2_COMPONENT: "true"
      FRACTAL_L2_LEVEL: debug
      FRACTAL_L3_HOLON: "true"
      FRACTAL_L3_LEVEL: debug
      FRACTAL_L4_CONTAINER: "true"
      FRACTAL_L4_LEVEL: debug
      FRACTAL_L5_NODE: "true"
      FRACTAL_L5_LEVEL: debug
      FRACTAL_L6_CLUSTER: "true"
      FRACTAL_L6_LEVEL: debug
      FRACTAL_L7_FEDERATION: "true"
      FRACTAL_L7_LEVEL: debug

      # =======================================================================
      # QUADPLEX LOGGING - 4 Output Channels
      # =======================================================================
      QUADPLEX_LOGGING: "true"
      QUADPLEX_CONSOLE: "true"
      QUADPLEX_CONSOLE_LEVEL: debug
      QUADPLEX_FILE: "true"
      QUADPLEX_FILE_LEVEL: debug
      QUADPLEX_LOG_PATH: /app/data/logs
      QUADPLEX_OTEL: "true"
      QUADPLEX_OTEL_LEVEL: debug
      QUADPLEX_ZENOH: "true"
      QUADPLEX_ZENOH_LEVEL: info
      QUADPLEX_ZENOH_TOPIC: indrajaal/logs/cluster/node-1

      # OBSERVABILITY
      OTEL_EXPORTER_OTLP_ENDPOINT: http://obs.cluster.indrajaal:4317
      OTEL_SERVICE_NAME: indrajaal-ex-app-1
      LOG_LEVEL: debug

      # ZENOH
      ZENOH_ENABLED: "true"
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh.cluster.indrajaal:7447
      ZENOH_MODE: client

      # NIF SKIP FLAGS
      SKIP_ZENOH_NIF: "1"
      SKIP_LINEAGE_NIF: "1"
      RUSTLER_SKIP_COMPILE: "true"

    volumes:
      - ../../../:/workspace:z
      - cluster_app1_data:/app/data:z
    working_dir: /workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health && redis-cli ping || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 30
      start_period: 1200s
    ports:
      - "4010:4000"
      - "4011:4001"
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '4'
    restart: unless-stopped

  # =============================================================================
  # APP NODE 2 (172.33.0.11) - Secondary Node
  # DIRECTED TELESCOPE: All 7 levels enabled with debug logging
  # QUADPLEX LOGGING: Console + File + OTEL + Zenoh
  # =============================================================================
  app-node-2:
    image: localhost/indrajaal-app-unified:nixos-devenv
    # SC-NAME-001: Standardized app naming convention: indrajaal-ex-app-{N}
    container_name: indrajaal-ex-app-2
    hostname: app-2.cluster.indrajaal
    networks:
      indrajaal-cluster-mesh:
        ipv4_address: 172.33.0.11
    depends_on:
      indrajaal-db-cluster:
        condition: service_healthy
      indrajaal-obs-cluster:
        condition: service_started
      zenoh-router-cluster:
        condition: service_healthy
      app-node-1:
        condition: service_started
    environment:
      # Database
      DATABASE_URL: ecto://postgres:postgres@db.cluster.indrajaal:5433/indrajaal_cluster
      POSTGRES_HOST: db.cluster.indrajaal
      POSTGRES_PORT: "5433"

      # Phoenix
      PHX_HOST: localhost
      PHX_PORT: "4000"
      SECRET_KEY_BASE: cluster_secret_key_base_64_chars_minimum_change_me_in_production

      # CLUSTERING ENABLED for Phase 2
      CLUSTERING_ENABLED: "true"
      RELEASE_NODE: indrajaal@app-2.cluster.indrajaal
      RELEASE_COOKIE: cluster_verify_cookie_sil6
      LIBCLUSTER_STRATEGY: dns
      LIBCLUSTER_DNS_QUERY: "app-1.cluster.indrajaal,app-2.cluster.indrajaal"

      # Prajna Cockpit
      PRAJNA_COCKPIT_ENABLED: "true"
      PRAJNA_DARK_MODE: "true"
      PRAJNA_AI_COPILOT_ENABLED: "true"

      # =======================================================================
      # DIRECTED TELESCOPE - 7-Level Fractal Logging
      # =======================================================================
      FRACTAL_LOGGING_ENABLED: "true"
      FRACTAL_LOG_LEVEL: debug
      FRACTAL_TELESCOPE_ENABLED: "true"
      FRACTAL_L1_FUNCTION: "true"
      FRACTAL_L1_LEVEL: debug
      FRACTAL_L2_COMPONENT: "true"
      FRACTAL_L2_LEVEL: debug
      FRACTAL_L3_HOLON: "true"
      FRACTAL_L3_LEVEL: debug
      FRACTAL_L4_CONTAINER: "true"
      FRACTAL_L4_LEVEL: debug
      FRACTAL_L5_NODE: "true"
      FRACTAL_L5_LEVEL: debug
      FRACTAL_L6_CLUSTER: "true"
      FRACTAL_L6_LEVEL: debug
      FRACTAL_L7_FEDERATION: "true"
      FRACTAL_L7_LEVEL: debug

      # =======================================================================
      # QUADPLEX LOGGING - 4 Output Channels
      # =======================================================================
      QUADPLEX_LOGGING: "true"
      QUADPLEX_CONSOLE: "true"
      QUADPLEX_CONSOLE_LEVEL: debug
      QUADPLEX_FILE: "true"
      QUADPLEX_FILE_LEVEL: debug
      QUADPLEX_LOG_PATH: /app/data/logs
      QUADPLEX_OTEL: "true"
      QUADPLEX_OTEL_LEVEL: debug
      QUADPLEX_ZENOH: "true"
      QUADPLEX_ZENOH_LEVEL: info
      QUADPLEX_ZENOH_TOPIC: indrajaal/logs/cluster/node-2

      # OBSERVABILITY
      OTEL_EXPORTER_OTLP_ENDPOINT: http://obs.cluster.indrajaal:4317
      OTEL_SERVICE_NAME: indrajaal-ex-app-2
      LOG_LEVEL: debug

      # ZENOH
      ZENOH_ENABLED: "true"
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh.cluster.indrajaal:7447
      ZENOH_MODE: client

      # NIF SKIP FLAGS
      SKIP_ZENOH_NIF: "1"
      SKIP_LINEAGE_NIF: "1"
      RUSTLER_SKIP_COMPILE: "true"

    volumes:
      - ../../../:/workspace:z
      - cluster_app2_data:/app/data:z
    working_dir: /workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health && redis-cli ping || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 30
      start_period: 1200s
    ports:
      - "4020:4000"
      - "4021:4001"
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '4'
    restart: unless-stopped

volumes:
  cluster_db_data:
  cluster_obs_data:
  cluster_app1_data:
  cluster_app2_data:
