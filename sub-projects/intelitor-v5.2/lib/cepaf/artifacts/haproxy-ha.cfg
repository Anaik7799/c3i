# HAProxy Configuration for Indrajaal HA Full Mesh
# SIL-6 Load Balancer with health checks and failover

global
    log stdout format raw local0
    maxconn 4096
    # Removed stats socket - not needed for containerized deployment
    stats timeout 30s

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option http-server-close
    option redispatch
    retries 3
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s
    timeout http-keep-alive 10s
    timeout queue 30s

# Stats page for monitoring
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
    stats auth admin:indrajaal

# Main Phoenix application frontend
frontend phoenix_frontend
    bind *:4000
    default_backend phoenix_backend

    # WebSocket support for LiveView
    acl is_websocket hdr(Upgrade) -i websocket
    use_backend phoenix_backend if is_websocket

# Health endpoint frontend (separate for monitoring)
frontend health_frontend
    bind *:4001
    default_backend health_backend

# Phoenix application backend - 3 nodes with round-robin
backend phoenix_backend
    balance roundrobin
    option httpchk GET /
    http-check expect status 200

    # Sticky sessions for LiveView (based on cookie)
    cookie SERVERID insert indirect nocache

    # 3 App nodes with health checks
    server app-1 app-1.indrajaal:4000 check inter 5s fall 3 rise 2 cookie app1
    server app-2 app-2.indrajaal:4000 check inter 5s fall 3 rise 2 cookie app2
    server app-3 app-3.indrajaal:4000 check inter 5s fall 3 rise 2 cookie app3

# Health backend - any healthy node
backend health_backend
    balance roundrobin
    option httpchk GET /

    server app-1 app-1.indrajaal:4000 check inter 5s fall 3 rise 2
    server app-2 app-2.indrajaal:4000 check inter 5s fall 3 rise 2
    server app-3 app-3.indrajaal:4000 check inter 5s fall 3 rise 2
