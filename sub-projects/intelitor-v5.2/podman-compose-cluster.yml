# CLUSTER Environment Topology
# Mode: CLUSTER
# Focus: Distributed Logic, Consensus, Gossip
# Compliance: SIL-6 Hardening

version: "3.9"

services:
  indrajaal-db:
    image: localhost/indrajaal-db:latest
    container_name: indrajaal-db
    environment:
      - NODE_ROLE=primary
      - POSTGRES_DB=indrajaal_cluster
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - fractal-mesh
    volumes:
      - cluster-db-data:/var/lib/postgresql/data

  indrajaal-obs:
    image: localhost/indrajaal-obs:latest
    container_name: indrajaal-obs
    ports:
      - "4317:4317"
      - "8080:8080"
    networks:
      - fractal-mesh
    volumes:
      - cluster-obs-data:/var/lib/signoz

  indrajaal-app-1:
    image: localhost/indrajaal-app:latest
    container_name: indrajaal-app-1
    environment:
      - NODE_NAME=app1@indrajaal-app-1
      - CLUSTER_SEED=true
      - DATABASE_URL=ecto://postgres:postgres@indrajaal-db:5432/indrajaal_cluster
      - PHX_PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      indrajaal-db:
        condition: service_healthy
    networks:
      - fractal-mesh
    volumes:
      - cluster-app1-data:/app/data

  indrajaal-app-2:
    image: localhost/indrajaal-app:latest
    container_name: indrajaal-app-2
    environment:
      - NODE_NAME=app2@indrajaal-app-2
      - CLUSTER_JOIN=app1@indrajaal-app-1
      - DATABASE_URL=ecto://postgres:postgres@indrajaal-db:5432/indrajaal_cluster
      - PHX_PORT=4001
    ports:
      - "4001:4000"
    depends_on:
      indrajaal-app-1:
        condition: service_started
    networks:
      - fractal-mesh
    volumes:
      - cluster-app2-data:/app/data

networks:
  fractal-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  cluster-db-data:
  cluster-obs-data:
  cluster-app1-data:
  cluster-app2-data: