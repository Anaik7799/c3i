# podman-compose-prod-standalone.yml
# Production-Equivalent Standalone Deployment - 3 Container Architecture
# WHAT: Consolidated mesh/tailscale/flame/clustering infrastructure
# WHY: Simplified deployment with integrated services
# CONSTRAINTS: Requires rootless Podman 5.4.1+, NixOS images
# SOPv5.11 Compliance: SC-CNT-009, SC-CNT-010, SC-CNT-012, SC-INF-001

version: '3.8'

networks:
  indrajaal-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

  indrajaal-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.29.0.0/16

services:
  # =============================================================================
  # DATA TIER - PostgreSQL + TimescaleDB
  # =============================================================================

  indrajaal-db-prod:
    image: localhost/indrajaal-timescaledb-demo:nixos-devenv
    container_name: indrajaal-db-prod
    hostname: indrajaal-db-prod
    networks:
      indrajaal-mesh:
        ipv4_address: 172.28.0.20
      indrajaal-internal:
    environment:
      POSTGRES_DB: indrajaal_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGPORT: "5433"
      TS_TUNE_MEMORY: 4GB
      TS_TUNE_NUM_CPUS: 4
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
      PGDATA: /var/lib/postgresql/pgdata
    ports:
      - "5433:5433"
    volumes:
      - db_prod_data:/var/lib/postgresql/pgdata:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indrajaal_prod -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: database
      environment: prod-standalone
      stamp.verified: "true"

  # =============================================================================
  # OBSERVABILITY TIER - OTEL + Prometheus + Grafana + Loki + SigNoz (Integrated)
  # =============================================================================

  indrajaal-obs-prod:
    image: localhost/indrajaal-obs-unified:nixos-devenv
    container_name: indrajaal-obs-prod
    hostname: indrajaal-obs-prod
    networks:
      indrajaal-mesh:
        ipv4_address: 172.28.0.30
    environment:
      # OpenTelemetry Collector
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
      OTEL_SERVICE_NAME: indrajaal-obs-prod
      LOG_LEVEL: info
      FRACTAL_LOGGING_ENABLED: "true"

      # Prometheus
      PROMETHEUS_RETENTION_TIME: 15d
      PROMETHEUS_RETENTION_SIZE: 10GB

      # Grafana
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: indrajaal
      GF_SERVER_HTTP_PORT: "3000"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning

      # Loki
      LOKI_RETENTION_PERIOD: 168h

      # SigNoz Configuration
      SIGNOZ_ENABLED: "true"
      SIGNOZ_QUERY_SERVICE_URL: http://localhost:8080
      SIGNOZ_FRONTEND_PORT: "3301"
      SIGNOZ_ALERT_MANAGER_PORT: "9093"

      # SigNoz ClickHouse (embedded)
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DATABASE: signoz_traces
      CLICKHOUSE_TRACES_TABLE: signoz_index_v2
      CLICKHOUSE_METRICS_TABLE: signoz_metrics
      CLICKHOUSE_LOGS_TABLE: signoz_logs

      # SigNoz Storage Settings
      SIGNOZ_RETENTION_PERIOD: 168h
      SIGNOZ_STORAGE_MAX_SIZE: 50GB
      SIGNOZ_SAMPLING_RATE: "1.0"

      # SigNoz Trace Settings
      SIGNOZ_TRACE_ENABLED: "true"
      SIGNOZ_METRICS_ENABLED: "true"
      SIGNOZ_LOGS_ENABLED: "true"

      # Integration flags
      UNIFIED_OBS_MODE: "true"
      SOPV51_COMPLIANT: "true"
    ports:
      # OTEL Collector
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # OTEL metrics
      # Prometheus
      - "9090:9090"
      # Grafana
      - "3000:3000"
      # Loki
      - "3100:3100"
      # SigNoz
      - "3301:3301"   # SigNoz Frontend
      - "8080:8080"   # SigNoz Query Service
      - "9093:9093"   # SigNoz Alert Manager
      # ClickHouse (SigNoz backend)
      - "8123:8123"   # ClickHouse HTTP
      - "9000:9000"   # ClickHouse Native
    volumes:
      - otel_prod_data:/var/log/otel:z
      - prometheus_prod_data:/prometheus:z
      - grafana_prod_data:/var/lib/grafana:z
      - loki_prod_data:/loki:z
      - signoz_prod_data:/var/lib/signoz:z
      - clickhouse_prod_data:/var/lib/clickhouse:z
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/health && wget -q --spider http://localhost:9090/-/healthy && wget -q --spider http://localhost:3000/api/health && wget -q --spider http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 10G
          cpus: '6'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: observability
      environment: prod-standalone
      services: otel,prometheus,grafana,loki,signoz,clickhouse

  # =============================================================================
  # APPLICATION TIER - Phoenix + FLAME + Clustering + Redis (Integrated)
  # =============================================================================

  indrajaal-app-prod:
    image: localhost/indrajaal-app-unified:nixos-devenv
    container_name: indrajaal-app-prod
    hostname: indrajaal-app-prod
    networks:
      indrajaal-mesh:
        ipv4_address: 172.28.0.10
      indrajaal-internal:
    depends_on:
      indrajaal-db-prod:
        condition: service_healthy
      indrajaal-obs-prod:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: ecto://postgres:postgres@indrajaal-db-prod:5433/indrajaal_prod
      POSTGRES_HOST: indrajaal-db-prod
      POSTGRES_PORT: "5433"
      POSTGRES_DB: indrajaal_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

      # Redis (embedded)
      REDIS_EMBEDDED: "true"
      REDIS_URL: redis://localhost:6379
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

      # Phoenix
      PHX_HOST: localhost
      PHX_PORT: "4000"
      SECRET_KEY_BASE: production_equivalent_secret_key_base_64_chars_minimum_here_change_me

      # FLAME Configuration
      FLAME_ENABLED: "true"
      FLAME_BACKEND: local
      FLAME_MIN_POOL: "2"
      FLAME_MAX_POOL: "10"

      # Clustering
      CLUSTERING_ENABLED: "true"
      RELEASE_NODE: indrajaal@indrajaal-app-prod
      RELEASE_COOKIE: indrajaal_prod_cookie

      # Prajna Cockpit
      PRAJNA_COCKPIT_ENABLED: "true"
      PRAJNA_DARK_MODE: "true"
      PRAJNA_AI_COPILOT_ENABLED: "true"

      # OpenRouter AI
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: anthropic/claude-3.5-sonnet

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: http://indrajaal-obs-prod:4317
      OTEL_SERVICE_NAME: indrajaal-app-prod
      FRACTAL_LOGGING_ENABLED: "true"
      LOG_LEVEL: info

      # Framework
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      PATIENT_MODE: enabled
      SOPV51_COMPLIANT: "true"
      UNIFIED_APP_MODE: "true"
    ports:
      - "4000:4000"   # Phoenix
      - "4001:4001"   # Health
      - "6379:6379"   # Redis (exposed for debugging)
    volumes:
      - app_prod_data:/app/data:z
      - redis_prod_data:/var/lib/redis:z
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4001/health && redis-cli ping || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 10G
          cpus: '8'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: application
      environment: prod-standalone
      stamp.verified: "true"
      flame.enabled: "true"
      clustering.enabled: "true"
      redis.embedded: "true"
      services: phoenix,flame,clustering,redis

volumes:
  db_prod_data:
  otel_prod_data:
  prometheus_prod_data:
  grafana_prod_data:
  loki_prod_data:
  signoz_prod_data:
  clickhouse_prod_data:
  app_prod_data:
  redis_prod_data:

# =============================================================================
# Architecture: 3-Container Consolidated Stack with SigNoz
# =============================================================================
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                    PRODUCTION-EQUIVALENT ENVIRONMENT                         │
# │                    3-Container Architecture with SigNoz                      │
# ├─────────────────────────────────────────────────────────────────────────────┤
# │                                                                              │
# │  ┌──────────────────────────────────────────────────────────────────────┐   │
# │  │ indrajaal-app-prod (10GB/8CPU) - 172.28.0.10                         │   │
# │  │ ┌──────────────┐ ┌──────────────┐ ┌──────────────┐ ┌──────────────┐  │   │
# │  │ │   Phoenix    │ │    FLAME     │ │  Clustering  │ │    Redis     │  │   │
# │  │ │ :4000/:4001  │ │ min:2/max:10 │ │   Gossip     │ │    :6379     │  │   │
# │  │ └──────────────┘ └──────────────┘ └──────────────┘ └──────────────┘  │   │
# │  └──────────────────────────────────────────────────────────────────────┘   │
# │                                                                              │
# │  ┌──────────────────────────────────────────────────────────────────────┐   │
# │  │ indrajaal-obs-prod (10GB/6CPU) - 172.28.0.30                         │   │
# │  │ ┌──────────┐ ┌──────────┐ ┌──────────┐ ┌──────────┐ ┌──────────────┐ │   │
# │  │ │   OTEL   │ │Prometheus│ │ Grafana  │ │   Loki   │ │   SigNoz     │ │   │
# │  │ │:4317/4318│ │  :9090   │ │  :3000   │ │  :3100   │ │ :3301/:8080  │ │   │
# │  │ │  :8888   │ │          │ │          │ │          │ │    :9093     │ │   │
# │  │ └──────────┘ └──────────┘ └──────────┘ └──────────┘ └──────────────┘ │   │
# │  │                       ┌──────────────────────────┐                   │   │
# │  │                       │      ClickHouse          │                   │   │
# │  │                       │    :8123 / :9000         │                   │   │
# │  │                       │  (SigNoz Storage Layer)  │                   │   │
# │  │                       └──────────────────────────┘                   │   │
# │  └──────────────────────────────────────────────────────────────────────┘   │
# │                                                                              │
# │  ┌──────────────────────────────────────────────────────────────────────┐   │
# │  │ indrajaal-db-prod (4GB/4CPU) - 172.28.0.20                           │   │
# │  │ ┌────────────────────────────────────────────────────────────────┐   │   │
# │  │ │                PostgreSQL 17 + TimescaleDB                     │   │   │
# │  │ │                          :5433                                 │   │   │
# │  │ └────────────────────────────────────────────────────────────────┘   │   │
# │  └──────────────────────────────────────────────────────────────────────┘   │
# │                                                                              │
# │  ┌──────────────────────────────────────────────────────────────────────┐   │
# │  │                    MESH NETWORK (172.28.0.0/16)                       │   │
# │  └──────────────────────────────────────────────────────────────────────┘   │
# │                                                                              │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# =============================================================================
# Usage Instructions
# =============================================================================
#
# Start Full Stack:
#   podman-compose -f podman-compose-prod-standalone.yml up -d
#
# Check Status:
#   podman-compose -f podman-compose-prod-standalone.yml ps
#
# View Logs:
#   podman-compose -f podman-compose-prod-standalone.yml logs -f indrajaal-app-prod
#
# Run F# Tests:
#   dotnet fsi lib/cepaf/scripts/ComprehensiveRuntimeTests.fsx --mode swarm
#
# Access Points:
#   Phoenix:       http://localhost:4000
#   Health:        http://localhost:4001/health
#   Prajna:        http://localhost:4000/prajna
#   Copilot:       http://localhost:4000/prajna/copilot
#   Grafana:       http://localhost:3000 (admin/indrajaal)
#   Prometheus:    http://localhost:9090
#   Loki:          http://localhost:3100
#   SigNoz:        http://localhost:3301 (traces/metrics/logs)
#   SigNoz API:    http://localhost:8080
#   SigNoz Alerts: http://localhost:9093
#   ClickHouse:    http://localhost:8123 (SigNoz backend)
#   Redis:         localhost:6379 (for debugging)
#
# Cleanup:
#   podman-compose -f podman-compose-prod-standalone.yml down -v
# =============================================================================
