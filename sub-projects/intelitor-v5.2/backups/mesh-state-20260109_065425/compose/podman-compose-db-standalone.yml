# podman-compose-db-standalone.yml
# Purpose: Standalone TimescaleDB database for Indrajaal
# Objective: Provide database service for standalone environment
# SOPv5.11 Compliance: SC-CNT-009, SC-CNT-010, SC-CNT-013
# Mode: Standalone (aligned with indrajaal-app-standalone, indrajaal-obs-standalone)

version: '3.8'

networks:
  db-standalone-net:
    driver: bridge

services:
  indrajaal-db-standalone:
    image: localhost/indrajaal-timescaledb-demo:nixos-devenv
    container_name: indrajaal-db-standalone
    hostname: db-standalone
    networks:
      - db-standalone-net
    environment:
      # Standalone Database Configuration
      POSTGRES_DB: indrajaal_standalone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGPORT: 5433

      # Resource Tuning
      TS_TUNE_MEMORY: 2GB
      TS_TUNE_NUM_CPUS: 2

      # Framework Flags
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"

    ports:
      - "5433:5433"

    volumes:
      - db_standalone_data:/var/lib/postgresql/data:z
      - type: tmpfs
        target: /var/log/claude

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indrajaal_standalone -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    restart: "no"

    labels:
      project: indrajaal
      component: database
      environment: standalone
      stamp.verified: "true"
      stamp.constraints: "SC-CNT-009,SC-CNT-010,SC-CNT-013"

volumes:
  db_standalone_data:

# =============================================================================
# Usage Instructions
# =============================================================================
#
# Start Database:
#   podman-compose -f podman-compose-db-standalone.yml up -d
#
# Wait for Health:
#   podman wait --condition=healthy indrajaal-db-standalone
#
# Check Status:
#   podman exec indrajaal-db-standalone pg_isready -U postgres -p 5433
#
# Connect via psql:
#   podman exec -it indrajaal-db-standalone psql -U postgres -d indrajaal_standalone
#
# Cleanup:
#   podman-compose -f podman-compose-db-standalone.yml down -v
# =============================================================================
