# Fractal Mesh Topology - SIL-6 Biomorphic Cluster
# Version: 20.0.0-FRACTAL
# Architecture: 6-Node Hybrid Mesh
# Compliance: IEC 61508 SIL-6
# Reference: docs/analysis/ANALYSIS_AND_IMPLEMENTATION.md

version: "3.9"

services:
  # ============================================================
  # DATA PLANE (State & Persistence)
  # ============================================================
  indrajaal-db1:
    image: localhost/indrajaal-db:latest
    container_name: indrajaal-db1
    hostname: indrajaal-db1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=indrajaal_fractal
      - PGDATA=/var/lib/postgresql/data/pgdata
      - NODE_ROLE=primary
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - fractal-mesh
    volumes:
      - fractal-db1-data:/var/lib/postgresql/data

  indrajaal-db2:
    image: localhost/indrajaal-db:latest
    container_name: indrajaal-db2
    hostname: indrajaal-db2
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=indrajaal_fractal
      - PGDATA=/var/lib/postgresql/data/pgdata
      - NODE_ROLE=replica
    ports:
      - "5434:5432"
    depends_on:
      indrajaal-db1:
        condition: service_healthy
    networks:
      - fractal-mesh
    volumes:
      - fractal-db2-data:/var/lib/postgresql/data

  # ============================================================
  # OBSERVABILITY PLANE (Senses & Telemetry)
  # ============================================================
  indrajaal-obs:
    image: localhost/indrajaal-obs:latest
    container_name: indrajaal-obs
    hostname: indrajaal-obs
    environment:
      - FRACTAL_BATCH_FLUSH_MS=10
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8080:8080" # SigNoz UI
    networks:
      - fractal-mesh
    volumes:
      - fractal-obs-data:/var/lib/signoz

  # ============================================================
  # CONTROL PLANE (Logic & Execution)
  # ============================================================
  indrajaal-app-1:
    image: localhost/indrajaal-app:latest
    container_name: indrajaal-app-1
    hostname: indrajaal-app-1
    entrypoint: ["/root/.nix-profile/bin/bash", "-c"]
    command: ["/root/.nix-profile/bin/mix local.hex --force && /root/.nix-profile/bin/mix local.rebar --force && /root/.nix-profile/bin/mix deps.get && /root/.nix-profile/bin/iex -S /root/.nix-profile/bin/mix phx.server"]
    environment:
      - NODE_NAME=app1@indrajaal-app-1
      - CLUSTER_SEED=true
      - DATABASE_URL=ecto://postgres:postgres@indrajaal-db1:5432/indrajaal_fractal
      - PHX_PORT=4000
      - ELIXIR_ERL_OPTIONS=+fnu
      - SKIP_LINEAGE_NIF=true
    ports:
      - "4000:4000"
    depends_on:
      indrajaal-db1:
        condition: service_healthy
      indrajaal-obs:
        condition: service_started
    networks:
      - fractal-mesh
    volumes:
      - fractal-app1-data:/app/data

  indrajaal-app-2:
    image: localhost/indrajaal-app:latest
    container_name: indrajaal-app-2
    hostname: indrajaal-app-2
    entrypoint: ["/root/.nix-profile/bin/bash", "-c"]
    command: ["/root/.nix-profile/bin/mix local.hex --force && /root/.nix-profile/bin/mix local.rebar --force && /root/.nix-profile/bin/mix deps.get && /root/.nix-profile/bin/iex -S /root/.nix-profile/bin/mix phx.server"]
    environment:
      - NODE_NAME=app2@indrajaal-app-2
      - CLUSTER_JOIN=app1@indrajaal-app-1
      - DATABASE_URL=ecto://postgres:postgres@indrajaal-db1:5432/indrajaal_fractal
      - PHX_PORT=4001
      - ELIXIR_ERL_OPTIONS=+fnu
      - SKIP_LINEAGE_NIF=true
    ports:
      - "4001:4000"
    depends_on:
      indrajaal-app-1:
        condition: service_started
    networks:
      - fractal-mesh
    volumes:
      - fractal-app2-data:/app/data

  # ============================================================
  # INTERFACE PLANE (Cockpit & Visualization)
  # ============================================================
  indrajaal-liveview:
    image: localhost/indrajaal-app:latest
    container_name: indrajaal-liveview
    hostname: indrajaal-liveview
    entrypoint: ["/root/.nix-profile/bin/bash", "-c"]
    command: ["/root/.nix-profile/bin/mix local.hex --force && /root/.nix-profile/bin/mix local.rebar --force && /root/.nix-profile/bin/mix deps.get && /root/.nix-profile/bin/iex -S /root/.nix-profile/bin/mix phx.server"]
    environment:
      - NODE_NAME=liveview@indrajaal-liveview
      - MODE=dashboard_only
      - DATABASE_URL=ecto://postgres:postgres@indrajaal-db1:5432/indrajaal_fractal
      - PHX_PORT=4002
      - ELIXIR_ERL_OPTIONS=+fnu
      - SKIP_LINEAGE_NIF=true
    ports:
      - "4002:4000"
    networks:
      - fractal-mesh

networks:
  fractal-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  fractal-db1-data:
  fractal-db2-data:
  fractal-obs-data:
  fractal-app1-data:
  fractal-app2-data:
