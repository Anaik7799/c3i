# Indrajaal ELIXIR_ERL_OPTIONS Checker Configuration
#
# SIL-6 Compliance Configuration
# All ELIXIR_ERL_OPTIONS MUST include +fnu flag

sil_level = 6

# Fail on violations (exit code 1)
fail_on_violation = true

# Recommended ELIXIR_ERL_OPTIONS value
recommended_options = "+fnu +S 16:16 +SDio 16"

# Patterns to skip (validation scripts that check for +fnu)
skip_patterns = [
    "comprehensive_preflight_system.exs",
    "tdg_container_compliance_tests.exs",
    "update_compose_for_sopv51.exs",
]

# Additional file patterns to check
additional_patterns = []

# Environment variable patterns
[env_patterns]
ELIXIR_ERL_OPTIONS = "+fnu +S 16:16 +SDio 16"
MIX_JOBS = "16"
SKIP_ZENOH_NIF = "0"
WALLABY_ENABLED = "true"

# Severity rules
[severity_rules]
MISSING_FNU = "Critical"
WRONG_FORMAT = "Error"
DEPRECATED = "Warning"
