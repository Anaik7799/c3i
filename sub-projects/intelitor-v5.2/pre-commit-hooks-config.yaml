# Pre-commit hooks configuration for Intelitor Security Monitoring System
# SOPv5.1 Cybernetic Integration with Enterprise Quality Gates

repos:
  # PHASE 1: CODE FORMATTING AND BASIC VALIDATION
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=10000']
      - id: mixed-line-ending
        args: ['--fix=lf']

  # PHASE 2: ELIXIR-SPECIFIC QUALITY GATES
  - repo: local
    hooks:
      # 2.1: ZERO-WARNING COMPILATION VALIDATION
      - id: elixir-compile-warnings
        name: 🏭 Zero-Warning Compilation (Enterprise Standard)
        entry: bash -c 'ELIXIR_ERL_OPTIONS="+S 16" mix compile --warnings-as-errors'
        language: system
        files: \.(ex|exs)$
        pass_filenames: false
        always_run: true

      # 2.2: CODE FORMATTING VALIDATION
      - id: elixir-format
        name: 📐 Elixir Format Validation
        entry: mix format --check-formatted
        language: system
        files: \.(ex|exs)$
        pass_filenames: false

      # 2.3: CREDO QUALITY ANALYSIS (STRICT MODE)
      - id: credo-strict
        name: 🎯 Credo Quality Analysis (Strict Mode)
        entry: mix credo --strict
        language: system
        files: \.(ex|exs)$
        pass_filenames: false

      # 2.4: @SPEC COVERAGE VALIDATION
      - id: spec-coverage
        name: 📋 @spec Coverage Validation
        entry: bash
        language: system
        files: \.(ex|exs)$
        pass_filenames: false
        args:
          - -c
          - |
            echo "🔍 Validating @spec coverage..."
            if [ -f "scripts/quality/spec_coverage_analyzer.exs" ]; then
              elixir scripts/quality/spec_coverage_analyzer.exs --pre-commit-check
            else
              echo "⚠️ @spec coverage analyzer not found, creating basic check..."
              # Basic @spec validation - check for functions without @spec
              grep -r "def " --include="*.ex" lib/ | grep -v "defp" | grep -v "@spec" | wc -l > spec_missing.tmp
              MISSING_SPECS=$(cat spec_missing.tmp)
              rm spec_missing.tmp
              if [ "$MISSING_SPECS" -gt 10 ]; then
                echo "❌ Too many functions without @spec ($MISSING_SPECS > 10)"
                exit 1
              else
                echo "✅ @spec coverage acceptable ($MISSING_SPECS ≤ 10 functions without specs)"
              fi
            fi

      # 2.5: TDG METHODOLOGY VALIDATION
      - id: tdg-validation
        name: 🧪 Test-Driven Generation Validation
        entry: bash
        language: system
        files: \.(ex|exs)$
        pass_filenames: false
        args:
          - -c
          - |
            echo "🔬 Validating TDG methodology compliance..."
            if [ -f "scripts/testing/tdg_validator.exs" ]; then
              elixir scripts/testing/tdg_validator.exs --pre-commit-check
            else
              echo "⚠️ TDG validator not found, performing basic validation..."
              # Check if new test files exist for new modules
              NEW_MODULES=$(git diff --cached --name-only | grep "lib/.*\.ex$" | wc -l)
              NEW_TESTS=$(git diff --cached --name-only | grep "test/.*\.exs$" | wc -l)
              
              if [ "$NEW_MODULES" -gt 0 ] && [ "$NEW_TESTS" -eq 0 ]; then
                echo "⚠️ New modules added without corresponding tests - consider TDG methodology"
              else
                echo "✅ TDG methodology check passed"
              fi
            fi

      # 2.6: SECURITY VALIDATION (SOBELOW)
      - id: security-validation
        name: 🔐 Security Analysis (Sobelow)
        entry: mix sobelow --exit
        language: system
        files: \.(ex|exs)$
        pass_filenames: false

      # 2.7: STAMP SAFETY CONSTRAINT VALIDATION
      - id: stamp-safety
        name: 🛡️ STAMP Safety Constraint Validation
        entry: bash
        language: system
        files: \.(ex|exs)$
        pass_filenames: false
        args:
          - -c
          - |
            echo "🛡️ Validating STAMP safety constraints..."
            if [ -f "scripts/stamp/integrated_stamp_safety_implementation.exs" ]; then
              elixir scripts/stamp/integrated_stamp_safety_implementation.exs --pre-commit-check
            else
              echo "⚠️ STAMP safety validator not found, performing basic safety check..."
              # Basic safety check - ensure no unsafe patterns
              UNSAFE_PATTERNS=$(grep -r "System.cmd\|File.rm\|Process.spawn" --include="*.ex" lib/ | wc -l)
              if [ "$UNSAFE_PATTERNS" -gt 5 ]; then
                echo "⚠️ High number of potentially unsafe operations detected ($UNSAFE_PATTERNS)"
              fi
              echo "✅ Basic safety validation completed"
            fi

# Pre-commit configuration
default_language_version:
  node: system
  
fail_fast: false