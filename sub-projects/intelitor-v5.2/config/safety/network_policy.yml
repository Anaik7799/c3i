# STAMP Safety Network Policy Configuration
# Generated: 2025-08-02 19:52:26 CEST
# Agent: Agent-1-STAMP-Safety-Specialist

# Container network isolation
network_mode: "isolated"

# Allowed ports and protocols
allowed_ports:
  - port: 4000
    protocol: "HTTP"
    description: "Phoenix application"
  - port: 5433
    protocol: "PostgreSQL"
    description: "Database connection"
  - port: 8080
    protocol: "HTTP"
    description: "Health monitoring"

# Firewall rules
firewall_rules:
  - rule: "DENY ALL by default"
  - rule: "ALLOW localhost traffic"
  - rule: "ALLOW container-to-container on allowed ports"
  - rule: "LOG all denied connections"

# Network monitoring
monitoring:
  enabled: true
  log_connections: true
  alert_on_violations: true
