# PostgreSQL SIL-4 Hardened Configuration
# Compliance: IEC 61508 / ACID Transactionality

# --- Connections & Memory ---
listen_addresses = '*'
max_connections = 200
shared_buffers = 256MB
dynamic_shared_memory_type = posix

# --- WAL & Reliability (CRITICAL FOR SIL-4) ---
# Ensure zero-data-loss on power failure
wal_level = replica
fsync = on
synchronous_commit = on
wal_log_hints = on
checkpoint_timeout = 5min
max_wal_size = 1GB
min_wal_size = 80MB

# --- Logging & Observability ---
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'ddl' # Log all schema changes
log_timezone = 'UTC'

# --- Autovacuum ---
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min

# --- Extension Loading ---
shared_preload_libraries = 'timescaledb'
