# =============================================================================
# Container Network Policies - Indrajaal Security Isolation
# =============================================================================
# Version: 1.0.0
# Created: 2025-12-19
# Framework: SOPv5.11 + STAMP + TPS
# STAMP Compliance: SC-CNT-015 (Network Security Enforced)
#
# Architecture:
#   - indrajaal-app (172.30.0.20): Application + Redis + Nginx sidecars
#   - indrajaal-db  (172.30.0.10): TimescaleDB database
#   - indrajaal-obs (172.30.0.30): Prometheus + Grafana + OTEL
#
# Network: indrajaal-net (172.30.0.0/24)
# =============================================================================

# -----------------------------------------------------------------------------
# Section 1: Network Configuration
# -----------------------------------------------------------------------------
network:
  name: indrajaal-net
  driver: bridge
  subnet: 172.30.0.0/24
  gateway: 172.30.0.1

  # DNS configuration
  dns:
    enabled: true
    servers:
      - 172.30.0.1

  # Default network behavior
  defaults:
    internal: false
    enable_ipv6: false
    encrypted: false  # Podman doesn't support encrypted overlay

# -----------------------------------------------------------------------------
# Section 2: Container IP Assignments (Static)
# -----------------------------------------------------------------------------
container_ips:
  indrajaal-db:   172.30.0.10
  indrajaal-app:  172.30.0.20
  indrajaal-obs:  172.30.0.30

# -----------------------------------------------------------------------------
# Section 3: Network Policies (Ingress/Egress Rules)
# -----------------------------------------------------------------------------
policies:
  # ---------------------------------------------------------------------------
  # Policy: indrajaal-app (Application Container)
  # ---------------------------------------------------------------------------
  indrajaal-app:
    description: "Phoenix application with Redis and Nginx sidecars"

    ingress:
      # Allow incoming HTTP from anywhere (external access)
      - name: "allow-external-http"
        from: "0.0.0.0/0"
        ports:
          - port: 4000
            protocol: tcp
          - port: 4001
            protocol: tcp
          - port: 80
            protocol: tcp
          - port: 443
            protocol: tcp

      # Allow incoming from observability for metrics scraping
      - name: "allow-metrics-scrape"
        from: "172.30.0.30/32"
        ports:
          - port: 4000
            protocol: tcp

      # Allow localhost (sidecar communication)
      - name: "allow-localhost"
        from: "127.0.0.0/8"
        ports:
          - port: 6379
            protocol: tcp
          - port: 4000
            protocol: tcp
          - port: 80
            protocol: tcp

    egress:
      # Allow outgoing to database (required)
      - name: "allow-database"
        to: "172.30.0.10/32"
        ports:
          - port: 5433
            protocol: tcp

      # Allow outgoing to Redis (localhost - sidecar)
      - name: "allow-redis-local"
        to: "127.0.0.1/32"
        ports:
          - port: 6379
            protocol: tcp

      # Allow outgoing for observability export
      - name: "allow-otel-export"
        to: "172.30.0.30/32"
        ports:
          - port: 4317
            protocol: tcp
          - port: 4318
            protocol: tcp

      # Allow DNS resolution
      - name: "allow-dns"
        to: "0.0.0.0/0"
        ports:
          - port: 53
            protocol: udp
          - port: 53
            protocol: tcp

      # Block all other egress by default
      - name: "deny-all-other"
        to: "0.0.0.0/0"
        action: deny

  # ---------------------------------------------------------------------------
  # Policy: indrajaal-db (Database Container)
  # ---------------------------------------------------------------------------
  indrajaal-db:
    description: "TimescaleDB database - highly restricted"

    ingress:
      # Allow incoming from application only (strict isolation)
      - name: "allow-app-connection"
        from: "172.30.0.20/32"
        ports:
          - port: 5433
            protocol: tcp

      # Allow metrics scraping from observability
      - name: "allow-metrics-scrape"
        from: "172.30.0.30/32"
        ports:
          - port: 5433
            protocol: tcp

      # Deny external access (database should never be exposed)
      - name: "deny-external"
        from: "0.0.0.0/0"
        action: deny

    egress:
      # Database should have minimal egress
      # Allow DNS only for name resolution
      - name: "allow-dns"
        to: "0.0.0.0/0"
        ports:
          - port: 53
            protocol: udp

      # Block all other egress
      - name: "deny-all-egress"
        to: "0.0.0.0/0"
        action: deny

  # ---------------------------------------------------------------------------
  # Policy: indrajaal-obs (Observability Container)
  # ---------------------------------------------------------------------------
  indrajaal-obs:
    description: "Prometheus, Grafana, OTEL - monitoring stack"

    ingress:
      # Allow Prometheus UI access (internal dashboard)
      - name: "allow-prometheus-ui"
        from: "0.0.0.0/0"
        ports:
          - port: 9090
            protocol: tcp

      # Allow Grafana UI access
      - name: "allow-grafana-ui"
        from: "0.0.0.0/0"
        ports:
          - port: 3000
            protocol: tcp

      # Allow OTEL receiver (from application)
      - name: "allow-otel-receive"
        from: "172.30.0.20/32"
        ports:
          - port: 4317
            protocol: tcp
          - port: 4318
            protocol: tcp

      # Allow localhost (sidecar communication)
      - name: "allow-localhost"
        from: "127.0.0.0/8"
        ports:
          - port: 9090
            protocol: tcp
          - port: 3000
            protocol: tcp
          - port: 4317
            protocol: tcp
          - port: 8888
            protocol: tcp

    egress:
      # Allow scraping application metrics
      - name: "allow-app-scrape"
        to: "172.30.0.20/32"
        ports:
          - port: 4000
            protocol: tcp

      # Allow scraping database metrics
      - name: "allow-db-scrape"
        to: "172.30.0.10/32"
        ports:
          - port: 5433
            protocol: tcp

      # Allow DNS
      - name: "allow-dns"
        to: "0.0.0.0/0"
        ports:
          - port: 53
            protocol: udp

      # Block all other egress
      - name: "deny-all-other"
        to: "0.0.0.0/0"
        action: deny

# -----------------------------------------------------------------------------
# Section 4: Inter-Container Communication Matrix
# -----------------------------------------------------------------------------
# Matrix showing allowed communications between containers
# Legend: Y = Allowed, N = Blocked
#
#              | indrajaal-app | indrajaal-db | indrajaal-obs |
# -------------|---------------|--------------|---------------|
# indrajaal-app|      -        |     Y(5433)  |    Y(4317)    |
# indrajaal-db |      N        |      -       |       N       |
# indrajaal-obs|   Y(4000)     |   Y(5433)    |       -       |
# -------------|---------------|--------------|---------------|
#
communication_matrix:
  indrajaal-app:
    to_indrajaal-db: true
    to_indrajaal-obs: true
    ports:
      indrajaal-db: [5433]
      indrajaal-obs: [4317, 4318]

  indrajaal-db:
    to_indrajaal-app: false  # DB should not initiate connections
    to_indrajaal-obs: false

  indrajaal-obs:
    to_indrajaal-app: true   # For metrics scraping
    to_indrajaal-db: true    # For metrics scraping
    ports:
      indrajaal-app: [4000]
      indrajaal-db: [5433]

# -----------------------------------------------------------------------------
# Section 5: Podman Network Security Options
# -----------------------------------------------------------------------------
podman_network_security:
  # Enable network isolation
  network_mode: bridge

  # Disable host networking
  disable_host_network: true

  # Disable privileged networking
  disable_privileged: true

  # Network namespace isolation
  userns: keep-id

  # DNS configuration for container isolation
  dns_options:
    - ndots:1
    - timeout:3
    - attempts:2

  # Sysctls for network hardening
  sysctls:
    net.ipv4.ip_unprivileged_port_start: 0
    net.ipv4.ping_group_range: "0 2147483647"

# -----------------------------------------------------------------------------
# Section 6: Firewall Rules (nftables/iptables)
# -----------------------------------------------------------------------------
firewall_rules:
  # Default policies
  default_input_policy: DROP
  default_forward_policy: DROP
  default_output_policy: ACCEPT

  # Custom chains for container traffic
  chains:
    indrajaal-input:
      rules:
        - "-m state --state ESTABLISHED,RELATED -j ACCEPT"
        - "-p tcp --dport 4000 -j ACCEPT"
        - "-p tcp --dport 4001 -j ACCEPT"
        - "-p tcp --dport 3000 -j ACCEPT"
        - "-p tcp --dport 9090 -j ACCEPT"
        - "-j DROP"

    indrajaal-forward:
      rules:
        # App to DB
        - "-s 172.30.0.20 -d 172.30.0.10 -p tcp --dport 5433 -j ACCEPT"
        # App to Obs
        - "-s 172.30.0.20 -d 172.30.0.30 -p tcp --dport 4317 -j ACCEPT"
        # Obs to App (scrape)
        - "-s 172.30.0.30 -d 172.30.0.20 -p tcp --dport 4000 -j ACCEPT"
        # Obs to DB (scrape)
        - "-s 172.30.0.30 -d 172.30.0.10 -p tcp --dport 5433 -j ACCEPT"
        # Established connections
        - "-m state --state ESTABLISHED,RELATED -j ACCEPT"
        # Drop everything else
        - "-j DROP"

# -----------------------------------------------------------------------------
# Section 7: Port Exposure Rules
# -----------------------------------------------------------------------------
port_exposure:
  # Ports that can be exposed to host
  allowed_host_ports:
    - 4000   # Phoenix app
    - 4001   # Phoenix LiveView
    - 3000   # Grafana
    - 9090   # Prometheus

  # Ports that should NEVER be exposed to host
  blocked_host_ports:
    - 5433   # Database - internal only
    - 6379   # Redis - internal only
    - 4317   # OTEL gRPC - internal only
    - 4318   # OTEL HTTP - internal only

  # Port binding restrictions
  bind_restrictions:
    localhost_only: false  # Allow external access for demo
    allowed_interfaces:
      - "0.0.0.0"
      - "127.0.0.1"
