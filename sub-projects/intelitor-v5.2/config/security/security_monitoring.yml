# Security Monitoring Configuration
# Generated: 2025-08-02 19:52:26 CEST

# Security Event Monitoring
security_monitoring:
  log_security_events: true
  real_time_analysis: true
  threat_detection: true
  anomaly_detection: true

# Security Metrics
security_metrics:
  failed_login_attempts: true
  privilege_escalation_attempts: true
  suspicious_network_activity: true
  data_access_patterns: true
  api_abuse_detection: true

# Alerting Rules
alerting:
  critical_alerts:
    - "Multiple failed login attempts"
    - "Privilege escalation detected"
    - "Suspicious network traffic"
    - "Data exfiltration patterns"
  notification_channels:
    - "email"
    - "slack"
    - "webhook"
  escalation_policy: "immediate"

# Compliance Monitoring
compliance_monitoring:
  owasp_top_10: true
  security_policy_violations: true
  access_control_violations: true
  data_handling_violations: true
