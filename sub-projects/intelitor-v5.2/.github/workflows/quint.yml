name: Quint Verification

on:
  push:
    paths:
      - 'quint/**'
      - 'docs/formal_specs/**/*.qnt'
      - 'verification/quint/**'
      - '.github/workflows/quint.yml'
  pull_request:
    paths:
      - 'quint/**'
      - 'docs/formal_specs/**/*.qnt'
      - 'verification/quint/**'
      - '.github/workflows/quint.yml'
  workflow_dispatch:

jobs:
  # ===========================================================================
  # Stage 1: Typecheck ALL 32 .qnt files (fast, catches syntax/type errors)
  # ===========================================================================
  typecheck:
    name: Typecheck All Models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Quint
        run: |
          npm install -g @informalsystems/quint
          echo "Quint version: $(quint --version)"

      - name: Typecheck quint/ models
        run: |
          for f in quint/*.qnt; do
            echo "::group::Typecheck $f"
            quint typecheck "$f"
            echo "::endgroup::"
          done

      - name: Typecheck docs/formal_specs/ models
        run: |
          for f in docs/formal_specs/*.qnt; do
            echo "::group::Typecheck $f"
            quint typecheck "$f"
            echo "::endgroup::"
          done

      - name: Typecheck docs/formal_specs/quint/ models
        run: |
          for f in docs/formal_specs/quint/*.qnt; do
            echo "::group::Typecheck $f"
            quint typecheck "$f"
            echo "::endgroup::"
          done

      - name: Typecheck docs/formal_specs/planning/ models
        run: |
          for f in docs/formal_specs/planning/*.qnt; do
            echo "::group::Typecheck $f"
            quint typecheck "$f"
            echo "::endgroup::"
          done

      - name: Typecheck docs/formal_specs/zenoh/ models
        run: |
          for f in docs/formal_specs/zenoh/*.qnt; do
            echo "::group::Typecheck $f"
            quint typecheck "$f"
            echo "::endgroup::"
          done

      - name: Typecheck verification/quint/ models
        run: |
          for f in verification/quint/*.qnt; do
            echo "::group::Typecheck $f"
            quint typecheck "$f"
            echo "::endgroup::"
          done

      - name: Summary
        run: |
          total=$(find quint/ docs/formal_specs/ verification/quint/ -name '*.qnt' | wc -l)
          echo "Typechecked $total Quint models successfully"

  # ===========================================================================
  # Stage 2: Verify core models with Apalache (model checking)
  # ===========================================================================
  verify-core:
    name: Verify Core Models
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Quint
        run: |
          npm install -g @informalsystems/quint
          echo "Quint version: $(quint --version)"

      - name: Verify IndrajaalTypes
        run: quint verify quint/IndrajaalTypes.qnt --max-steps=50

      - name: Verify AgentStateMachine
        run: quint verify quint/AgentStateMachine.qnt --max-steps=50

      - name: Verify OODALoop
        run: quint verify quint/OODALoop.qnt --max-steps=100

      - name: Verify STAMPConstraints
        run: quint verify quint/STAMPConstraints.qnt --max-steps=50

      - name: Verify CyberneticInvariants
        run: quint verify quint/CyberneticInvariants.qnt --max-steps=50

  # ===========================================================================
  # Stage 3: Verify safety-critical models
  # ===========================================================================
  verify-safety:
    name: Verify Safety Models
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Quint
        run: |
          npm install -g @informalsystems/quint
          echo "Quint version: $(quint --version)"

      - name: Verify Sentinel
        run: quint verify verification/quint/Sentinel.qnt --max-steps=50

      - name: Verify OODA
        run: quint verify verification/quint/OODA.qnt --max-steps=50

      - name: Verify FLAME
        run: quint verify verification/quint/FLAME.qnt --max-steps=50

      - name: Verify Emergency Response
        run: quint verify docs/formal_specs/emergency_response.qnt --max-steps=50

      - name: Verify Emergency Response Distributed
        run: quint verify docs/formal_specs/emergency_response_distributed.qnt --max-steps=50

      - name: Verify Container Verification
        run: quint verify docs/formal_specs/container_verification.qnt --max-steps=50

      - name: Verify Session Security
        run: quint verify docs/formal_specs/session_security.qnt --max-steps=50

  # ===========================================================================
  # Stage 4: Verify domain models
  # ===========================================================================
  verify-domain:
    name: Verify Domain Models
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Quint
        run: |
          npm install -g @informalsystems/quint
          echo "Quint version: $(quint --version)"

      - name: Verify Planning Safety Kernel
        run: quint verify docs/formal_specs/planning/planning_safety_kernel.qnt --max-steps=50

      - name: Verify Planning Access Control
        run: quint verify docs/formal_specs/planning/planning_access_control.qnt --max-steps=50

      - name: Verify Planning Circuit Breaker
        run: quint verify docs/formal_specs/planning/planning_circuit_breaker.qnt --max-steps=50

      - name: Verify Planning Orchestration
        run: quint verify docs/formal_specs/planning/planning_orchestration.qnt --max-steps=50

      - name: Verify Planning Integrated
        run: quint verify docs/formal_specs/planning/planning_integrated.qnt --max-steps=50

      - name: Verify Todolist Access Control
        run: quint verify docs/formal_specs/quint/todolist_access_control.qnt --max-steps=50

      - name: Verify Simplex Kernel
        run: quint verify docs/formal_specs/quint/simplex_kernel.qnt --max-steps=50

      - name: Verify Cross-Holon Database
        run: quint verify docs/formal_specs/quint/CrossHolonDatabase.qnt --max-steps=50

      - name: Verify Prajna Guardian
        run: quint verify docs/formal_specs/prajna_guardian.qnt --max-steps=50

      - name: Verify Prajna Constitutional
        run: quint verify docs/formal_specs/prajna_constitutional.qnt --max-steps=50

      - name: Verify Prajna Register
        run: quint verify docs/formal_specs/prajna_register.qnt --max-steps=50

      - name: Verify Homeostasis
        run: quint verify docs/formal_specs/homeostasis.qnt --max-steps=50

      - name: Verify Ark Model
        run: quint verify docs/formal_specs/ark_model.qnt --max-steps=50

      - name: Verify Startup Waves
        run: quint verify docs/formal_specs/startup_waves.qnt --max-steps=50

      - name: Verify Zenoh Models
        run: quint verify docs/formal_specs/zenoh/ZenohModels.qnt --max-steps=50

      - name: Verify OpenRouter Integration
        run: quint verify docs/formal_specs/quint/openrouter_integration.qnt --max-steps=50

      - name: Verify IndrajaalCore
        run: quint verify docs/formal_specs/quint/IndrajaalCore.qnt --max-steps=50

      - name: Verify Ark Lytic Cycle
        run: quint verify docs/formal_specs/quint/ark_lytic_cycle.qnt --max-steps=50

      - name: Verify Comprehensive Error Model
        run: quint verify docs/formal_specs/comprehensive_error_model.qnt --max-steps=50

      - name: Verify Cross-Holon Database (formal_specs)
        run: quint verify docs/formal_specs/cross_holon_database.qnt --max-steps=50
