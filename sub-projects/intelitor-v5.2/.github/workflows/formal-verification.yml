name: Formal Verification Gates

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/formal_specs/**'
      - 'test/indrajaal/**/*_test.exs'
      - 'lib/**/*.ex'
      - 'CLAUDE.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_verification:
        description: 'Run full verification (1000 steps)'
        type: boolean
        default: false

env:
  MIX_ENV: test
  ELIXIR_VERSION: '1.18.1'
  OTP_VERSION: '27.2'

jobs:
  # =============================================================================
  # G1: Specification Validity Gate
  # =============================================================================
  g1-spec-validity:
    name: G1 - Specification Validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Quint
        run: npm install -g @informalsystems/quint

      - name: Parse Quint Specifications
        run: quint parse docs/formal_specs/quint_specifications.qnt

      - name: Typecheck Quint Specifications
        run: quint typecheck docs/formal_specs/quint_specifications.qnt

      - name: Validate Specification Structure
        run: |
          echo "Checking for required modules..."
          grep -q "module Observability" docs/formal_specs/quint_specifications.qnt
          grep -q "module ContainerSecurity" docs/formal_specs/quint_specifications.qnt
          grep -q "module FLAMECompute" docs/formal_specs/quint_specifications.qnt
          echo "All required modules found"

  # =============================================================================
  # G2: Proof Verification Gate (Agda)
  # =============================================================================
  g2-proof-verification:
    name: G2 - Proof Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.4'
          enable-stack: true

      - name: Cache Agda
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal
            ~/.agda
          key: ${{ runner.os }}-agda-2.6-stdlib-2.0-${{ hashFiles('**/*.agda') }}
          restore-keys: |
            ${{ runner.os }}-agda-2.6-stdlib-2.0-

      - name: Install Agda
        run: |
          cabal update
          cabal install Agda --overwrite-policy=always
          echo "$HOME/.cabal/bin" >> $GITHUB_PATH

      - name: Install Agda Standard Library
        run: |
          mkdir -p ~/.agda
          cd ~/.agda
          if [ ! -d "agda-stdlib" ]; then
            git clone --depth 1 --branch v2.0 https://github.com/agda/agda-stdlib.git
            echo "$HOME/.agda/agda-stdlib/standard-library.agda-lib" > libraries
          fi

      - name: Typecheck Required Agda Proofs (10 regression-guarded)
        run: |
          export PATH="$HOME/.cabal/bin:$PATH"
          # 3 from verification/agda/
          agda --safe verification/agda/Intelitor/Foundations.agda
          agda --safe verification/agda/Intelitor/Axioms.agda
          agda --safe verification/agda/Consensus.agda
          # 7 from docs/formal_specs/agda/
          agda --safe docs/formal_specs/agda/GraphProperties.agda
          agda --safe docs/formal_specs/agda/AcyclicityProofs.agda
          agda --safe docs/formal_specs/agda/TodolistAccessControl.agda
          agda --safe docs/formal_specs/agda/ArkProofs.agda
          agda --safe docs/formal_specs/agda/VersionVector.agda
          agda --safe docs/formal_specs/agda/OpenRouterGraphProofs.agda
          agda --safe docs/formal_specs/agda/SupervisionProofs.agda

      - name: Typecheck Remaining Proofs (best-effort)
        run: |
          export PATH="$HOME/.cabal/bin:$PATH"
          for f in docs/formal_specs/*.agda docs/formal_specs/zenoh/*.agda docs/formal_specs/planning/*.agda scripts/agents/*.agda; do
            [ -f "$f" ] && agda --safe "$f" || echo "WARNING: $f failed (non-required)"
          done

      - name: Verify No Postulates in Required Proofs
        run: |
          total=0
          for f in verification/agda/Intelitor/Foundations.agda verification/agda/Intelitor/Axioms.agda verification/agda/Consensus.agda docs/formal_specs/agda/GraphProperties.agda docs/formal_specs/agda/AcyclicityProofs.agda docs/formal_specs/agda/TodolistAccessControl.agda docs/formal_specs/agda/ArkProofs.agda docs/formal_specs/agda/VersionVector.agda docs/formal_specs/agda/OpenRouterGraphProofs.agda docs/formal_specs/agda/SupervisionProofs.agda; do
            count=$(grep -cE "^\s*postulate\s+" "$f" 2>/dev/null || echo 0)
            if [ "$count" -gt 0 ]; then
              echo "ERROR: $f has $count active postulates"
              total=$((total + count))
            fi
          done
          if [ "$total" -gt 0 ]; then
            echo "FATAL: $total total active postulates in required proofs"
            exit 1
          fi
          echo "No active postulates found in required proofs - all are constructive"

  # =============================================================================
  # G3: Property Verification Gate (Model Checking)
  # =============================================================================
  g3-property-verification:
    name: G3 - Property Verification
    runs-on: ubuntu-latest
    needs: [g1-spec-validity]
    steps:
      - uses: actions/checkout@v4

      - name: Install Quint
        run: npm install -g @informalsystems/quint

      - name: Verify Master Invariant (Standard)
        if: ${{ !inputs.full_verification }}
        run: |
          quint verify \
            --invariant=masterInvariant \
            --max-steps=100 \
            docs/formal_specs/quint_specifications.qnt

      - name: Verify Master Invariant (Full)
        if: ${{ inputs.full_verification }}
        run: |
          quint verify \
            --invariant=masterInvariant \
            --max-steps=1000 \
            docs/formal_specs/quint_specifications.qnt

      - name: Verify Safety Properties
        run: |
          echo "Verifying safety properties..."
          quint verify --invariant=patientModeInvariant docs/formal_specs/quint_specifications.qnt || true
          quint verify --invariant=containerInvariant docs/formal_specs/quint_specifications.qnt || true
          quint verify --invariant=fppsInvariant docs/formal_specs/quint_specifications.qnt || true

  # =============================================================================
  # G4: Safety Analysis Gate (ExUnit)
  # =============================================================================
  g4-safety-analysis:
    name: G4 - Safety Analysis
    runs-on: ubuntu-latest
    needs: [g1-spec-validity]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: indrajaal
          POSTGRES_PASSWORD: indrajaal_dev
          POSTGRES_DB: indrajaal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install Dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run SIL Compliance Tests
        run: MIX_ENV=test mix test test/indrajaal/compliance/sil_compliance_test.exs --trace

      - name: Run FMEA Hazard Analysis Tests
        run: MIX_ENV=test mix test test/indrajaal/safety/fmea_hazard_analysis_test.exs --trace

      - name: Run FPPS Consensus Tests
        run: MIX_ENV=test mix test test/indrajaal/validation/fpps_consensus_test.exs --trace

      - name: Run Cluster Quorum Tests
        run: MIX_ENV=test mix test test/indrajaal/cluster/quorum_sentinel_test.exs --trace

      - name: Run RBAC State Machine Tests
        run: MIX_ENV=test mix test test/indrajaal/access_control/rbac_state_machine_test.exs --trace

      - name: Run Auth Security Tests
        run: MIX_ENV=test mix test test/indrajaal/authentication/auth_security_test.exs --trace

      - name: Run Device Failsafe Tests
        run: MIX_ENV=test mix test test/indrajaal/devices/device_failsafe_test.exs --trace

      - name: Run Safety-Critical Comm Tests
        run: MIX_ENV=test mix test test/indrajaal/communication/safety_critical_comm_test.exs --trace

      - name: All Formal Verification Tests Summary
        run: |
          echo "Running all formal verification tests..."
          MIX_ENV=test mix test \
            test/indrajaal/compliance/sil_compliance_test.exs \
            test/indrajaal/devices/device_failsafe_test.exs \
            test/indrajaal/authentication/auth_security_test.exs \
            test/indrajaal/safety/fmea_hazard_analysis_test.exs \
            test/indrajaal/validation/fpps_consensus_test.exs \
            test/indrajaal/access_control/rbac_state_machine_test.exs \
            test/indrajaal/communication/safety_critical_comm_test.exs \
            test/indrajaal/cluster/quorum_sentinel_test.exs

  # =============================================================================
  # G5: Audit Trail Gate (Release Only)
  # =============================================================================
  g5-audit-trail:
    name: G5 - Audit Trail
    runs-on: ubuntu-latest
    needs: [g1-spec-validity, g2-proof-verification, g3-property-verification, g4-safety-analysis]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Generate Verification Report
        run: |
          echo "# Formal Verification Report" > verification-report.md
          echo "" >> verification-report.md
          echo "**Date**: $(date -Iseconds)" >> verification-report.md
          echo "**Tag**: ${{ github.ref_name }}" >> verification-report.md
          echo "**Commit**: ${{ github.sha }}" >> verification-report.md
          echo "" >> verification-report.md
          echo "## Gate Status" >> verification-report.md
          echo "" >> verification-report.md
          echo "- [x] G1: Specification Validity - PASSED" >> verification-report.md
          echo "- [x] G2: Proof Verification - PASSED" >> verification-report.md
          echo "- [x] G3: Property Verification - PASSED" >> verification-report.md
          echo "- [x] G4: Safety Analysis - PASSED" >> verification-report.md
          echo "- [x] G5: Audit Trail - GENERATED" >> verification-report.md
          echo "" >> verification-report.md
          echo "## Specifications Verified" >> verification-report.md
          echo "" >> verification-report.md
          echo "- Quint: docs/formal_specs/quint_specifications.qnt" >> verification-report.md
          echo "- Agda: docs/formal_specs/agda_proofs.agda" >> verification-report.md
          echo "- Mathematica: docs/formal_specs/mathematica_specifications.md" >> verification-report.md

      - name: Upload Verification Report
        uses: actions/upload-artifact@v4
        with:
          name: verification-report-${{ github.ref_name }}
          path: verification-report.md

      - name: Create Compliance Badge
        run: |
          echo "FORMAL_VERIFICATION_PASSED=true" >> $GITHUB_ENV

  # =============================================================================
  # Summary Job
  # =============================================================================
  verification-summary:
    name: Verification Summary
    runs-on: ubuntu-latest
    needs: [g1-spec-validity, g2-proof-verification, g3-property-verification, g4-safety-analysis]
    if: always()
    steps:
      - name: Check Gate Results
        run: |
          echo "=== FORMAL VERIFICATION SUMMARY ==="
          echo ""
          echo "G1 Spec Validity: ${{ needs.g1-spec-validity.result }}"
          echo "G2 Proof Verification: ${{ needs.g2-proof-verification.result }}"
          echo "G3 Property Verification: ${{ needs.g3-property-verification.result }}"
          echo "G4 Safety Analysis: ${{ needs.g4-safety-analysis.result }}"
          echo ""
          if [ "${{ needs.g1-spec-validity.result }}" == "success" ] && \
             [ "${{ needs.g2-proof-verification.result }}" == "success" ] && \
             [ "${{ needs.g3-property-verification.result }}" == "success" ] && \
             [ "${{ needs.g4-safety-analysis.result }}" == "success" ]; then
            echo "ALL VERIFICATION GATES PASSED"
          else
            echo "VERIFICATION FAILED - CHECK INDIVIDUAL GATES"
            exit 1
          fi
