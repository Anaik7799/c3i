---
networks:
  indrajaal-network:
    driver: bridge
services:
  app:
    command:
      - sh
      - -c
      - "mix local.hex --force && mix local.rebar --force && mix deps.get && mix compile && mix phx.server"
    container_name: app
    environment:
      # Database Configuration
      DATABASE_URL: postgres://postgres:postgres@postgres:5433/indrajaal_demo
      MIX_ENV: demo
      PHX_HOST: localhost
      PHX_SERVER: 'true'
      REDIS_URL: redis://redis:6379
      SECRET_KEY_BASE: demo_secret_key_base_64_chars_long_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      # ═══════════════════════════════════════════════════════════════════
      # DISTRIBUTED MODE CONFIGURATION (SC-CLU-001)
      # ═══════════════════════════════════════════════════════════════════
      DISTRIBUTED_MODE: 'true'
      CLUSTER_STRATEGY: 'distributed'
      # Tailscale Mesh Configuration
      TAILSCALE_DNS_SUFFIX: ${TAILSCALE_DNS_SUFFIX:-tailnet.ts.net}
      TS_HOSTNAME: ${TS_HOSTNAME:-localhost}
      TS_IP_ADDRESS: ${TS_IP_ADDRESS:-127.0.0.1}
      # Cluster Node Configuration
      CLUSTER_NODE_1: ${CLUSTER_NODE_1:-app}
      CLUSTER_NODE_2: ${CLUSTER_NODE_2:-node2}
      CLUSTER_NODE_3: ${CLUSTER_NODE_3:-node3}
      CLUSTER_POLLING_INTERVAL: '5000'
      # FLAME Configuration
      FLAME_MIN_NODES: '0'
      FLAME_MAX_NODES: '10'
      FLAME_IDLE_TIMEOUT: '30000'
      # Resource Monitoring
      RESOURCE_MONITOR_INTERVAL: '5000'
      RESOURCE_THRESHOLD_CPU: '80'
      RESOURCE_THRESHOLD_MEM: '85'
      # OpenTelemetry / SigNoz
      OTEL_SERVICE_NAME: indrajaal
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4317}
      SIGNOZ_ENABLED: 'true'
      # ═══════════════════════════════════════════════════════════════════
      # ZENOH CONFIGURATION (SC-ZENOH-INT-001)
      # ═══════════════════════════════════════════════════════════════════
      ZENOH_ENABLED: 'true'
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh:7447
      ZENOH_KEY_PREFIX: indrajaal
      ZENOH_FRACTAL_ENABLED: 'true'
      ZENOH_TELEMETRY_ENABLED: 'true'
      ZENOH_KPI_ENABLED: 'true'
      SKIP_NIF_BUILD: '1'
    image: localhost/indrajaal-app-unified:nixos-devenv
    networks:
      - indrajaal-network
    ports:
      - 4000:4000
      - 4001:4001
    depends_on:
      postgres:
        condition: service_healthy
      zenoh:
        condition: service_healthy
    volumes:
      - /home/an/dev/ver/intelitor-v5.2:/workspace:z
    working_dir: /workspace
  postgres:
    container_name: postgres
    environment:
      PGPORT: '5433'
      POSTGRES_DB: indrajaal_demo
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      TIMESCALEDB_TELEMETRY: 'off'
    image: localhost/indrajaal-timescaledb-demo:nixos-devenv
    networks:
      - indrajaal-network
    ports:
      - 5433:5433
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres", "-p", "5433"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./data/timescaledb:/var/lib/postgresql/data:z
      - ./scripts/timescale/container-entrypoint.sh:/scripts/container-entrypoint.sh:z
      - ./priv/repo/migrations:/docker-entrypoint-initdb.d:ro
  redis:
    command:
      - redis-server
      - --appendonly
      - 'yes'
    container_name: redis
    environment: {}
    image: localhost/indrajaal-redis-demo:nixos-devenv
    networks:
      - indrajaal-network
    ports:
      - 6379:6379
    volumes: {}
  # ═══════════════════════════════════════════════════════════════════════════
  # ZENOH ROUTER (SC-ZENOH-CNT-001)
  # Message broker for fractal logging and bidirectional telemetry
  # ═══════════════════════════════════════════════════════════════════════════
  zenoh:
    image: eclipse/zenoh:1.0.0
    container_name: indrajaal-zenoh
    hostname: zenoh
    restart: unless-stopped
    environment:
      RUST_LOG: info
      ZENOH_ROUTER_CONFIG: /config/zenoh.json5
    ports:
      - "7447:7447"     # Zenoh native protocol
      - "8000:8000"     # REST API (health checks, debugging)
    volumes:
      - ./config/zenoh:/config:ro
      - zenoh-data:/var/zenoh
    networks:
      - indrajaal-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7447"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      indrajaal.service: zenoh
      indrajaal.criticality: P0
      indrajaal.stamp: SC-ZENOH-CNT-001
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ═══════════════════════════════════════════════════════════════════════════
  # KMS CATALOG LAYER (Backstage Replacement)
  # ═══════════════════════════════════════════════════════════════════════════
  kms-catalog:
    build:
      context: .
      dockerfile: Dockerfile.kms-catalog
    image: localhost/cepaf-kms-catalog:latest
    container_name: kms-catalog
    hostname: kms-catalog
    networks:
      - indrajaal-network
    environment:
      - KMS_DB_PATH=/app/data/kms/holons.db
      - ZENOH_ROUTER_ENDPOINT=tcp/zenoh:7447
    volumes:
      - ./data/kms:/app/data/kms:z
    depends_on:
      postgres:
        condition: service_healthy
      zenoh:
        condition: service_healthy
    restart: unless-stopped

volumes:
  zenoh-data:
    driver: local
version: '3.8'