      <text x="0" y="-20" text-anchor="middle" class="data-val">ollama-gpu</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">Gemma 4 Inference</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">Local SLM</text>
    </g>

    <g transform="translate(-260, -150)">
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" class="hex"/>
      <text x="0" y="-20" text-anchor="middle" class="data-val">playwright-e2e</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">Agentic UI Tester</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">Chrome Stable</text>
    </g>

    <g transform="translate(520, -300)">
