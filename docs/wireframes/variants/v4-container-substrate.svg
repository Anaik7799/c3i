      <text x="0" y="-20" text-anchor="middle" class="data-val">cepaf-elixir</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">Phoenix LiveView</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">Port 4000 (Legacy)</text>
    </g>
    
    <g transform="translate(520, 0)">
