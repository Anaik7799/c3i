      <text x="0" y="-20" text-anchor="middle" class="data-val">signoz-otel</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">Telemetry Sink</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">Span &amp; Metrics</text>
    </g>

    <g transform="translate(520, 300)">
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" class="hex"/>
      <text x="0" y="-20" text-anchor="middle" class="data-val">clickhouse</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">OLAP Store</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">Fast Aggregation</text>
    </g>

    <g transform="translate(-520, -300)">
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" class="hex"/>
      <text x="0" y="-20" text-anchor="middle" class="data-val">fsharp-bridge</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">Legacy ConstSync</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">Deprecated</text>
    </g>

    <g transform="translate(-520, 0)">
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" class="hex"/>
      <text x="0" y="-20" text-anchor="middle" class="data-val">intelitor-obs</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">Prometheus</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">Port 9090</text>
    </g>

    <g transform="translate(-520, 300)">
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" class="hex"/>
      <text x="0" y="-20" text-anchor="middle" class="data-val">intelitor-nginx</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">Reverse Proxy</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">Port 80/443</text>
    </g>
    
    <g transform="translate(0, -600)">
