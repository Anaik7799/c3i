      <text x="0" y="-20" text-anchor="middle" class="data-val">redis-cache</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">Session Store</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">Sub-10ms</text>
    </g>

    <g transform="translate(260, -450)">
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" class="hex"/>
      <text x="0" y="-20" text-anchor="middle" class="data-val">tui-dashboard</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">Headless TTY</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">Ratatui ANSI</text>
    </g>

    <g transform="translate(-260, -450)">
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" class="hex"/>
      <text x="0" y="-20" text-anchor="middle" class="data-val">gchat-webhook</text>
      <text x="0" y="10" text-anchor="middle" class="data-text">Intent Poller</text>
      <text x="0" y="30" text-anchor="middle" class="data-text">25 Classifications</text>
    </g>

  </g>
  
  <!-- Outer Decor -->
  <path d="M 120,1500 L 2280,1500" stroke="#121212" stroke-width="4"/>
  <text x="120" y="1480" font-family="Roboto" font-size="18" fill="#424242">Podman UDS Orchestration | Build Order: Rust -> Gleam -> Elixir -> F# | Target: 20 CPU Cores, 56GB RAM</text>
</svg>