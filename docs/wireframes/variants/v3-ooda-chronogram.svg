<svg width="2400" height="1600" viewBox="0 0 2400 1600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sapphire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="50%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="50%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
    <style>
      .bg { fill: #FFFFFF; }
      .title { font-family: 'Georgia', serif; font-size: 80px; fill: #0D47A1; font-weight: bold; letter-spacing: 12px; }
      .subtitle { font-family: 'Courier New', monospace; font-size: 24px; fill: #B71C1C; letter-spacing: 4px; }
      .ring { fill: none; stroke: #1976D2; opacity: 0.3; }
      .data-text { font-family: 'Roboto', sans-serif; font-size: 14px; fill: #212121; }
      .data-val { font-family: 'Courier New', monospace; font-size: 16px; fill: #B71C1C; font-weight: bold; }
      .arc { fill: none; stroke: url(#sapphire); stroke-width: 20; }
      .tick { stroke: #0D47A1; stroke-width: 2; }
    </style>
  </defs>

  <rect width="2400" height="1600" class="bg"/>

  <text x="120" y="150" class="title">OODA LOOP LATENCY CHRONOGRAM</text>
  <text x="120" y="210" class="subtitle">VARIANT III / COGNITIVE PERFORMANCE / C3I DATA-VIZ</text>

  <g transform="translate(1200, 900)">
    <!-- Base Rings -->
    <circle r="200" class="ring" stroke-width="4"/>
    <circle r="300" class="ring" stroke-width="2"/>
    <circle r="400" class="ring" stroke-dasharray="10,5"/>
    <circle r="500" class="ring" stroke-width="1"/>
    <circle r="600" class="ring" stroke-dasharray="2,4"/>
    <circle r="700" class="ring" stroke-width="3"/>

    <!-- Central Hub -->
    <circle r="150" fill="url(#sapphire)"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Georgia" font-size="40" fill="white">OODA</text>
    <text x="0" y="30" text-anchor="middle" font-family="Courier New" font-size="20" fill="white">Cycle: &lt;30ms</text>

    <!-- Data Ticks and Arcs -->
    <!-- 13 Domains (27.69 degrees each) -->
    <!-- Domain 1: OODA -->
    <g transform="rotate(0)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="30"/>
      <text x="350" y="-5" class="data-val">OODA (7 Rules)</text>
      <text x="350" y="15" class="data-text">Latency: 2.1ms | Reliability: 100%</text>
    </g>
    <!-- Domain 2: Preflight -->
    <g transform="rotate(27.69)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="15"/>
      <text x="350" y="-5" class="data-val">Preflight (4 Rules)</text>
      <text x="350" y="15" class="data-text">Latency: 0.8ms</text>
    </g>
    <!-- Domain 3: Recovery -->
    <g transform="rotate(55.38)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="25"/>
      <text x="350" y="-5" class="data-val">Recovery (6 Rules)</text>
      <text x="350" y="15" class="data-text">SC-ALLIUM-001 Verified</text>
    </g>
    <!-- Domain 4: Health -->
    <g transform="rotate(83.07)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="15"/>
      <text x="350" y="-5" class="data-val">Health (4 Rules)</text>
      <text x="350" y="15" class="data-text">FPPS 5-Method Consensus</text>
    </g>
    <!-- Domain 5: Cascade -->
    <g transform="rotate(110.76)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="12"/>
      <text x="350" y="-5" class="data-val">Cascade (3 Rules)</text>
    </g>
    <!-- Domain 6: Partition -->
    <g transform="rotate(138.45)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="12"/>
      <text x="350" y="-5" class="data-val">Partition (3 Rules)</text>
    </g>
    <!-- Domain 7: Launch -->
    <g transform="rotate(166.14)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="12"/>
      <text x="350" y="-5" class="data-val" transform="rotate(180,350,-5)">Launch (3 Rules)</text>
    </g>
    <!-- Domain 8: Governor -->
    <g transform="rotate(193.83)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="12"/>
      <text x="350" y="-5" class="data-val" transform="rotate(180,350,-5)">Governor (3 Rules)</text>
    </g>
    <!-- Domain 9: Verify -->
    <g transform="rotate(221.52)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="12"/>
      <text x="350" y="-5" class="data-val" transform="rotate(180,350,-5)">Verify (3 Rules)</text>
    </g>
    <!-- Domain 10: Build -->
    <g transform="rotate(249.21)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="12"/>
      <text x="350" y="-5" class="data-val" transform="rotate(180,350,-5)">Build (3 Rules)</text>
      <text x="350" y="15" class="data-text" transform="rotate(180,350,15)">Build Order: Rust -> Gleam -> Elixir</text>
    </g>
    <!-- Domain 11: Apoptosis -->
    <g transform="rotate(276.90)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="16"/>
      <text x="350" y="-5" class="data-val" transform="rotate(180,350,-5)">Apoptosis (4 Rules)</text>
    </g>
    <!-- Domain 12: RCA -->
    <g transform="rotate(304.59)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="16"/>
      <text x="350" y="-5" class="data-val" transform="rotate(180,350,-5)">RCA (4 Rules)</text>
    </g>
    <!-- Domain 13: Hysteresis -->
    <g transform="rotate(332.28)">
      <line x1="200" y1="0" x2="220" y2="0" class="tick"/>
      <path d="M 250,0 A 250,250 0 0,1 216,125" class="arc" stroke-width="12"/>
      <text x="350" y="-5" class="data-val" transform="rotate(180,350,-5)">Hysteresis (3 Rules)</text>
      <text x="350" y="15" class="data-text" transform="rotate(180,350,15)">Entropy Threshold Gating</text>
    </g>
    
    <!-- Outer Data Track -->
    <g transform="rotate(-90)">
      <text x="720" y="0" class="data-val">Total RETE-UL Rules: 52</text>
      <text x="720" y="20" class="data-text">Engine: rust-rule-engine v1.20.1</text>
    </g>
  </g>

  <text x="120" y="1500" class="data-text">Inference Tiers: gemini-live-ws -> gemini-2.5-rest -> gemini-3.1-rest -> ollama-gemma4 -> ollama-gemma3 -> rule-fallback</text>
</svg>