<svg width="1920" height="1200" viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="platGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E4E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5F5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B0BEC5;stop-opacity:1" />
    </linearGradient>
    <style>
      .bg { fill: #FFFFFF; }
      .ray { stroke: url(#platGrad); stroke-width: 3; fill: none; opacity: 0.6; }
      .eye-outer { fill: #121212; stroke: #E5E4E2; stroke-width: 3; }
      .iris { fill: #00FFFF; opacity: 0.9; }
      .text-main { font-family: 'Roboto', sans-serif; font-weight: 900; font-size: 56px; fill: #121212; letter-spacing: 8px; }
      .text-sub { font-family: 'Roboto', sans-serif; font-weight: 300; font-size: 28px; fill: #607D8B; }
      .stamp-glyph { font-family: monospace; font-size: 8px; fill: #607D8B; }
    </style>
  </defs>

  <rect width="1920" height="1200" class="bg" />

  <!-- Sunburst Rays with STAMP Glyphs -->
  <g transform="translate(960, 600)">
    <g>
      <circle r="1000" fill="none" stroke="#F5F5F5" stroke-width="1" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="120s" repeatCount="indefinite" />
    </g>
    
    <!-- 16 Functional Rays -->
    <g>
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
      <text x="5" y="-950" class="stamp-glyph">SC-TODO-001</text>
    </g>
    <g transform="rotate(22.5)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
      <text x="5" y="-950" class="stamp-glyph">SC-ASSP-001</text>
    </g>
    <g transform="rotate(45)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
      <text x="5" y="-950" class="stamp-glyph">SC-SIL6-001</text>
    </g>
    <g transform="rotate(67.5)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
      <text x="5" y="-950" class="stamp-glyph">SC-ZK-001</text>
    </g>
    <g transform="rotate(90)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
      <text x="5" y="-950" class="stamp-glyph">SC-HMI-001</text>
    </g>
    <g transform="rotate(112.5)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
    <g transform="rotate(135)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
    <g transform="rotate(157.5)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
    <g transform="rotate(180)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
    <g transform="rotate(202.5)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
    <g transform="rotate(225)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
    <g transform="rotate(247.5)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
    <g transform="rotate(270)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
    <g transform="rotate(292.5)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
    <g transform="rotate(315)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
    <g transform="rotate(337.5)">
      <path d="M 0,0 L 50,-900 L 0,-1100 L -50,-900 Z" class="ray" />
    </g>
  </g>

  <!-- The Eye of the Guardian (Enhanced Iris) -->
  <g transform="translate(960, 600)">
    <path d="M -450,0 Q 0,-300 450,0 Q 0,300 -450,0 Z" class="eye-outer" />
    <!-- Iris Kaleidoscope -->
    <g>
      <circle r="120" class="iris" />
      <polygon points="0,-120 104,60 -104,60" fill="#121212" opacity="0.3" />
      <polygon points="0,120 -104,-60 104,-60" fill="#121212" opacity="0.3" />
      <circle r="40" fill="#121212" />
      <circle r="15" fill="#00FFFF" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </g>
    
    <!-- Outer Fractal Rings -->
    <circle r="200" fill="none" stroke="#E5E4E2" stroke-width="1" opacity="0.5" />
    <circle r="220" fill="none" stroke="#E5E4E2" stroke-width="0.5" opacity="0.3" />
  </g>

  <text x="60" y="100" class="text-main">THE ETERNAL WATCH</text>
  <text x="60" y="150" class="text-sub">Regression 20: Cognitive Singularity Validated</text>
</svg>
