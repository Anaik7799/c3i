<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Inter, sans-serif">
<rect width="1920" height="1080" fill="#040810"/>

<!-- The inverted tree (Ashvattha from Gita 15.1) — roots above, branches below -->
<!-- Root (origin) at top center -->
<line x1="960" y1="100" x2="960" y2="250" stroke="#f5a623" stroke-width="3" opacity="0.5"/>

<!-- Main trunk -->
<line x1="960" y1="250" x2="960" y2="500" stroke="#00d4aa" stroke-width="4" opacity="0.3"/>

<!-- 8 branches (fractal layers) spreading downward -->
<line x1="960" y1="350" x2="600" y2="550" stroke="#ff6b6b" stroke-width="2" opacity="0.3"/>
<line x1="960" y1="380" x2="700" y2="600" stroke="#ffd93d" stroke-width="2" opacity="0.3"/>
<line x1="960" y1="400" x2="800" y2="650" stroke="#6bcb77" stroke-width="2" opacity="0.3"/>
<line x1="960" y1="420" x2="880" y2="680" stroke="#4d96ff" stroke-width="2" opacity="0.3"/>
<line x1="960" y1="420" x2="1040" y2="680" stroke="#9b59b6" stroke-width="2" opacity="0.3"/>
<line x1="960" y1="400" x2="1120" y2="650" stroke="#00d4aa" stroke-width="2" opacity="0.3"/>
<line x1="960" y1="380" x2="1220" y2="600" stroke="#e74c3c" stroke-width="2" opacity="0.3"/>
<line x1="960" y1="350" x2="1320" y2="550" stroke="#f39c12" stroke-width="2" opacity="0.3"/>

<!-- Leaf nodes (modules) as small dots on branch tips -->
<circle cx="600" cy="550" r="10" fill="#ff6b6b" opacity="0.5"/>
<text x="600" y="580" text-anchor="middle" fill="#ff6b6b" font-size="11">L0 Constitutional</text>
<circle cx="700" cy="600" r="10" fill="#ffd93d" opacity="0.5"/>
<text x="700" y="630" text-anchor="middle" fill="#ffd93d" font-size="11">L1 Atomic</text>
<circle cx="800" cy="650" r="10" fill="#6bcb77" opacity="0.5"/>
<text x="800" y="680" text-anchor="middle" fill="#6bcb77" font-size="11">L2 Component</text>
<circle cx="880" cy="680" r="10" fill="#4d96ff" opacity="0.5"/>
<text x="880" y="710" text-anchor="middle" fill="#4d96ff" font-size="11">L3 Transaction</text>
<circle cx="1040" cy="680" r="10" fill="#9b59b6" opacity="0.5"/>
<text x="1040" y="710" text-anchor="middle" fill="#9b59b6" font-size="11">L4 System</text>
<circle cx="1120" cy="650" r="10" fill="#00d4aa" opacity="0.5"/>
<text x="1120" y="680" text-anchor="middle" fill="#00d4aa" font-size="11">L5 Cognitive</text>
<circle cx="1220" cy="600" r="10" fill="#e74c3c" opacity="0.5"/>
<text x="1220" y="630" text-anchor="middle" fill="#e74c3c" font-size="11">L6 Ecosystem</text>
<circle cx="1320" cy="550" r="10" fill="#f39c12" opacity="0.5"/>
<text x="1320" y="580" text-anchor="middle" fill="#f39c12" font-size="11">L7 Federation</text>

<!-- Root (source) at top -->
<circle cx="960" cy="100" r="15" fill="#f5a623" opacity="0.7"/>
<circle cx="960" cy="100" r="6" fill="#040810"/>
<circle cx="960" cy="100" r="3" fill="#fff"/>
<text x="960" y="80" text-anchor="middle" fill="#f5a623" font-size="12">ORIGIN</text>

<!-- OODA at trunk center -->
<circle cx="960" cy="420" r="30" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.4"/>
<text x="960" y="425" text-anchor="middle" fill="#00d4aa" font-size="10" font-weight="bold">OODA</text>

<!-- Title -->
<text x="960" y="800" text-anchor="middle" fill="#f5a623" font-size="36" font-weight="300" letter-spacing="6">ASHVATTHA</text>
<text x="960" y="830" text-anchor="middle" fill="#e0e6ed" font-size="15" font-weight="300">The Inverted Tree — roots in the eternal, branches in the manifest</text>

<!-- Gita verse -->
<text x="960" y="900" text-anchor="middle" fill="#f5a623" font-size="16" letter-spacing="2" font-family="Noto Sans Devanagari, serif">ऊर्ध्वमूलमधःशाखमश्वत्थं प्राहुरव्ययम्</text>
<text x="960" y="930" text-anchor="middle" fill="#e0e6ed" font-size="12" font-style="italic">They speak of an eternal Ashvattha tree with roots above and branches below</text>
<text x="960" y="955" text-anchor="middle" fill="#7a8fa6" font-size="10">Bhagavad Gita 15.1</text>

<!-- Metrics along bottom -->
<text x="240" y="1010" fill="#3dd68c" font-size="32" font-weight="bold" text-anchor="middle">5,436</text>
<text x="240" y="1035" fill="#7a8fa6" font-size="11" text-anchor="middle">tests</text>
<text x="560" y="1010" fill="#4d96ff" font-size="32" font-weight="bold" text-anchor="middle">336</text>
<text x="560" y="1035" fill="#7a8fa6" font-size="11" text-anchor="middle">modules</text>
<text x="880" y="1010" fill="#f5a623" font-size="32" font-weight="bold" text-anchor="middle">125</text>
<text x="880" y="1035" fill="#7a8fa6" font-size="11" text-anchor="middle">NIFs</text>
<text x="1120" y="1010" fill="#ff6b6b" font-size="32" font-weight="bold" text-anchor="middle">2,609</text>
<text x="1120" y="1035" fill="#7a8fa6" font-size="11" text-anchor="middle">holons</text>
<text x="1440" y="1010" fill="#00d4aa" font-size="32" font-weight="bold" text-anchor="middle">255</text>
<text x="1440" y="1035" fill="#7a8fa6" font-size="11" text-anchor="middle">commits</text>
<text x="1700" y="1010" fill="#9b59b6" font-size="32" font-weight="bold" text-anchor="middle">12</text>
<text x="1700" y="1035" fill="#7a8fa6" font-size="11" text-anchor="middle">releases</text>
</svg>
