<svg width="1920" height="1200" viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CD7F32;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#E1A95F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD39B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
    <style>
      .bg { fill: #FFFFFF; }
      .helix-line { stroke: url(#bronzeGrad); stroke-width: 10; fill: none; }
      .helix-inner { stroke: #CD7F32; stroke-width: 2; fill: none; opacity: 0.4; }
      .cell-node { fill: #013220; stroke: #98FF98; stroke-width: 3; }
      .cell-organelle { fill: #98FF98; opacity: 0.6; }
      .text-bold { font-family: 'Roboto', sans-serif; font-weight: 900; font-size: 56px; fill: #013220; letter-spacing: 4px; }
      .text-light { font-family: 'Roboto', sans-serif; font-weight: 300; font-size: 28px; fill: #8B4513; }
      .deco-arch { fill: none; stroke: #013220; stroke-width: 2; opacity: 0.15; }
      .dna-glyph { fill: #CD7F32; font-family: monospace; font-size: 10px; font-weight: bold; }
    </style>
  </defs>

  <rect width="1920" height="1200" class="bg" />

  <!-- Tiered Arches (Regression Enhanced) -->
  <g transform="translate(960, 1200)">
    <path d="M -900,0 A 900,900 0 0,1 900,0" class="deco-arch" />
    <path d="M -850,0 A 850,850 0 0,1 850,0" class="deco-arch" stroke-dasharray="10,5" />
    <path d="M -700,0 A 700,700 0 0,1 700,0" class="deco-arch" />
    <path d="M -500,0 A 500,500 0 0,1 500,0" class="deco-arch" stroke-width="4" />
  </g>

  <!-- Biomorphic Helix (Enhanced) -->
  <g transform="translate(960, 50)">
    <!-- Main Strands -->
    <path d="M -120,0 C -250,250 250,500 -120,750 C -250,1000 250,1250 -120,1500" class="helix-line" />
    <path d="M -120,0 C -250,250 250,500 -120,750 C -250,1000 250,1250 -120,1500" class="helix-inner" transform="translate(10,0)" />
    
    <path d="M 120,0 C 250,250 -250,500 120,750 C 250,1000 -250,1250 120,1500" class="helix-line" />
    <path d="M 120,0 C 250,250 -250,500 120,750 C 250,1000 -250,1250 120,1500" class="helix-inner" transform="translate(-10,0)" />
    
    <!-- Connectors with Glyphs -->
    <g transform="translate(0, 200)">
      <line x1="-180" y1="0" x2="180" y2="0" stroke="#CD7F32" stroke-width="3" />
      <text x="0" y="-5" text-anchor="middle" class="dna-glyph">A-T G-C</text>
      <circle cx="-180" cy="0" r="20" class="cell-node" />
      <circle cx="-180" cy="0" r="5" class="cell-organelle" />
      <circle cx="180" cy="0" r="20" class="cell-node" />
      <circle cx="180" cy="0" r="5" class="cell-organelle" />
    </g>

    <g transform="translate(0, 500)">
      <line x1="-180" y1="0" x2="180" y2="0" stroke="#CD7F32" stroke-width="3" />
      <text x="0" y="-5" text-anchor="middle" class="dna-glyph">C-G T-A</text>
      <circle cx="-180" cy="0" r="20" class="cell-node" />
      <circle cx="180" cy="0" r="20" class="cell-node" />
    </g>

    <g transform="translate(0, 800)">
      <line x1="-180" y1="0" x2="180" y2="0" stroke="#CD7F32" stroke-width="3" />
      <text x="0" y="-5" text-anchor="middle" class="dna-glyph">SIL-6</text>
      <circle cx="-180" cy="0" r="20" class="cell-node" />
      <circle cx="180" cy="0" r="20" class="cell-node" />
    </g>

    <g transform="translate(0, 1100)">
      <line x1="-180" y1="0" x2="180" y2="0" stroke="#CD7F32" stroke-width="3" />
      <text x="0" y="-5" text-anchor="middle" class="dna-glyph">PODMAN</text>
      <circle cx="-180" cy="0" r="20" class="cell-node" />
      <circle cx="180" cy="0" r="20" class="cell-node" />
    </g>
    
    <!-- L0 Guardian Apex -->
    <g transform="translate(0, -30)">
      <polygon points="0,-60 40,0 0,60 -40,0" fill="#CD7F32" stroke="#013220" stroke-width="2" />
      <text x="0" y="8" text-anchor="middle" font-family="Roboto" font-size="16" fill="white" font-weight="900">L0</text>
    </g>
  </g>

  <text x="60" y="100" class="text-bold">BIOMORPHIC SYMMETRY</text>
  <text x="60" y="150" class="text-light">Regression 20: Genetic Integrity Enforced</text>
</svg>
