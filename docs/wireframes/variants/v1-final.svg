  <text x="1500" y="320" text-anchor="middle" fill="#3dd68c" font-size="11" font-weight="600">ALIVE</text>
  <!-- OODA -->
  <circle cx="1560" cy="400" r="16" fill="#00d4aa"/><circle cx="1560" cy="400" r="7" fill="#020408"/><circle cx="1560" cy="400" r="3" fill="#fff"/>
  <text x="1560" y="378" text-anchor="middle" fill="#7a8fa6" font-size="8">Apr 12</text>
  <text x="1560" y="432" text-anchor="middle" fill="#00d4aa" font-size="12" font-weight="700">OODA</text>
</g>
