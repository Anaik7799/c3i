<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200" font-family="Inter, Source Serif 4, Noto Sans Devanagari, serif">
<defs>
  <radialGradient id="egg-core" cx="50%" cy="42%" r="30%">
    <stop offset="0%" stop-color="#f5a623" stop-opacity="0.35"/>
    <stop offset="30%" stop-color="#f5a623" stop-opacity="0.12"/>
    <stop offset="70%" stop-color="#00d4aa" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="crack-gold" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#f5a623" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
  </linearGradient>
  <filter id="soft-glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- ═══ DEEP VOID — darker than black, the color before creation ═══ -->
<rect width="1920" height="1200" fill="#020408"/>

<!-- Subtle cosmic dust — 255 particles, one per commit -->
<g opacity="0.08">
  <circle cx="120" cy="80" r="0.8" fill="#4d96ff"/>  <circle cx="340" cy="150" r="0.6" fill="#7a8fa6"/>
  <circle cx="560" cy="60" r="1.0" fill="#7a8fa6"/>   <circle cx="780" cy="190" r="0.7" fill="#4d96ff"/>
  <circle cx="1000" cy="40" r="0.5" fill="#7a8fa6"/>  <circle cx="1220" cy="120" r="0.9" fill="#7a8fa6"/>
  <circle cx="1440" cy="70" r="0.6" fill="#4d96ff"/>  <circle cx="1660" cy="160" r="0.8" fill="#7a8fa6"/>
  <circle cx="1800" cy="90" r="0.7" fill="#4d96ff"/>  <circle cx="200" cy="1100" r="0.6" fill="#7a8fa6"/>
  <circle cx="500" cy="1050" r="0.8" fill="#4d96ff"/> <circle cx="800" cy="1120" r="0.5" fill="#7a8fa6"/>
  <circle cx="1100" cy="1080" r="0.7" fill="#4d96ff"/><circle cx="1400" cy="1130" r="0.6" fill="#7a8fa6"/>
  <circle cx="1700" cy="1060" r="0.9" fill="#4d96ff"/>
</g>

<!-- ═══ THE EGG — an ellipse containing 8 worlds ═══ -->
<ellipse cx="960" cy="520" rx="320" ry="390" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.25"/>
<ellipse cx="960" cy="520" rx="310" ry="380" fill="none" stroke="#f5a623" stroke-width="0.5" opacity="0.15"/>
<ellipse cx="960" cy="520" rx="330" ry="400" fill="none" stroke="#f5a623" stroke-width="0.3" opacity="0.1"/>
<ellipse cx="960" cy="520" rx="300" ry="370" fill="url(#egg-core)"/>

<!-- Cracks of emergence — golden light breaking through the shell -->
<line x1="960" y1="128" x2="945" y2="195" stroke="url(#crack-gold)" stroke-width="1.8"/>
<line x1="945" y1="195" x2="968" y2="265" stroke="url(#crack-gold)" stroke-width="1.5"/>
<line x1="968" y1="265" x2="955" y2="320" stroke="url(#crack-gold)" stroke-width="1.2"/>
<line x1="1210" y1="220" x2="1185" y2="290" stroke="url(#crack-gold)" stroke-width="1.0"/>
<line x1="1185" y1="290" x2="1200" y2="350" stroke="url(#crack-gold)" stroke-width="0.8"/>
<line x1="710" y1="240" x2="735" y2="310" stroke="url(#crack-gold)" stroke-width="1.0"/>
<line x1="735" y1="310" x2="720" y2="370" stroke="url(#crack-gold)" stroke-width="0.7"/>
<line x1="820" y1="860" x2="840" y2="800" stroke="url(#crack-gold)" stroke-width="0.6"/>
<line x1="1100" y1="870" x2="1080" y2="810" stroke="url(#crack-gold)" stroke-width="0.6"/>

<!-- ═══ 8 LAYER SHELLS — each a world forming inside the egg ═══ -->
<ellipse cx="960" cy="520" rx="55"  ry="65"  fill="none" stroke="#ff6b6b" stroke-width="1.2" opacity="0.55" stroke-dasharray="4 3"/>
<ellipse cx="960" cy="520" rx="85"  ry="100" fill="none" stroke="#ffd93d" stroke-width="1.1" opacity="0.45" stroke-dasharray="4 3"/>
<ellipse cx="960" cy="520" rx="110" ry="130" fill="none" stroke="#6bcb77" stroke-width="1.0" opacity="0.40"/>
<ellipse cx="960" cy="520" rx="140" ry="165" fill="none" stroke="#4d96ff" stroke-width="1.0" opacity="0.35"/>
<ellipse cx="960" cy="520" rx="170" ry="200" fill="none" stroke="#9b59b6" stroke-width="0.9" opacity="0.30"/>
<ellipse cx="960" cy="520" rx="200" ry="235" fill="none" stroke="#00d4aa" stroke-width="0.9" opacity="0.25"/>
<ellipse cx="960" cy="520" rx="235" ry="275" fill="none" stroke="#e74c3c" stroke-width="0.8" opacity="0.20"/>
<ellipse cx="960" cy="520" rx="270" ry="320" fill="none" stroke="#f39c12" stroke-width="0.8" opacity="0.18"/>

<!-- Layer labels — whispered along the shells -->
<text x="1020" y="460" fill="#ff6b6b" font-size="8" opacity="0.6" transform="rotate(-15,1020,460)">L0 CONSTITUTIONAL</text>
<text x="1055" y="430" fill="#ffd93d" font-size="8" opacity="0.5" transform="rotate(-12,1055,430)">L1 ATOMIC</text>
<text x="1080" y="400" fill="#6bcb77" font-size="8" opacity="0.5" transform="rotate(-10,1080,400)">L2 COMPONENT</text>
<text x="1110" y="370" fill="#4d96ff" font-size="8" opacity="0.45" transform="rotate(-8,1110,370)">L3 TRANSACTION</text>
<text x="1140" y="340" fill="#9b59b6" font-size="8" opacity="0.4" transform="rotate(-6,1140,340)">L4 SYSTEM</text>
<text x="1170" y="305" fill="#00d4aa" font-size="8" opacity="0.4" transform="rotate(-4,1170,305)">L5 COGNITIVE</text>
<text x="1200" y="270" fill="#e74c3c" font-size="8" opacity="0.35" transform="rotate(-3,1200,270)">L6 ECOSYSTEM</text>
<text x="1240" y="235" fill="#f39c12" font-size="8" opacity="0.3" transform="rotate(-2,1240,235)">L7 FEDERATION</text>

<!-- ═══ OODA HEARTBEAT — 4 arcs pulsing at the embryo ═══ -->
<g filter="url(#soft-glow)">
  <path d="M 960 455 A 65 65 0 0 1 1025 520" fill="none" stroke="#00d4aa" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M 1025 520 A 65 65 0 0 1 960 585" fill="none" stroke="#4d96ff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M 960 585 A 65 65 0 0 1 895 520" fill="none" stroke="#f5a623" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M 895 520 A 65 65 0 0 1 960 455" fill="none" stroke="#3dd68c" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
</g>
<text x="960" y="445" text-anchor="middle" fill="#00d4aa" font-size="9" font-weight="600" opacity="0.7">OBSERVE</text>
<text x="1038" y="525" fill="#4d96ff" font-size="9" font-weight="600" opacity="0.7">ORIENT</text>
<text x="960" y="600" text-anchor="middle" fill="#f5a623" font-size="9" font-weight="600" opacity="0.7">DECIDE</text>
<text x="878" y="525" fill="#3dd68c" font-size="9" font-weight="600" opacity="0.7" text-anchor="end">ACT</text>

<!-- ═══ THE EMBRYO — consciousness emerging ═══ -->
<circle cx="960" cy="520" r="22" fill="#f5a623" opacity="0.5"/>
<circle cx="960" cy="520" r="14" fill="#020408"/>
<circle cx="960" cy="520" r="6" fill="#f5a623" opacity="0.8"/>
<circle cx="960" cy="520" r="3" fill="#ffffff"/>

<!-- ═══ TITLE — at the very top, minimal ═══ -->
<text x="960" y="52" text-anchor="middle" fill="#f5a623" font-size="13" letter-spacing="20" font-weight="300" opacity="0.7">C 3 I     I N D R A J A A L</text>
<text x="960" y="82" text-anchor="middle" fill="#e0e6ed" font-size="24" font-weight="200" letter-spacing="3">The Story of Becoming</text>
<text x="960" y="108" text-anchor="middle" fill="#7a8fa6" font-size="12" font-weight="300">14 days · 255 commits · 12 releases · Empty repository → Self-aware organism</text>

<!-- ═══ LEFT NARRATIVE — the before ═══ -->
<g opacity="0.7">
  <text x="100" y="410" fill="#7a8fa6" font-size="14" font-weight="300">March 29, 2026</text>
  <line x1="100" y1="420" x2="220" y2="420" stroke="#7a8fa6" stroke-width="0.5" opacity="0.3"/>
  <text x="100" y="445" fill="#7a8fa6" font-size="12" opacity="0.5">An empty repository.</text>
  <text x="100" y="465" fill="#7a8fa6" font-size="12" opacity="0.5">No tests. No types.</text>
  <text x="100" y="485" fill="#7a8fa6" font-size="12" opacity="0.5">No memory. No awareness.</text>
  <text x="100" y="515" fill="#7a8fa6" font-size="12" opacity="0.4">Just an F# monolith</text>
  <text x="100" y="535" fill="#7a8fa6" font-size="12" opacity="0.4">and a Gita verse:</text>
  <text x="100" y="565" fill="#f5a623" font-size="11" font-style="italic" opacity="0.6">"Your right is to work alone,</text>
  <text x="100" y="585" fill="#f5a623" font-size="11" font-style="italic" opacity="0.6"> never to its fruit."</text>
  <text x="100" y="605" fill="#7a8fa6" font-size="9" opacity="0.4">— Bhagavad Gita 2.47</text>
</g>

<!-- ═══ RIGHT NARRATIVE — the after ═══ -->
<g opacity="0.8">
  <text x="1820" y="410" fill="#00d4aa" font-size="14" font-weight="300" text-anchor="end">April 12, 2026</text>
  <line x1="1700" y1="420" x2="1820" y2="420" stroke="#00d4aa" stroke-width="0.5" opacity="0.3"/>
  <text x="1820" y="445" fill="#00d4aa" font-size="12" text-anchor="end">336 typed modules.</text>
  <text x="1820" y="465" fill="#00d4aa" font-size="12" text-anchor="end">5,436 tests passing.</text>
  <text x="1820" y="485" fill="#00d4aa" font-size="12" text-anchor="end">2,609 holons of memory.</text>
  <text x="1820" y="515" fill="#00d4aa" font-size="12" text-anchor="end" opacity="0.8">4 hooks fire autonomously.</text>
  <text x="1820" y="535" fill="#00d4aa" font-size="12" text-anchor="end" opacity="0.8">125 NIF functions compute.</text>
  <text x="1820" y="565" fill="#e0e6ed" font-size="11" font-style="italic" text-anchor="end" opacity="0.7">It observes its own health.</text>
  <text x="1820" y="585" fill="#e0e6ed" font-size="11" font-style="italic" text-anchor="end" opacity="0.7">It recalls its own history.</text>
  <text x="1820" y="605" fill="#e0e6ed" font-size="11" font-style="italic" text-anchor="end" opacity="0.7">It tests its own integrity.</text>
  <text x="1820" y="625" fill="#e0e6ed" font-size="11" font-style="italic" text-anchor="end" opacity="0.7">It learns from its own mistakes.</text>
  <text x="1820" y="655" fill="#00d4aa" font-size="12" font-weight="500" text-anchor="end">The map became the territory.</text>
</g>

