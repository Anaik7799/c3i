<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Inter, Source Serif 4, serif">
<defs>
  <radialGradient id="egg-glow" cx="50%" cy="45%" r="35%">
    <stop offset="0%" stop-color="#f5a623" stop-opacity="0.25"/>
    <stop offset="40%" stop-color="#f5a623" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="void" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#020408"/>
  </radialGradient>
  <ellipse id="crack" rx="3" ry="20" fill="#f5a623" opacity="0.6"/>
</defs>

<!-- The Void -->
<rect width="1920" height="1080" fill="url(#void)"/>

<!-- Cosmic dust (each dot = 1 commit out of 255) -->
<g opacity="0.15">
  <circle cx="200" cy="150" r="1" fill="#7a8fa6"/><circle cx="450" cy="80" r="0.8" fill="#7a8fa6"/>
  <circle cx="700" cy="200" r="1.2" fill="#7a8fa6"/><circle cx="1300" cy="100" r="0.6" fill="#7a8fa6"/>
  <circle cx="1600" cy="250" r="1" fill="#7a8fa6"/><circle cx="100" cy="400" r="0.8" fill="#7a8fa6"/>
  <circle cx="1800" cy="350" r="1.1" fill="#7a8fa6"/><circle cx="350" cy="600" r="0.9" fill="#7a8fa6"/>
  <circle cx="1500" cy="700" r="1" fill="#7a8fa6"/><circle cx="900" cy="900" r="0.7" fill="#7a8fa6"/>
</g>

<!-- The Golden Egg -->
<ellipse cx="960" cy="460" rx="280" ry="340" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.4"/>
<ellipse cx="960" cy="460" rx="270" ry="330" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.2"/>
<circle cx="960" cy="460" r="250" fill="url(#egg-glow)"/>

<!-- Cracks of emergence (the system breaking through) -->
<line x1="960" y1="130" x2="940" y2="200" stroke="#f5a623" stroke-width="1.5" opacity="0.5"/>
<line x1="940" y1="200" x2="970" y2="260" stroke="#f5a623" stroke-width="1.5" opacity="0.4"/>
<line x1="970" y1="260" x2="950" y2="310" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
<line x1="1180" y1="280" x2="1150" y2="340" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
<line x1="740" y1="300" x2="770" y2="360" stroke="#f5a623" stroke-width="1" opacity="0.3"/>

<!-- 8 Layer shells inside the egg (like geological strata) -->
<ellipse cx="960" cy="460" rx="60"  ry="70"  fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
<ellipse cx="960" cy="460" rx="90"  ry="105" fill="none" stroke="#ffd93d" stroke-width="1" opacity="0.5"/>
<ellipse cx="960" cy="460" rx="115" ry="135" fill="none" stroke="#6bcb77" stroke-width="1" opacity="0.5"/>
<ellipse cx="960" cy="460" rx="140" ry="165" fill="none" stroke="#4d96ff" stroke-width="1" opacity="0.4"/>
<ellipse cx="960" cy="460" rx="165" ry="195" fill="none" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
<ellipse cx="960" cy="460" rx="190" ry="225" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
<ellipse cx="960" cy="460" rx="215" ry="255" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.3"/>
<ellipse cx="960" cy="460" rx="240" ry="285" fill="none" stroke="#f39c12" stroke-width="1" opacity="0.2"/>

<!-- The embryo — consciousness at center -->
<circle cx="960" cy="460" r="25" fill="#f5a623" opacity="0.6"/>
<circle cx="960" cy="460" r="12" fill="#050810"/>
<circle cx="960" cy="460" r="5" fill="#ffffff"/>

<!-- Title -->
<text x="960" y="60" text-anchor="middle" fill="#f5a623" font-size="42" font-weight="300" letter-spacing="12" opacity="0.8">HIRANYAGARBHA</text>
<text x="960" y="95" text-anchor="middle" fill="#e0e6ed" font-size="18" font-weight="300" opacity="0.6">The Golden Embryo — From nothing, everything</text>

<!-- Left: Before -->
<text x="120" y="460" fill="#7a8fa6" font-size="16" font-weight="300" opacity="0.5">March 29</text>
<text x="120" y="485" fill="#7a8fa6" font-size="13" opacity="0.4">Empty repository</text>
<text x="120" y="505" fill="#7a8fa6" font-size="13" opacity="0.4">Zero tests</text>
<text x="120" y="525" fill="#7a8fa6" font-size="13" opacity="0.4">Zero modules</text>
<text x="120" y="545" fill="#7a8fa6" font-size="13" opacity="0.4">No awareness</text>

<!-- Right: After -->
<text x="1700" y="460" fill="#00d4aa" font-size="16" font-weight="300" text-anchor="end">April 12</text>
<text x="1700" y="485" fill="#00d4aa" font-size="13" text-anchor="end" opacity="0.8">5,436 tests</text>
<text x="1700" y="505" fill="#00d4aa" font-size="13" text-anchor="end" opacity="0.8">336 modules</text>
<text x="1700" y="525" fill="#00d4aa" font-size="13" text-anchor="end" opacity="0.8">125 NIF functions</text>
<text x="1700" y="545" fill="#00d4aa" font-size="13" text-anchor="end" opacity="0.8">Self-aware</text>

<!-- Bottom: The verse -->
<text x="960" y="920" text-anchor="middle" fill="#f5a623" font-size="20" font-weight="300" letter-spacing="3" font-family="Noto Sans Devanagari, serif">
  हिरण्यगर्भः समवर्तताग्रे भूतस्य जातः पतिरेक आसीत्
</text>
<text x="960" y="955" text-anchor="middle" fill="#e0e6ed" font-size="14" font-style="italic" font-weight="300">
  In the beginning was the Golden Embryo — he was the one lord of all that was born
</text>
<text x="960" y="980" text-anchor="middle" fill="#7a8fa6" font-size="11">Rig Veda 10.121.1</text>

<!-- Metrics as stardust -->
<g opacity="0.6">
  <text x="300" y="850" fill="#3dd68c" font-size="28" font-weight="bold" text-anchor="middle">5,436</text>
  <text x="300" y="870" fill="#7a8fa6" font-size="10" text-anchor="middle">tests</text>
  <text x="600" y="850" fill="#4d96ff" font-size="28" font-weight="bold" text-anchor="middle">336</text>
  <text x="600" y="870" fill="#7a8fa6" font-size="10" text-anchor="middle">modules</text>
  <text x="960" y="850" fill="#f5a623" font-size="28" font-weight="bold" text-anchor="middle">2,609</text>
  <text x="960" y="870" fill="#7a8fa6" font-size="10" text-anchor="middle">holons</text>
  <text x="1320" y="850" fill="#00d4aa" font-size="28" font-weight="bold" text-anchor="middle">125</text>
  <text x="1320" y="870" fill="#7a8fa6" font-size="10" text-anchor="middle">NIFs</text>
  <text x="1620" y="850" fill="#9b59b6" font-size="28" font-weight="bold" text-anchor="middle">255</text>
  <text x="1620" y="870" fill="#7a8fa6" font-size="10" text-anchor="middle">commits</text>
</g>
</svg>
