  <line x1="0" y1="-70" x2="0" y2="-78" transform="rotate(60)"/>
  <line x1="0" y1="-70" x2="0" y2="-78" transform="rotate(90)"/>
  <line x1="0" y1="-70" x2="0" y2="-78" transform="rotate(120)"/>
  <line x1="0" y1="-70" x2="0" y2="-78" transform="rotate(150)"/>
