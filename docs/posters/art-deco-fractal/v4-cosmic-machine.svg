  <text x="362" y="114" fill="#a8b4c0" opacity="0.4" font-size="5">ex-2</text>
  <circle cx="300" cy="200" r="7" fill="#9b2335" opacity="0.15" stroke="#2a9d8f" stroke-width="0.6"/>
  <text x="312" y="204" fill="#a8b4c0" opacity="0.4" font-size="5">ex-3</text>
  <circle cx="-300" cy="200" r="7" fill="#9b2335" opacity="0.15" stroke="#4caf6a" stroke-width="0.6"/>
  <text x="-312" y="204" fill="#a8b4c0" opacity="0.4" text-anchor="end" font-size="5">chaya</text>
