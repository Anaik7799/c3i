<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" font-family="'Didot', 'Bodoni MT', 'Playfair Display', Georgia, serif">
<!-- ═══════════════════════════════════════════════════════════════
     V4: THE COSMIC MACHINE
     The system as an Art Deco precision clockwork mechanism.
     8 concentric gear rings = fractal layers. Central escapement =
     OODA heartbeat. 16 ruby jewel bearings = containers.
     The machine runs on time itself — every cycle creates truth.

     Palette: Obsidian, Burnished Gold, Chrome, Sapphire, Ruby
     ═══════════════════════════════════════════════════════════════ -->
<defs>
  <radialGradient id="cm-bg" cx="50%" cy="42%" r="55%">
    <stop offset="0%" stop-color="#0d1020"/><stop offset="100%" stop-color="#040610"/>
  </radialGradient>
  <radialGradient id="cm-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c9a227" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
  </radialGradient>
  <filter id="cm-gl"><feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="cm-gl-sm"><feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="1200" height="1800" fill="url(#cm-bg)"/>

<!-- Art Deco triple border -->
<rect x="24" y="24" width="1152" height="1752" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
<rect x="32" y="32" width="1136" height="1736" fill="none" stroke="#c9a227" stroke-width="0.5" opacity="0.2"/>
<!-- Corner gears (decorative) -->
<g stroke="#c9a227" fill="none" opacity="0.15" stroke-width="0.8">
  <circle cx="50" cy="50" r="18"/><circle cx="50" cy="50" r="12"/>
  <circle cx="1150" cy="50" r="18"/><circle cx="1150" cy="50" r="12"/>
  <circle cx="50" cy="1750" r="18"/><circle cx="50" cy="1750" r="12"/>
  <circle cx="1150" cy="1750" r="18"/><circle cx="1150" cy="1750" r="12"/>
</g>

<!-- ═══════ TITLE ═══════ -->
<text x="600" y="80" text-anchor="middle" fill="#c9a227" font-size="11" letter-spacing="10" opacity="0.5">C3I INDRAJAAL PRESENTS</text>
<line x1="250" y1="90" x2="950" y2="90" stroke="#c9a227" stroke-width="0.5" opacity="0.2"/>
<text x="600" y="135" text-anchor="middle" fill="#c9a227" font-size="52" font-weight="bold" letter-spacing="10" filter="url(#cm-gl)">THE MACHINE</text>
<text x="600" y="168" text-anchor="middle" fill="#a8b4c0" font-size="16" letter-spacing="10" font-weight="300">PRECISION THROUGH FRACTAL ORDER</text>
<text x="600" y="195" text-anchor="middle" fill="#c9a227" font-size="13" font-family="'Noto Sans Devanagari', serif" letter-spacing="3" opacity="0.5">यन्त्र — भग्नात्मक सटीकता</text>
<line x1="250" y1="210" x2="950" y2="210" stroke="#c9a227" stroke-width="0.5" opacity="0.2"/>

