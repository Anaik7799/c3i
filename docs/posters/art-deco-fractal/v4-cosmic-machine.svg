  <line x1="0" y1="-70" x2="0" y2="-78" transform="rotate(330)"/>
</g>

<!-- OODA Quadrants on L0 gear -->
<g transform="translate(600,680)">
  <path d="M0 -50 A50 50 0 0 1 50 0" fill="none" stroke="#2a9d8f" stroke-width="3" opacity="0.5"/>
  <path d="M50 0 A50 50 0 0 1 0 50" fill="none" stroke="#4d7fff" stroke-width="3" opacity="0.5"/>
  <path d="M0 50 A50 50 0 0 1 -50 0" fill="none" stroke="#c9a227" stroke-width="3" opacity="0.5"/>
  <path d="M-50 0 A50 50 0 0 1 0 -50" fill="none" stroke="#4caf6a" stroke-width="3" opacity="0.5"/>
  <text x="0" y="-38" text-anchor="middle" fill="#2a9d8f" font-size="7" font-family="Inter, sans-serif" font-weight="bold">OBS</text>
  <text x="38" y="4" fill="#4d7fff" font-size="7" font-family="Inter, sans-serif" font-weight="bold">ORI</text>
  <text x="0" y="44" text-anchor="middle" fill="#c9a227" font-size="7" font-family="Inter, sans-serif" font-weight="bold">DEC</text>
  <text x="-38" y="4" fill="#4caf6a" font-size="7" font-family="Inter, sans-serif" text-anchor="end" font-weight="bold">ACT</text>
</g>

<!-- Central escapement (the heartbeat) -->
<circle cx="600" cy="680" r="15" fill="#c9a227" opacity="0.4" filter="url(#cm-gl)"/>
<circle cx="600" cy="680" r="8" fill="#040610"/>
<circle cx="600" cy="680" r="3" fill="#ffffff" opacity="0.9"/>

