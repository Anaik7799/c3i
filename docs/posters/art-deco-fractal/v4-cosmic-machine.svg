  <line x1="0" y1="-370" x2="0" y2="-382" transform="rotate(210)"/>
  <line x1="0" y1="-370" x2="0" y2="-382" transform="rotate(225)"/>
  <line x1="0" y1="-370" x2="0" y2="-382" transform="rotate(240)"/>
  <line x1="0" y1="-370" x2="0" y2="-382" transform="rotate(255)"/>
  <line x1="0" y1="-370" x2="0" y2="-382" transform="rotate(270)"/>
  <line x1="0" y1="-370" x2="0" y2="-382" transform="rotate(285)"/>
  <line x1="0" y1="-370" x2="0" y2="-382" transform="rotate(300)"/>
  <line x1="0" y1="-370" x2="0" y2="-382" transform="rotate(315)"/>
  <line x1="0" y1="-370" x2="0" y2="-382" transform="rotate(330)"/>
