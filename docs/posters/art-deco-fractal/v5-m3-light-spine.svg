  <text x="90" y="12" fill="#C9A227" font-size="8" font-family="'Noto Sans Devanagari',serif">मणिपूर</text>
</g>

<!-- L3 TRANSACTION -->
<g transform="translate(600,780)">
  <path d="M-55 0 Q-55 -18,0 -18 Q55 -18,55 0" fill="none" stroke="#1565C0" stroke-width="1.5" opacity="0.45"/>
  <circle r="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/><circle r="4" fill="#1565C0" opacity="0.5"/>
  <text x="-90" y="-8" fill="#1565C0" font-size="14" font-weight="bold" text-anchor="end" letter-spacing="3">L3</text>
  <text x="-90" y="8" fill="#1565C0" font-size="11" text-anchor="end" letter-spacing="2">TRANSACTION</text>
  <text x="-90" y="22" fill="#73796E" font-size="8" text-anchor="end" font-family="Inter,sans-serif">SQLite | Smriti | Planning</text>
  <text x="90" y="-2" fill="#73796E" font-size="9" font-family="Inter,sans-serif">2,609 holons | FTS5 RAG</text>
  <text x="90" y="12" fill="#C9A227" font-size="8" font-family="'Noto Sans Devanagari',serif">अनाहत</text>
</g>

<!-- L4 SYSTEM -->
<g transform="translate(600,920)">
  <path d="M-60 0 Q-60 -20,0 -20 Q60 -20,60 0" fill="none" stroke="#7B1FA2" stroke-width="1.5" opacity="0.45"/>
  <circle r="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/><circle r="4" fill="#7B1FA2" opacity="0.5"/>
  <text x="-90" y="-8" fill="#7B1FA2" font-size="14" font-weight="bold" text-anchor="end" letter-spacing="3">L4</text>
  <text x="-90" y="8" fill="#7B1FA2" font-size="11" text-anchor="end" letter-spacing="2">SYSTEM</text>
  <text x="-90" y="22" fill="#73796E" font-size="8" text-anchor="end" font-family="Inter,sans-serif">Podman | 16 containers | 7-tier boot</text>
  <text x="90" y="-2" fill="#73796E" font-size="9" font-family="Inter,sans-serif">CPU governor | Apoptosis</text>
  <text x="90" y="12" fill="#C9A227" font-size="8" font-family="'Noto Sans Devanagari',serif">विशुद्ध</text>
</g>

<!-- L5 COGNITIVE -->
<g transform="translate(600,1060)">
  <path d="M-65 0 Q-65 -22,0 -22 Q65 -22,65 0" fill="none" stroke="#00796B" stroke-width="1.5" opacity="0.5"/>
  <path d="M-45 0 Q-45 -12,0 -12 Q45 -12,45 0" fill="none" stroke="#00796B" stroke-width="0.8" opacity="0.3"/>
