  <text x="90" y="12" fill="#C9A227" font-size="8" font-family="'Noto Sans Devanagari',serif">बिन्दु — point of unity</text>
</g>

<!-- L7 FEDERATION -->
<g transform="translate(600,1340)">
  <path d="M-70 0 Q-70 -25,0 -25 Q70 -25,70 0" fill="none" stroke="#EF6C00" stroke-width="1.5" opacity="0.5"/>
  <path d="M-50 0 Q-50 -15,0 -15 Q50 -15,50 0" fill="none" stroke="#EF6C00" stroke-width="0.8" opacity="0.3"/>
  <circle r="10" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5"/><circle r="5" fill="#EF6C00" opacity="0.6"/>
  <text x="-90" y="-8" fill="#EF6C00" font-size="14" font-weight="bold" text-anchor="end" letter-spacing="3">L7</text>
  <text x="-90" y="8" fill="#EF6C00" font-size="11" text-anchor="end" letter-spacing="2">FEDERATION</text>
  <text x="-90" y="22" fill="#73796E" font-size="8" text-anchor="end" font-family="Inter,sans-serif">Gateway | Version vectors | HA</text>
  <text x="90" y="-2" fill="#73796E" font-size="9" font-family="Inter,sans-serif">Zero-downtime upgrades</text>
  <text x="90" y="12" fill="#C9A227" font-size="8" font-family="'Noto Sans Devanagari',serif">सहस्रार — crown</text>
</g>

<!-- Metrics bar -->
<g transform="translate(0,1430)">
  <rect x="100" y="0" width="1000" height="60" fill="#F1ECE9" stroke="#C9A227" stroke-width="0.8" rx="8"/>
  <g font-family="Inter,sans-serif" text-anchor="middle">
    <text x="200" y="25" fill="#006C4E" font-size="26" font-weight="bold" font-family="serif">5,436</text><text x="200" y="45" fill="#73796E" font-size="8" letter-spacing="2">TESTS</text>
    <text x="380" y="25" fill="#1565C0" font-size="26" font-weight="bold" font-family="serif">336</text><text x="380" y="45" fill="#73796E" font-size="8" letter-spacing="2">MODULES</text>
    <text x="540" y="25" fill="#C9A227" font-size="26" font-weight="bold" font-family="serif">125</text><text x="540" y="45" fill="#73796E" font-size="8" letter-spacing="2">NIF FN</text>
    <text x="700" y="25" fill="#D32F2F" font-size="26" font-weight="bold" font-family="serif">2,609</text><text x="700" y="45" fill="#73796E" font-size="8" letter-spacing="2">HOLONS</text>
    <text x="860" y="25" fill="#00796B" font-size="26" font-weight="bold" font-family="serif">9,104</text><text x="860" y="45" fill="#73796E" font-size="8" letter-spacing="2">RUST LOC</text>
    <text x="1020" y="25" fill="#7B1FA2" font-size="26" font-weight="bold" font-family="serif">73</text><text x="1020" y="45" fill="#73796E" font-size="8" letter-spacing="2">MCP</text>
  </g>
</g>

<!-- Tensor -->
<text x="600" y="1530" text-anchor="middle" fill="#C9A227" font-size="12" font-family="Inter,sans-serif">Biomorphic Tensor: <tspan font-weight="bold" font-size="16">47/56</tspan> = <tspan font-weight="bold" font-size="16">83.9%</tspan></text>

<!-- Tagline -->
<line x1="200" y1="1550" x2="1000" y2="1550" stroke="#C9A227" stroke-width="1" opacity="0.3"/>
<text x="600" y="1580" text-anchor="middle" fill="#1C1B1F" font-size="16" letter-spacing="10" font-weight="bold">INTEGRATED. OPTIMIZED. CONNECTED.</text>
<line x1="200" y1="1595" x2="1000" y2="1595" stroke="#C9A227" stroke-width="1" opacity="0.3"/>

<!-- Verse -->
<line x1="200" y1="1680" x2="1000" y2="1680" stroke="#C9A227" stroke-width="0.5" opacity="0.3"/>
<text x="600" y="1710" text-anchor="middle" fill="#C9A227" font-size="17" font-family="'Noto Sans Devanagari',serif" letter-spacing="2">सूत्रे मणिगणा इव — Like gems strung on a thread</text>
<text x="600" y="1735" text-anchor="middle" fill="#73796E" font-size="11" font-style="italic" font-family="Inter,sans-serif">All beings are strung on Me, as gems upon a thread — the Zenoh backbone IS the thread</text>
<text x="600" y="1752" text-anchor="middle" fill="#73796E" font-size="9" font-family="Inter,sans-serif">Bhagavad Gita 7.7</text>
<text x="600" y="1782" text-anchor="middle" fill="#C9A227" font-size="8" font-family="Inter,sans-serif" letter-spacing="4" opacity="0.4">C3I INDRAJAAL v22.6.1-DHARMA | THE CHRYSLER SPINE | APRIL 2026</text>
</svg>