  <text x="90" y="-2" fill="#73796E" font-size="9" font-family="Inter,sans-serif">31 Rust modules | 9,104 LOC</text>
  <text x="90" y="12" fill="#C9A227" font-size="8" font-family="'Noto Sans Devanagari',serif">आज्ञा — the third eye</text>
</g>

<!-- L6 ECOSYSTEM -->
<g transform="translate(600,1200)">
  <path d="M-65 0 Q-65 -22,0 -22 Q65 -22,65 0" fill="none" stroke="#C62828" stroke-width="1.5" opacity="0.45"/>
  <circle r="9" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/><circle r="4.5" fill="#C62828" opacity="0.55"/>
  <text x="-90" y="-8" fill="#C62828" font-size="14" font-weight="bold" text-anchor="end" letter-spacing="3">L6</text>
