<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="ui-sans-serif,system-ui">
  <rect width="100%" height="100%" fill="#0a0e17"/>
  <text x="550" y="28" fill="#e0e6ed" font-size="20" font-weight="700" text-anchor="middle">UX / CX Customer Journeys — 3 personas</text>

  <!-- persona 1: operator -->
  <g>
    <rect x="20" y="60" width="1060" height="150" rx="10" fill="#141922" stroke="#00d4aa"/>
    <text x="40" y="85" fill="#00d4aa" font-size="14" font-weight="700">Operator (Abhi) — runs the test suite</text>
    <g font-size="11" fill="#e0e6ed">
      <rect x="40"  y="105" width="140" height="80" rx="6" fill="#1e2a3a"/>
      <text x="110" y="135" text-anchor="middle">/marionette-explore</text>
      <text x="110" y="153" fill="#7a8fa6" text-anchor="middle">fluffychat onboarding</text>

      <rect x="200" y="105" width="140" height="80" rx="6" fill="#1e2a3a"/>
      <text x="270" y="135" text-anchor="middle">SessionStart probe</text>
      <text x="270" y="153" fill="#7a8fa6" text-anchor="middle">activates globals</text>

      <rect x="360" y="105" width="140" height="80" rx="6" fill="#1e2a3a"/>
      <text x="430" y="135" text-anchor="middle">flag-file primed</text>
      <text x="430" y="153" fill="#7a8fa6" text-anchor="middle">SC-MARIONETTE-003</text>

      <rect x="520" y="105" width="160" height="80" rx="6" fill="#1e2a3a"/>
      <text x="600" y="135" text-anchor="middle">200-test catalog run</text>
      <text x="600" y="153" fill="#7a8fa6" text-anchor="middle">A · L · W parity</text>

      <rect x="700" y="105" width="160" height="80" rx="6" fill="#1e2a3a"/>
      <text x="780" y="135" text-anchor="middle">evidence cache</text>
      <text x="780" y="153" fill="#7a8fa6" text-anchor="middle">screenshots+logs+tree</text>

      <rect x="880" y="105" width="170" height="80" rx="6" fill="#1e2a3a"/>
      <text x="965" y="135" text-anchor="middle">email + ZK ingest</text>
      <text x="965" y="153" fill="#7a8fa6" text-anchor="middle">+ dashboard rollup</text>
    </g>
    <g stroke="#00d4aa" stroke-width="1.5" fill="none">
      <path d="M180,145 L200,145"/><path d="M340,145 L360,145"/>
      <path d="M500,145 L520,145"/><path d="M680,145 L700,145"/>
      <path d="M860,145 L880,145"/>
    </g>
  </g>

  <!-- persona 2: developer -->
  <g>
    <rect x="20" y="225" width="1060" height="150" rx="10" fill="#141922" stroke="#3dd68c"/>
    <text x="40" y="250" fill="#3dd68c" font-size="14" font-weight="700">Developer — authors a new test</text>
    <g font-size="11" fill="#e0e6ed">
      <rect x="40"  y="270" width="140" height="80" rx="6" fill="#1e2a3a"/>
      <text x="110" y="300" text-anchor="middle">edit Flutter widget</text>
      <text x="110" y="318" fill="#7a8fa6" text-anchor="middle">add Key("send_btn")</text>

      <rect x="200" y="270" width="140" height="80" rx="6" fill="#1e2a3a"/>
      <text x="270" y="300" text-anchor="middle">flutter run --debug</text>
      <text x="270" y="318" fill="#7a8fa6" text-anchor="middle">VM URI captured</text>

      <rect x="360" y="270" width="160" height="80" rx="6" fill="#1e2a3a"/>
      <text x="440" y="300" text-anchor="middle">marionette-explorer</text>
      <text x="440" y="318" fill="#7a8fa6" text-anchor="middle">connects, lists tree</text>

      <rect x="540" y="270" width="160" height="80" rx="6" fill="#1e2a3a"/>
      <text x="620" y="300" text-anchor="middle">live drive flow</text>
      <text x="620" y="318" fill="#7a8fa6" text-anchor="middle">tap·long_press·text</text>

      <rect x="720" y="270" width="160" height="80" rx="6" fill="#1e2a3a"/>
      <text x="800" y="300" text-anchor="middle">propose CATALOG row</text>
      <text x="800" y="318" fill="#7a8fa6" text-anchor="middle">stable selectors</text>

      <rect x="900" y="270" width="150" height="80" rx="6" fill="#1e2a3a"/>
      <text x="975" y="300" text-anchor="middle">Patrol regression</text>
      <text x="975" y="318" fill="#7a8fa6" text-anchor="middle">locks the test</text>
    </g>
    <g stroke="#3dd68c" stroke-width="1.5" fill="none">
      <path d="M180,310 L200,310"/><path d="M340,310 L360,310"/>
      <path d="M520,310 L540,310"/><path d="M700,310 L720,310"/>
      <path d="M880,310 L900,310"/>
    </g>
  </g>

  <!-- persona 3: end-user simulated -->
  <g>
    <rect x="20" y="390" width="1060" height="180" rx="10" fill="#141922" stroke="#f5a623"/>
    <text x="40" y="415" fill="#f5a623" font-size="14" font-weight="700">End-user (simulated) — FluffyChat critical path</text>
    <g font-size="11" fill="#e0e6ed">
      <rect x="40"  y="435" width="120" height="120" rx="6" fill="#1e2a3a"/>
      <text x="100" y="460" text-anchor="middle">launch</text>
      <text x="100" y="478" fill="#7a8fa6" text-anchor="middle">T1</text>
      <text x="100" y="510" fill="#7a8fa6" text-anchor="middle">intro page</text>

      <rect x="180" y="435" width="120" height="120" rx="6" fill="#1e2a3a"/>
      <text x="240" y="460" text-anchor="middle">login</text>
      <text x="240" y="478" fill="#7a8fa6" text-anchor="middle">T2-T5</text>
      <text x="240" y="510" fill="#7a8fa6" text-anchor="middle">homeserver+creds</text>

      <rect x="320" y="435" width="120" height="120" rx="6" fill="#1e2a3a"/>
      <text x="380" y="460" text-anchor="middle">verify device</text>
      <text x="380" y="478" fill="#7a8fa6" text-anchor="middle">T87-T90</text>
      <text x="380" y="510" fill="#7a8fa6" text-anchor="middle">emoji match</text>

      <rect x="460" y="435" width="120" height="120" rx="6" fill="#1e2a3a"/>
      <text x="520" y="460" text-anchor="middle">send msg</text>
      <text x="520" y="478" fill="#7a8fa6" text-anchor="middle">T37-T44</text>
      <text x="520" y="510" fill="#7a8fa6" text-anchor="middle">encrypted</text>

      <rect x="600" y="435" width="120" height="120" rx="6" fill="#1e2a3a"/>
      <text x="660" y="460" text-anchor="middle">share image</text>
      <text x="660" y="478" fill="#7a8fa6" text-anchor="middle">T67-T72</text>
      <text x="660" y="510" fill="#7a8fa6" text-anchor="middle">caption+upload</text>

      <rect x="740" y="435" width="120" height="120" rx="6" fill="#1e2a3a"/>
      <text x="800" y="460" text-anchor="middle">voice call</text>
      <text x="800" y="478" fill="#7a8fa6" text-anchor="middle">T101-T103</text>
      <text x="800" y="510" fill="#7a8fa6" text-anchor="middle">mute, hangup</text>

      <rect x="880" y="435" width="120" height="120" rx="6" fill="#1e2a3a"/>
      <text x="940" y="460" text-anchor="middle">settings</text>
      <text x="940" y="478" fill="#7a8fa6" text-anchor="middle">T137-T156</text>
      <text x="940" y="510" fill="#7a8fa6" text-anchor="middle">theme, devices</text>
    </g>
    <g stroke="#f5a623" stroke-width="1.5" fill="none">
      <path d="M160,495 L180,495"/><path d="M300,495 L320,495"/>
      <path d="M440,495 L460,495"/><path d="M580,495 L600,495"/>
      <path d="M720,495 L740,495"/><path d="M860,495 L880,495"/>
    </g>
  </g>

  <text x="20" y="590" fill="#7a8fa6" font-size="10">Each step in the end-user journey maps to a T-ID range in CATALOG.md (200-test catalog).</text>
</svg>
