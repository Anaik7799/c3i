<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="ui-sans-serif,system-ui">
  <rect width="100%" height="100%" fill="#0a0e17"/>
  <text x="550" y="30" fill="#e0e6ed" font-size="20" font-weight="700" text-anchor="middle">Sequence — single Marionette test run</text>

  <!-- Lifelines -->
  <g font-size="12" fill="#e0e6ed" text-anchor="middle">
    <rect x="50"   y="55" width="120" height="32" rx="6" fill="#1e2a3a" stroke="#00d4aa"/><text x="110" y="76">Operator</text>
    <rect x="200"  y="55" width="160" height="32" rx="6" fill="#1e2a3a" stroke="#00d4aa"/><text x="280" y="76">Claude agent</text>
    <rect x="390"  y="55" width="170" height="32" rx="6" fill="#1e2a3a" stroke="#f5a623"/><text x="475" y="76">marionette_mcp</text>
    <rect x="590"  y="55" width="150" height="32" rx="6" fill="#1e2a3a" stroke="#3dd68c"/><text x="665" y="76">FluffyChat</text>
    <rect x="770"  y="55" width="130" height="32" rx="6" fill="#1e2a3a" stroke="#ffa502"/><text x="835" y="76">Hook</text>
    <rect x="930"  y="55" width="140" height="32" rx="6" fill="#1e2a3a" stroke="#9b59b6"/><text x="1000" y="76">Zenoh + RETE</text>
  </g>

  <!-- Lifeline lines -->
  <g stroke="#7a8fa6" stroke-dasharray="3,3">
    <line x1="110"  y1="87" x2="110"  y2="600"/>
    <line x1="280"  y1="87" x2="280"  y2="600"/>
    <line x1="475"  y1="87" x2="475"  y2="600"/>
    <line x1="665"  y1="87" x2="665"  y2="600"/>
    <line x1="835"  y1="87" x2="835"  y2="600"/>
    <line x1="1000" y1="87" x2="1000" y2="600"/>
  </g>

  <!-- Messages -->
  <g font-size="11" fill="#e0e6ed">
    <line x1="110" y1="110" x2="280" y2="110" stroke="#00d4aa" stroke-width="2"/>
    <text x="195" y="105" text-anchor="middle">/marionette-explore fluffychat onboarding</text>

    <line x1="280" y1="140" x2="475" y2="140" stroke="#00d4aa" stroke-width="2"/>
    <text x="377" y="135" text-anchor="middle">connect(uri)</text>

    <line x1="475" y1="170" x2="665" y2="170" stroke="#00d4aa" stroke-width="2"/>
    <text x="570" y="165" text-anchor="middle">VM: marionette.connect</text>

    <line x1="475" y1="200" x2="835" y2="200" stroke="#ffa502" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="655" y="195" text-anchor="middle">touch flag-file</text>

    <line x1="475" y1="225" x2="1000" y2="225" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="737" y="220" text-anchor="middle">PUT  start  envelope</text>

    <line x1="280" y1="265" x2="475" y2="265" stroke="#00d4aa" stroke-width="2"/>
    <text x="377" y="260" text-anchor="middle">get_interactive_elements()</text>

    <line x1="475" y1="295" x2="665" y2="295" stroke="#00d4aa" stroke-width="2"/>
    <line x1="665" y1="295" x2="475" y2="318" stroke="#00d4aa" stroke-width="2"/>
    <text x="570" y="290" text-anchor="middle">tree of widgets</text>

    <line x1="280" y1="345" x2="475" y2="345" stroke="#00d4aa" stroke-width="2"/>
    <text x="377" y="340" text-anchor="middle">tap(key="login_btn")</text>
    <line x1="475" y1="370" x2="665" y2="370" stroke="#00d4aa" stroke-width="2"/>
    <text x="570" y="365" text-anchor="middle">VM: marionette.tap</text>

    <line x1="280" y1="400" x2="475" y2="400" stroke="#00d4aa" stroke-width="2"/>
    <text x="377" y="395" text-anchor="middle">enter_text("user")</text>
    <line x1="475" y1="425" x2="665" y2="425" stroke="#00d4aa" stroke-width="2"/>

    <line x1="280" y1="455" x2="475" y2="455" stroke="#00d4aa" stroke-width="2"/>
    <text x="377" y="450" text-anchor="middle">take_screenshots()</text>
    <line x1="475" y1="480" x2="665" y2="480" stroke="#00d4aa" stroke-width="2"/>
    <line x1="665" y1="480" x2="475" y2="498" stroke="#00d4aa" stroke-width="2"/>

    <line x1="475" y1="510" x2="1000" y2="510" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="737" y="505" text-anchor="middle">PUT screenshot envelope</text>

    <line x1="280" y1="540" x2="475" y2="540" stroke="#00d4aa" stroke-width="2"/>
    <text x="377" y="535" text-anchor="middle">disconnect()</text>
    <line x1="475" y1="565" x2="835" y2="565" stroke="#ffa502" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="655" y="560" text-anchor="middle">clear flag-file</text>
    <line x1="475" y1="588" x2="1000" y2="588" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="737" y="583" text-anchor="middle">PUT passed + quit envelopes</text>
  </g>

  <text x="20" y="610" fill="#7a8fa6" font-size="10">SC-MARIONETTE-003 · -004 · -012</text>
</svg>
