<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="ui-sans-serif,system-ui">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0e17"/><stop offset="1" stop-color="#141922"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#00d4aa"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <text x="500" y="32" fill="#e0e6ed" font-size="20" font-weight="700" text-anchor="middle">Marionette MCP — System Architecture (data + control plane)</text>

  <!-- Operator / Agents -->
  <g>
    <rect x="40"  y="70" width="190" height="80" rx="10" fill="#1e2a3a" stroke="#00d4aa"/>
    <text x="135" y="100" fill="#e0e6ed" font-size="14" text-anchor="middle">Operator</text>
    <text x="135" y="120" fill="#7a8fa6" font-size="11" text-anchor="middle">/marionette-explore</text>
    <text x="135" y="138" fill="#7a8fa6" font-size="11" text-anchor="middle">CLI · cockpit</text>

    <rect x="260" y="70" width="180" height="80" rx="10" fill="#1e2a3a" stroke="#00d4aa"/>
    <text x="350" y="100" fill="#e0e6ed" font-size="14" text-anchor="middle">Claude / Pi / Gemini</text>
    <text x="350" y="120" fill="#7a8fa6" font-size="11" text-anchor="middle">marionette-explorer</text>
    <text x="350" y="138" fill="#7a8fa6" font-size="11" text-anchor="middle">16 mcp__marionette__*</text>
  </g>

  <!-- MCP server / CLI -->
  <rect x="470" y="70" width="200" height="80" rx="10" fill="#1e2a3a" stroke="#f5a623"/>
  <text x="570" y="100" fill="#e0e6ed" font-size="14" text-anchor="middle">marionette_mcp</text>
  <text x="570" y="120" fill="#7a8fa6" font-size="11" text-anchor="middle">stdio · SSE</text>
  <text x="570" y="138" fill="#7a8fa6" font-size="11" text-anchor="middle">marionette_cli (CI)</text>

  <!-- Flutter app -->
  <rect x="700" y="70" width="260" height="180" rx="10" fill="#141922" stroke="#3dd68c"/>
  <text x="830" y="98" fill="#e0e6ed" font-size="14" text-anchor="middle">FluffyChat (debug)</text>
  <rect x="720" y="118" width="220" height="50" rx="6" fill="#1e2a3a"/>
  <text x="830" y="138" fill="#3dd68c" font-size="12" text-anchor="middle">MarionetteBinding</text>
  <text x="830" y="155" fill="#7a8fa6" font-size="10" text-anchor="middle">kDebugMode &amp;&amp; !DISABLE_MARIONETTE</text>
  <rect x="720" y="178" width="100" height="50" rx="6" fill="#1e2a3a"/>
  <text x="770" y="206" fill="#7a8fa6" font-size="11" text-anchor="middle">LogStore</text>
  <rect x="830" y="178" width="100" height="50" rx="6" fill="#1e2a3a"/>
  <text x="880" y="206" fill="#7a8fa6" font-size="11" text-anchor="middle">ElementTree</text>

  <!-- Hooks -->
  <rect x="40"  y="260" width="400" height="60" rx="8" fill="#1e2a3a" stroke="#ffa502"/>
  <text x="240" y="285" fill="#e0e6ed" font-size="13" text-anchor="middle">PostToolUse hooks</text>
  <text x="240" y="305" fill="#7a8fa6" font-size="11" text-anchor="middle">flag-file (SC-MARIONETTE-003) · Zenoh bridge</text>

  <!-- Zenoh -->
  <rect x="470" y="260" width="490" height="60" rx="8" fill="#1e2a3a" stroke="#00d4aa"/>
  <text x="715" y="285" fill="#e0e6ed" font-size="13" text-anchor="middle">Zenoh router  ·  TCP 7447</text>
  <text x="715" y="305" fill="#7a8fa6" font-size="11" text-anchor="middle">indrajaal/l5/test/marionette/&lt;run_id&gt;/{start,screenshot,passed,failed,quit,violation}</text>

  <!-- Consumers -->
  <rect x="40"  y="360" width="220" height="80" rx="10" fill="#1e2a3a" stroke="#9b59b6"/>
  <text x="150" y="390" fill="#e0e6ed" font-size="13" text-anchor="middle">Dashboard tile</text>
  <text x="150" y="410" fill="#7a8fa6" font-size="11" text-anchor="middle">live KPI · cockpit weather</text>

  <rect x="280" y="360" width="220" height="80" rx="10" fill="#1e2a3a" stroke="#9b59b6"/>
  <text x="390" y="390" fill="#e0e6ed" font-size="13" text-anchor="middle">RETE-UL rule engine</text>
  <text x="390" y="410" fill="#7a8fa6" font-size="11" text-anchor="middle">10 GRL rules · advisories</text>

  <rect x="520" y="360" width="220" height="80" rx="10" fill="#1e2a3a" stroke="#9b59b6"/>
  <text x="630" y="390" fill="#e0e6ed" font-size="13" text-anchor="middle">FMEA aggregator</text>
  <text x="630" y="410" fill="#7a8fa6" font-size="11" text-anchor="middle">RPN rollup · P0 alerts</text>

  <rect x="760" y="360" width="200" height="80" rx="10" fill="#1e2a3a" stroke="#9b59b6"/>
  <text x="860" y="390" fill="#e0e6ed" font-size="13" text-anchor="middle">Smriti.db</text>
  <text x="860" y="410" fill="#7a8fa6" font-size="11" text-anchor="middle">session_metrics</text>

  <!-- Evidence cache -->
  <rect x="40" y="470" width="920" height="120" rx="10" fill="#0a0e17" stroke="#7a8fa6"/>
  <text x="500" y="495" fill="#e0e6ed" font-size="13" text-anchor="middle">Evidence cache · docs/cache/marionette/&lt;run_id&gt;/</text>
  <text x="200" y="525" fill="#7a8fa6" font-size="11" text-anchor="middle">screenshots/NN.png</text>
  <text x="400" y="525" fill="#7a8fa6" font-size="11" text-anchor="middle">NN-tree.json</text>
  <text x="600" y="525" fill="#7a8fa6" font-size="11" text-anchor="middle">logs.txt</text>
  <text x="800" y="525" fill="#7a8fa6" font-size="11" text-anchor="middle">video.mp4 (CLI)</text>
  <text x="500" y="565" fill="#3dd68c" font-size="11" text-anchor="middle">SC-MARIONETTE-009 · referenced from journal &amp; ZK</text>

  <!-- Arrows -->
  <line x1="135" y1="150" x2="135" y2="260" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="350" y1="150" x2="350" y2="260" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="570" y1="150" x2="830" y2="120" stroke="#00d4aa" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="830" y1="250" x2="830" y2="358" stroke="#00d4aa" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="240" y1="320" x2="715" y2="320" stroke="#ffa502" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="715" y1="320" x2="150" y2="358" stroke="#9b59b6" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="715" y1="320" x2="390" y2="358" stroke="#9b59b6" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="715" y1="320" x2="630" y2="358" stroke="#9b59b6" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="715" y1="320" x2="860" y2="358" stroke="#9b59b6" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="390" y1="438" x2="350" y2="150" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arr)"/>
  <text x="100" y="252" fill="#7a8fa6" font-size="9">advisory back-channel ↑</text>
</svg>
