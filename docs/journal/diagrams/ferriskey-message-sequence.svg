<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="system-ui,sans-serif">
<rect width="900" height="550" fill="#0a0e17" rx="12"/>
<text x="450" y="25" text-anchor="middle" fill="#00d4aa" font-size="15" font-weight="700">Message Sequence: Guardian Approval with FerrisKey MFA</text>

<!-- Actors -->
<rect x="40" y="40" width="90" height="30" rx="4" fill="#141922" stroke="#4d96ff" stroke-width="1.5"/><text x="85" y="60" text-anchor="middle" fill="#4d96ff" font-size="10" font-weight="600">Operator</text>
<rect x="190" y="40" width="90" height="30" rx="4" fill="#141922" stroke="#00d4aa" stroke-width="1.5"/><text x="235" y="60" text-anchor="middle" fill="#00d4aa" font-size="10" font-weight="600">Wisp :4100</text>
<rect x="340" y="40" width="90" height="30" rx="4" fill="#141922" stroke="#ff6b6b" stroke-width="1.5"/><text x="385" y="60" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="600">FerrisKey</text>
<rect x="490" y="40" width="90" height="30" rx="4" fill="#141922" stroke="#9b59b6" stroke-width="1.5"/><text x="535" y="60" text-anchor="middle" fill="#9b59b6" font-size="10" font-weight="600">RBAC</text>
<rect x="640" y="40" width="90" height="30" rx="4" fill="#141922" stroke="#f39c12" stroke-width="1.5"/><text x="685" y="60" text-anchor="middle" fill="#f39c12" font-size="10" font-weight="600">L0 Guardian</text>
<rect x="790" y="40" width="80" height="30" rx="4" fill="#141922" stroke="#e74c3c" stroke-width="1.5"/><text x="830" y="60" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="600">Zenoh</text>

<!-- Lifelines -->
<line x1="85" y1="70" x2="85" y2="530" stroke="#4d96ff" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="235" y1="70" x2="235" y2="530" stroke="#00d4aa" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="385" y1="70" x2="385" y2="530" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="535" y1="70" x2="535" y2="530" stroke="#9b59b6" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="685" y1="70" x2="685" y2="530" stroke="#f39c12" stroke-width="1" stroke-dasharray="4,4"/>
<line x1="830" y1="70" x2="830" y2="530" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,4"/>

<!-- Message 1 -->
<line x1="85" y1="100" x2="235" y2="100" stroke="#4d96ff" stroke-width="1.5"/>
<polygon points="231,96 239,100 231,104" fill="#4d96ff"/>
<text x="160" y="95" text-anchor="middle" fill="#4d96ff" font-size="9">1. POST /api/v1/guardian/respond</text>
<text x="160" y="115" text-anchor="middle" fill="#7a8fa6" font-size="8">Authorization: Bearer &lt;jwt&gt;</text>

<!-- Message 2 -->
<line x1="235" y1="140" x2="385" y2="140" stroke="#00d4aa" stroke-width="1.5"/>
<polygon points="381,136 389,140 381,144" fill="#00d4aa"/>
<text x="310" y="135" text-anchor="middle" fill="#00d4aa" font-size="9">2. Validate JWT signature</text>
<text x="310" y="155" text-anchor="middle" fill="#7a8fa6" font-size="8">JWKS lookup (cached 5min)</text>

<!-- Message 3: Return -->
<line x1="385" y1="180" x2="235" y2="180" stroke="#3dd68c" stroke-width="1.5" stroke-dasharray="5,3"/>
<polygon points="239,176 231,180 239,184" fill="#3dd68c"/>
<text x="310" y="175" text-anchor="middle" fill="#3dd68c" font-size="9">3. TokenClaims { sub, roles, acr }</text>

<!-- Message 4 -->
<line x1="235" y1="210" x2="535" y2="210" stroke="#9b59b6" stroke-width="1.5"/>
<polygon points="531,206 539,210 531,214" fill="#9b59b6"/>
<text x="385" y="205" text-anchor="middle" fill="#9b59b6" font-size="9">4. authorize_layer_access(user, L0)</text>

<!-- Message 5: Layer check -->
<rect x="500" y="225" width="70" height="25" rx="3" fill="#141922" stroke="#9b59b6" stroke-width="1"/>
<text x="535" y="242" text-anchor="middle" fill="#9b59b6" font-size="8">can_access?</text>
<text x="535" y="262" text-anchor="middle" fill="#3dd68c" font-size="9">FullAccess: Yes</text>

<!-- Message 6: MFA check -->
<rect x="500" y="270" width="70" height="25" rx="3" fill="#141922" stroke="#f5a623" stroke-width="1"/>
<text x="535" y="287" text-anchor="middle" fill="#f5a623" font-size="8">MFA check</text>
<text x="535" y="307" text-anchor="middle" fill="#3dd68c" font-size="9">acr: mfa:totp OK</text>

<!-- Message 7: Return OK -->
<line x1="535" y1="320" x2="235" y2="320" stroke="#3dd68c" stroke-width="1.5" stroke-dasharray="5,3"/>
<polygon points="239,316 231,320 239,324" fill="#3dd68c"/>
<text x="385" y="315" text-anchor="middle" fill="#3dd68c" font-size="9">7. Ok(Nil) — Authorized</text>

<!-- Message 8: Guardian action -->
<line x1="235" y1="350" x2="685" y2="350" stroke="#f39c12" stroke-width="1.5"/>
<polygon points="681,346 689,350 681,354" fill="#f39c12"/>
<text x="460" y="345" text-anchor="middle" fill="#f39c12" font-size="9">8. resolve_request(state, id, Approved)</text>

<!-- Message 9: Cast vote -->
<rect x="650" y="360" width="70" height="25" rx="3" fill="#141922" stroke="#f39c12" stroke-width="1"/>
<text x="685" y="377" text-anchor="middle" fill="#f39c12" font-size="8">cast_vote</text>
<text x="685" y="397" text-anchor="middle" fill="#7a8fa6" font-size="8">2oo3 consensus</text>

<!-- Message 10: Zenoh publish -->
<line x1="685" y1="410" x2="830" y2="410" stroke="#e74c3c" stroke-width="1.5"/>
<polygon points="826,406 834,410 826,414" fill="#e74c3c"/>
<text x="757" y="405" text-anchor="middle" fill="#e74c3c" font-size="9">10. Publish OTel span</text>
<text x="757" y="425" text-anchor="middle" fill="#7a8fa6" font-size="8">indrajaal/l0/const/approval/{id}</text>

<!-- Message 11: Webhook -->
<line x1="385" y1="450" x2="830" y2="450" stroke="#e74c3c" stroke-width="1" stroke-dasharray="5,3"/>
<polygon points="826,446 834,450 826,454" fill="#e74c3c"/>
<text x="607" y="445" text-anchor="middle" fill="#e74c3c" font-size="9">11. Webhook: admin_action</text>
<text x="607" y="465" text-anchor="middle" fill="#7a8fa6" font-size="8">indrajaal/auth/admin/action</text>

<!-- Message 12: Response -->
<line x1="235" y1="490" x2="85" y2="490" stroke="#3dd68c" stroke-width="1.5" stroke-dasharray="5,3"/>
<polygon points="89,486 81,490 89,494" fill="#3dd68c"/>
<text x="160" y="485" text-anchor="middle" fill="#3dd68c" font-size="9">12. 200 OK { status: "approved" }</text>

<!-- Step numbers on left -->
<text x="10" y="100" fill="#7a8fa6" font-size="8">t=0ms</text>
<text x="10" y="140" fill="#7a8fa6" font-size="8">t=1ms</text>
<text x="10" y="180" fill="#7a8fa6" font-size="8">t=2ms</text>
<text x="10" y="210" fill="#7a8fa6" font-size="8">t=3ms</text>
<text x="10" y="320" fill="#7a8fa6" font-size="8">t=4ms</text>
<text x="10" y="350" fill="#7a8fa6" font-size="8">t=5ms</text>
<text x="10" y="410" fill="#7a8fa6" font-size="8">t=6ms</text>
<text x="10" y="490" fill="#7a8fa6" font-size="8">t=8ms</text>

<text x="450" y="540" text-anchor="middle" fill="#7a8fa6" font-size="8">SC-AUTH-001 | SC-IAM-004 | SC-SIL4-006 | SC-AGUI-004 | SC-GLM-ZEN-001</text>
</svg>
