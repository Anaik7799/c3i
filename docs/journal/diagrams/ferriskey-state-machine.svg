<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui,sans-serif">
<rect width="800" height="420" fill="#0a0e17" rx="12"/>
<text x="400" y="28" text-anchor="middle" fill="#00d4aa" font-size="16" font-weight="700">FerrisKey Auth State Machine — AuthResult ADT</text>

<!-- State: Unauthenticated -->
<circle cx="100" cy="120" r="45" fill="#141922" stroke="#7a8fa6" stroke-width="2"/>
<text x="100" y="115" text-anchor="middle" fill="#7a8fa6" font-size="10" font-weight="600">Unauth-</text>
<text x="100" y="130" text-anchor="middle" fill="#7a8fa6" font-size="10" font-weight="600">enticated</text>

<!-- State: Authenticated (static) -->
<circle cx="350" cy="80" r="50" fill="#141922" stroke="#3dd68c" stroke-width="2"/>
<text x="350" y="72" text-anchor="middle" fill="#3dd68c" font-size="10" font-weight="600">Authenticated</text>
<text x="350" y="87" text-anchor="middle" fill="#7a8fa6" font-size="9">(static token)</text>

<!-- State: AuthenticatedOidc -->
<circle cx="350" cy="220" r="55" fill="#141922" stroke="#00d4aa" stroke-width="2.5"/>
<text x="350" y="212" text-anchor="middle" fill="#00d4aa" font-size="10" font-weight="600">Authenticated</text>
<text x="350" y="227" text-anchor="middle" fill="#00d4aa" font-size="10" font-weight="600">OIDC</text>
<text x="350" y="242" text-anchor="middle" fill="#7a8fa6" font-size="9">(JWT claims)</text>

<!-- State: InvalidToken -->
<circle cx="650" cy="120" r="45" fill="#141922" stroke="#ff4757" stroke-width="2"/>
<text x="650" y="115" text-anchor="middle" fill="#ff4757" font-size="10" font-weight="600">Invalid</text>
<text x="650" y="130" text-anchor="middle" fill="#ff4757" font-size="10" font-weight="600">Token</text>

<!-- Transitions -->
<!-- Unauthenticated -> Authenticated (static token match) -->
<path d="M145,110 Q220,60 300,80" fill="none" stroke="#3dd68c" stroke-width="1.5"/>
<text x="210" y="70" fill="#3dd68c" font-size="8">static token match</text>

<!-- Unauthenticated -> AuthenticatedOidc (JWT valid) -->
<path d="M140,145 Q220,200 295,220" fill="none" stroke="#00d4aa" stroke-width="1.5"/>
<text x="190" y="195" fill="#00d4aa" font-size="8">JWT valid + claims parsed</text>

<!-- Unauthenticated -> InvalidToken (bad token) -->
<path d="M145,120 Q400,110 605,120" fill="none" stroke="#ff4757" stroke-width="1" stroke-dasharray="5,3"/>
<text x="380" y="135" fill="#ff4757" font-size="8">malformed / expired / bad signature</text>

<!-- RBAC Sub-states from AuthenticatedOidc -->
<rect x="80" y="300" width="110" height="40" rx="6" fill="rgba(255,107,107,.1)" stroke="#ff6b6b" stroke-width="1.5"/>
<text x="135" y="325" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="600">FullAccess</text>
<text x="135" y="338" text-anchor="middle" fill="#7a8fa6" font-size="8">L0-L7 + MFA</text>

<rect x="210" y="300" width="110" height="40" rx="6" fill="rgba(255,165,2,.1)" stroke="#ffa502" stroke-width="1.5"/>
<text x="265" y="325" text-anchor="middle" fill="#ffa502" font-size="10" font-weight="600">OperatorAccess</text>
<text x="265" y="338" text-anchor="middle" fill="#7a8fa6" font-size="8">L1-L7</text>

<rect x="340" y="300" width="110" height="40" rx="6" fill="rgba(155,89,182,.1)" stroke="#9b59b6" stroke-width="1.5"/>
<text x="395" y="325" text-anchor="middle" fill="#9b59b6" font-size="10" font-weight="600">ServiceAccount</text>
<text x="395" y="338" text-anchor="middle" fill="#7a8fa6" font-size="8">L3-L6</text>

<rect x="470" y="300" width="110" height="40" rx="6" fill="rgba(46,213,115,.1)" stroke="#2ed573" stroke-width="1.5"/>
<text x="525" y="325" text-anchor="middle" fill="#2ed573" font-size="10" font-weight="600">ViewerAccess</text>
<text x="525" y="338" text-anchor="middle" fill="#7a8fa6" font-size="8">L4-L7</text>

<rect x="600" y="300" width="110" height="40" rx="6" fill="rgba(122,143,166,.1)" stroke="#7a8fa6" stroke-width="1"/>
<text x="655" y="325" text-anchor="middle" fill="#7a8fa6" font-size="10">NoAccess</text>

<!-- Lines from OIDC to RBAC states -->
<line x1="320" y1="270" x2="135" y2="300" stroke="#ff6b6b" stroke-width="1"/>
<line x1="340" y1="273" x2="265" y2="300" stroke="#ffa502" stroke-width="1"/>
<line x1="360" y1="275" x2="395" y2="300" stroke="#9b59b6" stroke-width="1"/>
<line x1="380" y1="273" x2="525" y2="300" stroke="#2ed573" stroke-width="1"/>
<line x1="400" y1="270" x2="655" y2="300" stroke="#7a8fa6" stroke-width="1" stroke-dasharray="3,3"/>
<text x="350" y="290" text-anchor="middle" fill="#7a8fa6" font-size="8">rbac.resolve_permission(roles)</text>

<!-- MFA gate on FullAccess -->
<rect x="60" y="365" width="150" height="35" rx="4" fill="rgba(255,165,2,.1)" stroke="#f5a623" stroke-width="1"/>
<text x="135" y="382" text-anchor="middle" fill="#f5a623" font-size="9">L0 ops: MFA required</text>
<text x="135" y="395" text-anchor="middle" fill="#7a8fa6" font-size="8">acr: mfa/totp/webauthn</text>
<line x1="135" y1="340" x2="135" y2="365" stroke="#f5a623" stroke-width="1"/>

<!-- Legend -->
<text x="400" y="410" text-anchor="middle" fill="#7a8fa6" font-size="8">Gleam ADT: AuthResult { Authenticated | AuthenticatedOidc | Unauthenticated | InvalidToken } | SC-AUTH-001..005</text>
</svg>
