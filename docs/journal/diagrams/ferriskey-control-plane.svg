<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui,sans-serif">
<rect width="900" height="500" fill="#0a0e17" rx="12"/>
<text x="450" y="30" text-anchor="middle" fill="#00d4aa" font-size="16" font-weight="700">FerrisKey Control Plane — Authentication Decision Flow</text>

<!-- Step 1: Request -->
<rect x="30" y="55" width="160" height="50" rx="6" fill="#141922" stroke="#4d96ff" stroke-width="1.5"/>
<text x="110" y="75" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="600">1. HTTP Request</text>
<text x="110" y="92" text-anchor="middle" fill="#7a8fa6" font-size="9">Bearer JWT in header</text>

<!-- Arrow 1->2 -->
<line x1="190" y1="80" x2="220" y2="80" stroke="#4d96ff" stroke-width="1.5"/>
<polygon points="220,76 228,80 220,84" fill="#4d96ff"/>

<!-- Step 2: FERRISKEY_ENABLED? -->
<rect x="230" y="55" width="160" height="50" rx="25" fill="#141922" stroke="#f39c12" stroke-width="1.5"/>
<text x="310" y="75" text-anchor="middle" fill="#f39c12" font-size="10" font-weight="600">2. FERRISKEY_ENABLED?</text>
<text x="310" y="92" text-anchor="middle" fill="#7a8fa6" font-size="9">env var check</text>

<!-- Branch: Yes -->
<line x1="310" y1="105" x2="310" y2="135" stroke="#3dd68c" stroke-width="1.5"/>
<text x="320" y="125" fill="#3dd68c" font-size="9">Yes</text>
<polygon points="306,135 310,143 314,135" fill="#3dd68c"/>

<!-- Branch: No -->
<line x1="390" y1="80" x2="700" y2="80" stroke="#ff4757" stroke-width="1" stroke-dasharray="5,3"/>
<text x="540" y="73" fill="#ff4757" font-size="9">No (dev mode)</text>

<!-- Step 3: OIDC Validate -->
<rect x="230" y="145" width="160" height="50" rx="6" fill="#141922" stroke="#00d4aa" stroke-width="1.5"/>
<text x="310" y="165" text-anchor="middle" fill="#00d4aa" font-size="10" font-weight="600">3. oidc.validate_token()</text>
<text x="310" y="182" text-anchor="middle" fill="#7a8fa6" font-size="9">decode + parse + verify</text>

<!-- Step 3 sub-steps -->
<rect x="30" y="145" width="180" height="90" rx="6" fill="#141922" stroke="#1e2a3a" stroke-width="1"/>
<text x="40" y="163" fill="#7a8fa6" font-size="9">3a. Base64url decode payload</text>
<text x="40" y="178" fill="#7a8fa6" font-size="9">3b. Parse claims (sub,exp,iss)</text>
<text x="40" y="193" fill="#7a8fa6" font-size="9">3c. Check exp > now</text>
<text x="40" y="208" fill="#7a8fa6" font-size="9">3d. Validate iss == config</text>
<text x="40" y="223" fill="#7a8fa6" font-size="9">3e. Extract roles, acr</text>
<line x1="210" y1="170" x2="230" y2="170" stroke="#1e2a3a" stroke-width="1"/>

<!-- Step 4: Resolve Permission -->
<line x1="310" y1="195" x2="310" y2="225" stroke="#00d4aa" stroke-width="1.5"/>
<polygon points="306,225 310,233 314,225" fill="#00d4aa"/>
<rect x="230" y="235" width="160" height="50" rx="6" fill="#141922" stroke="#9b59b6" stroke-width="1.5"/>
<text x="310" y="255" text-anchor="middle" fill="#9b59b6" font-size="10" font-weight="600">4. rbac.resolve_permission()</text>
<text x="310" y="272" text-anchor="middle" fill="#7a8fa6" font-size="9">highest role wins</text>

<!-- Permission outcomes -->
<rect x="30" y="250" width="180" height="80" rx="6" fill="#141922" stroke="#1e2a3a" stroke-width="1"/>
<text x="40" y="268" fill="#ff6b6b" font-size="9">c3i-admin -> FullAccess (L0-L7)</text>
<text x="40" y="283" fill="#ffa502" font-size="9">c3i-operator -> OperatorAccess (L1-L7)</text>
<text x="40" y="298" fill="#9b59b6" font-size="9">c3i-service -> ServiceAccount (L3-L6)</text>
<text x="40" y="313" fill="#2ed573" font-size="9">c3i-viewer -> ViewerAccess (L4-L7)</text>
<line x1="210" y1="280" x2="230" y2="260" stroke="#1e2a3a" stroke-width="1"/>

<!-- Step 5: Layer Access -->
<line x1="310" y1="285" x2="310" y2="315" stroke="#9b59b6" stroke-width="1.5"/>
<polygon points="306,315 310,323 314,315" fill="#9b59b6"/>
<rect x="230" y="325" width="160" height="50" rx="25" fill="#141922" stroke="#f5a623" stroke-width="1.5"/>
<text x="310" y="345" text-anchor="middle" fill="#f5a623" font-size="10" font-weight="600">5. can_access_layer()?</text>
<text x="310" y="362" text-anchor="middle" fill="#7a8fa6" font-size="9">permission vs target layer</text>

<!-- Branch: No access -->
<line x1="390" y1="350" x2="500" y2="350" stroke="#ff4757" stroke-width="1.5"/>
<text x="430" y="343" fill="#ff4757" font-size="9">No</text>
<rect x="500" y="335" width="140" height="35" rx="6" fill="rgba(255,71,87,.15)" stroke="#ff4757" stroke-width="1.5"/>
<text x="570" y="357" text-anchor="middle" fill="#ff4757" font-size="10" font-weight="600">403 Forbidden</text>

<!-- Branch: Yes -->
<line x1="310" y1="375" x2="310" y2="405" stroke="#3dd68c" stroke-width="1.5"/>
<text x="320" y="395" fill="#3dd68c" font-size="9">Yes</text>
<polygon points="306,405 310,413 314,405" fill="#3dd68c"/>

<!-- Step 6: MFA Check -->
<rect x="230" y="415" width="160" height="50" rx="25" fill="#141922" stroke="#f39c12" stroke-width="1.5"/>
<text x="310" y="435" text-anchor="middle" fill="#f39c12" font-size="10" font-weight="600">6. L0? MFA required?</text>
<text x="310" y="452" text-anchor="middle" fill="#7a8fa6" font-size="9">has_mfa(claims.acr)</text>

<!-- MFA: No MFA -->
<line x1="390" y1="440" x2="500" y2="440" stroke="#ff4757" stroke-width="1.5"/>
<text x="430" y="433" fill="#ff4757" font-size="9">No MFA</text>
<rect x="500" y="425" width="140" height="35" rx="6" fill="rgba(255,165,2,.15)" stroke="#f5a623" stroke-width="1.5"/>
<text x="570" y="447" text-anchor="middle" fill="#f5a623" font-size="10" font-weight="600">403 mfa_required</text>

<!-- MFA: OK -->
<line x1="230" y1="440" x2="160" y2="440" stroke="#3dd68c" stroke-width="1.5"/>
<text x="180" y="433" fill="#3dd68c" font-size="9">OK</text>
<rect x="30" y="420" width="130" height="50" rx="6" fill="rgba(61,214,140,.1)" stroke="#3dd68c" stroke-width="2"/>
<text x="95" y="445" text-anchor="middle" fill="#3dd68c" font-size="12" font-weight="700">AUTHORIZED</text>
<text x="95" y="460" text-anchor="middle" fill="#7a8fa6" font-size="9">Execute handler</text>

<!-- Static token path -->
<rect x="660" y="55" width="200" height="50" rx="6" fill="#141922" stroke="#7a8fa6" stroke-width="1"/>
<text x="760" y="75" text-anchor="middle" fill="#7a8fa6" font-size="10">Static Token Validate</text>
<text x="760" y="92" text-anchor="middle" fill="#7a8fa6" font-size="9">C3I_API_TOKEN match?</text>
<line x1="760" y1="105" x2="760" y2="135" stroke="#7a8fa6" stroke-width="1"/>
<rect x="660" y="135" width="200" height="35" rx="6" fill="rgba(61,214,140,.1)" stroke="#3dd68c" stroke-width="1"/>
<text x="760" y="157" text-anchor="middle" fill="#3dd68c" font-size="10">Authenticated (legacy)</text>

<!-- Zenoh audit -->
<rect x="660" y="415" width="200" height="50" rx="6" fill="#141922" stroke="#e74c3c" stroke-width="1"/>
<text x="760" y="435" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="600">Zenoh OTel Span</text>
<text x="760" y="452" text-anchor="middle" fill="#7a8fa6" font-size="9">indrajaal/otel/spans/auth/*</text>
<line x1="160" y1="445" x2="660" y2="445" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Step numbers -->
<text x="880" y="490" text-anchor="end" fill="#7a8fa6" font-size="8">SC-AUTH-001..005 | SC-IAM-003..004</text>
</svg>
