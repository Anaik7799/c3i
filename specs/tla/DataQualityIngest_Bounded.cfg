\* Pass-19 — Bounded variant of DataQualityIngest.cfg for daily TLC exec.
\* Reduces the input alphabet to 4 canonical + 2 adversarial (instead of 11) and
\* adds STATE_CONSTRAINT to bound the state space. Completes in seconds, suitable
\* for cron-driven daily formal verification (CC-F).
SPECIFICATION Spec

CONSTANTS
  ValidPriorities = {"P0", "P1"}
  ValidStatuses   = {"pending", "completed"}
  Inputs          = {"P0", "P1", "garbage", "SUPREME"}

INVARIANTS
  I_VALID
  I_AUDIT
  I_GATES

PROPERTIES
  ScanEventuallyQuiet
