\* TLC config with fairness conjuncts — verifies both safety and liveness.
\* Bounds are tuned for CI (state space < 100k).
\* For Apalache canonical safety-only checking, use SchedTele.cfg.
SPECIFICATION FairSpec

CONSTANTS
    MaxJobs         = 2
    MaxAttempts     = 1
    TelemetryBufCap = 2
    TimeoutTicks    = 2
    HeartbeatTicks  = 1
    MaxTicks        = 4

INVARIANTS
    Inv_TypeOK
    Inv_NoDualTerminal
    Inv_AttemptBounded
    Inv_TelemetryBounded

PROPERTIES
    Liveness_EventualTerm
    Liveness_TelemetryDrain

CONSTRAINT
    StateConstraint

CHECK_DEADLOCK
    FALSE
