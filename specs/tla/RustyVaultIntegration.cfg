SPECIFICATION Spec

\* Bounded model checking via the MC wrapper that binds function constants.
\* TLC config files do not accept function literals in CONSTANTS bindings,
\* so the per-secret maps live in RustyVaultIntegration_MC.tla.

CONSTANTS
  anthropic_api_key  = anthropic_api_key
  openrouter_api_key = openrouter_api_key
  telegram_token     = telegram_token
  MaxClock           = 50

INVARIANTS
  NoPlaintextAtRest
  BootUnsealsKEK
  VersionMonotonic
  AuditAppendOnly

PROPERTIES
  EventuallyFresh
  EventuallyAudited
  EventuallyFreshOnline
  EventuallyAuditedAll
  EventuallySealedAfterFailure
  EventuallyDegradedWhenOffline

CHECK_DEADLOCK FALSE

\* Wave-15: liveness verification requires SpecFair, but the wrapper
\* RustyVaultIntegration_MC.tla currently uses Spec; switching requires
\* updating the MC binding. TLC + apalache are not in PATH at this
\* environment (verified `which tlc` ⇒ "not found"; `which apalache`
\* ⇒ "not found"); model checking deferred to operator with TLA+
\* toolbox installed. Spec additions are syntactically correct.
