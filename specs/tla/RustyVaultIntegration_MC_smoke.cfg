SPECIFICATION Spec

\* Smoke-test config for the weekly cron — tight bounds for fast turnaround.
\* Full exhaustive run uses RustyVaultIntegration_MC.cfg.

CONSTANTS
  anthropic_api_key  = anthropic_api_key
  openrouter_api_key = openrouter_api_key
  telegram_token     = telegram_token
  MaxClock           = 3

INVARIANTS
  NoPlaintextAtRest
  BootUnsealsKEK
  VersionMonotonic
  AuditAppendOnly

CHECK_DEADLOCK FALSE

CONSTRAINT
  StateBound
