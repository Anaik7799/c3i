<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sa-up Logic Explorer Pro | CEPAF v20.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        code, pre { font-family: 'Fira Code', monospace; }
        .mermaid { background: transparent !important; }
        .step-active { border-color: #8b5cf6; background-color: #f5f3ff; }
        .tab-active { border-bottom: 2px solid #8b5cf6; color: #8b5cf6; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Mermaid = ({ chart }) => {
            useEffect(() => {
                mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
                mermaid.contentLoaded();
            }, [chart]);
            return <div className="mermaid flex justify-center">{chart}</div>;
        };

        const CodeBlock = ({ code, language = 'fsharp' }) => (
            <div className="relative group">
                <pre className="bg-gray-900 text-gray-100 p-4 rounded-lg overflow-x-auto text-sm shadow-inner border border-gray-800">
                    <code>{code}</code>
                </pre>
                <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <span className="text-xs bg-gray-700 text-gray-300 px-2 py-1 rounded">{language}</span>
                </div>
            </div>
        );

        const SectionHeader = ({ icon, title, subtitle }) => (
            <div className="mb-8 border-b border-gray-200 pb-4">
                <h2 className="text-2xl font-bold flex items-center gap-3">
                    <i className={`bi ${icon} text-purple-600`}></i>
                    {title}
                </h2>
                <p className="text-gray-500 mt-1">{subtitle}</p>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('overview');

            const orchestratorChart = `
                graph TD
                    Start([Start sa-up]) --> Reset[Reset Warning Count]
                    Reset --> PreFlight[Pre-Flight: Podman Info]
                    PreFlight --> Build{Config.Build?}
                    Build -- Yes --> Builder[Execute Builder]
                    Build -- No --> Standalone{Standalone Mode?}
                    Builder --> Standalone
                    Standalone -- DB Test --> DbVerifier[Run DB Verifier]
                    Standalone -- Obs Test --> ObsVerifier[Run Obs Verifier]
                    Standalone -- Standard --> Sterilize[Vto: sa-clean]
                    Sterilize --> Formal[Formal Verification]
                    Formal --> Deploy[Phase: DEPLOY]
                    Deploy --> Ace[Ace Verifier]
                    Ace --> Mandate{Duration < 30s?}
                    Mandate -- Fail --> Violation[BootMandateViolation]
                    Mandate -- Pass --> Tests{Run Tests?}
                    Tests -- Yes --> Tester[Execute Tester]
                    Tests -- No --> UI[UI Verifier]
                    Tester --> UI
                    UI --> Gate[Zero-Warnings Gate]
                    Gate -- Pass --> Finish([Homeostasis Achieved])
                    Gate -- Fail --> Error([AOR Violation])
                    Violation --> Error
            `;

            const dataFlowChart = `
                graph LR
                    Input[(CepaConfig)] -- Env Vars --> Runner[CliProcessRunner]
                    Runner -- Exec --> Shell[Podman/Compose]
                    Shell -- Stdout/Err --> Logger[UnifiedLogger]
                    Logger -- Channel 1 --> Console[ANSI Console]
                    Logger -- Channel 2 --> File[Session Logs]
                    Logger -- Channel 3 --> OTEL[SigNoz Traces]
                    Logger -- Channel 4 --> CubDB[State Tracker]
                    Logger -- Counters --> Metrics[Prometheus/Grafana]
            `;

            return (
                <div className="min-h-screen">
                    {/* Hero Header */}
                    <nav className="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16 items-center">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-purple-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                                        <i className="bi bi-cpu-fill text-xl"></i>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold tracking-tight">sa-up Logic Explorer Pro</h1>
                                        <p className="text-[10px] text-gray-400 font-semibold tracking-widest uppercase">Indrajaal v20.0 Substrate</p>
                                    </div>
                                </div>
                                <div className="flex gap-6">
                                    {['overview', 'control', 'data', 'compliance'].map(tab => (
                                        <button 
                                            key={tab}
                                            onClick={() => setActiveTab(tab)}
                                            className={`px-3 py-2 text-sm font-semibold transition-colors uppercase tracking-wider ${activeTab === tab ? 'text-purple-600 border-b-2 border-purple-600' : 'text-gray-500 hover:text-purple-400'}`}
                                        >
                                            {tab}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                        {activeTab === 'overview' && (
                            <div className="space-y-12">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                                    <div>
                                        <h2 className="text-4xl font-extrabold text-gray-900 leading-tight">
                                            The <span className="text-purple-600">Boot Protocol</span> 
                                            <br/>of the Biomorphic Mesh
                                        </h2>
                                        <p className="mt-4 text-lg text-gray-600">
                                            <code>sa-up</code> is not just a script; it is a formally verified 
                                            Cybernetic Orchestrator. It transitions the Indrajaal substrate from 
                                            Silicon to Homeostasis using SIL-4 compliant Railway Oriented Programming.
                                        </p>
                                        <div className="mt-8 flex gap-4">
                                            <div className="bg-green-100 text-green-800 px-4 py-2 rounded-full text-xs font-bold border border-green-200">
                                                <i className="bi bi-shield-check me-2"></i>SIL-4 VERIFIED
                                            </div>
                                            <div className="bg-purple-100 text-purple-800 px-4 py-2 rounded-full text-xs font-bold border border-purple-200">
                                                <i className="bi bi-infinity me-2"></i>PATIENT MODE
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                                        <h3 className="font-bold text-gray-400 uppercase text-xs tracking-widest mb-4">Core Axiom Compliance</h3>
                                        <div className="space-y-4">
                                            {[
                                                { id: 1, title: 'Patient Mode', desc: 'Infinite timeouts & retry logic' },
                                                { id: 2, title: 'Container Isolation', desc: 'Rootless Podman 5.4.1+ enforcement' },
                                                { id: 3, title: 'Zero-Defect Quality', desc: 'No errors, no warnings allowed' },
                                                { id: 5, title: 'Validation Consensus', desc: 'Quadplex audit trail synchronization' }
                                            ].map(axiom => (
                                                <div key={axiom.id} className="flex gap-4 items-start">
                                                    <div className="bg-purple-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold mt-1 shadow-sm">
                                                        {axiom.id}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-gray-800">{axiom.title}</h4>
                                                        <p className="text-xs text-gray-500">{axiom.desc}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'control' && (
                            <div className="space-y-12">
                                <SectionHeader 
                                    icon="bi-diagram-3" 
                                    title="Protocol Control Flow" 
                                    subtitle="Linear representation of the ROP state machine execution path."
                                />
                                <div className="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                                    <Mermaid chart={orchestratorChart} />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="space-y-6">
                                        <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                                            <h4 className="font-bold text-purple-600 mb-2">1. The ROP Wrapper</h4>
                                            <p className="text-sm text-gray-600">
                                                All operations are wrapped in an <code>asyncResult</code> builder. 
                                                If any phase (e.g., <code>Builder</code>) returns an <code>Error</code>, 
                                                the chain is short-circuited, skipping the remaining phases and 
                                                landing at the <code>Error</code> state for audit.
                                            </p>
                                        </div>
                                        <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                                            <h4 className="font-bold text-purple-600 mb-2">2. The DEPLOY Loop</h4>
                                            <p className="text-sm text-gray-600">
                                                CEPAF iterates over the <code>Registry</code>. It resolves the relative 
                                                <code>podman-compose</code> paths to absolute paths using the 
                                                <code>PathResolver</code> to prevent environmental drift.
                                            </p>
                                        </div>
                                    </div>
                                    <CodeBlock code={`let runProtocol logger runner config = asyncResult {
    // 1. Pre-flight
    do! Podman.captureSystemInfo logger runner
    
    // 2. Deployment Loop
    for env in config.Environments do
        let path = PathResolver.resolve config.Registry.ComposeFiles.[env]
        let! _ = Podman.composeUp logger runner path
        ()

    // 3. Mandate Verification
    if startupDuration > config.BootThresholdMs then
        return! fromResult (Error (BootMandateViolation(...)))
        
    // 4. Quality Gate
    do! checkZeroWarningsGate logger |> fromResult
}`} />
                                </div>
                            </div>
                        )}

                        {activeTab === 'data' && (
                            <div className="space-y-12">
                                <SectionHeader 
                                    icon="bi-database-fill-gear" 
                                    title="Data Transformation Stream" 
                                    subtitle="How configuration inputs mutate into verifiable telemetry outputs."
                                />
                                <div className="bg-white p-8 rounded-2xl shadow-lg border border-gray-100 mb-12">
                                    <Mermaid chart={dataFlowChart} />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {[
                                        { title: 'Input: CepaConfig', color: 'bg-blue-50', icon: 'bi-box-arrow-in-right', items: ['PatientMode Flag', 'Registry Map', 'BootThresholdMs'] },
                                        { title: 'State: AsyncResult', color: 'bg-purple-50', icon: 'bi-gear-wide-connected', items: ['warningCount (Atomic)', 'Stopwatch Ticks', 'CircuitBreaker state'] },
                                        { title: 'Output: Quadplex', color: 'bg-green-50', icon: 'bi-box-arrow-right', items: ['TelemetryEvent stream', 'Metric Logged Spans', 'CubDB State Tree'] }
                                    ].map(card => (
                                        <div key={card.title} className={`${card.color} p-6 rounded-2xl border border-opacity-20 border-gray-900`}>
                                            <h4 className="font-bold flex items-center gap-2 mb-4">
                                                <i className={`bi ${card.icon}`}></i>
                                                {card.title}
                                            </h4>
                                            <ul className="space-y-2">
                                                {card.items.map(item => (
                                                    <li key={item} className="text-xs flex items-center gap-2 text-gray-700">
                                                        <i className="bi bi-dot text-purple-600 text-lg"></i>
                                                        {item}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'compliance' && (
                            <div className="space-y-12">
                                <SectionHeader 
                                    icon="bi-shield-check" 
                                    title="Formal Mandate Mapping" 
                                    subtitle="Direct correlation between System Specification and F# code modules."
                                />
                                <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-gray-900 text-white uppercase text-[10px] tracking-widest">
                                                <th className="px-6 py-4">Constraint ID</th>
                                                <th className="px-6 py-4">Mandate Name</th>
                                                <th className="px-6 py-4">Verification Module</th>
                                                <th className="px-6 py-4">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-sm divide-y divide-gray-100">
                                            {[
                                                { id: 'SC-OBS-069', name: 'Quadplex Logging', mod: 'Infrastructure.UnifiedLogger', status: 'ACTIVE' },
                                                { id: 'AOR-QUA-001', name: 'Zero-Warnings Gate', mod: 'Orchestrator.checkZeroWarningsGate', status: 'ENFORCED' },
                                                { id: 'SC-CNT-ENV-001', name: '3-Container Arch', mod: 'Registry.ComposeFiles["Dev"]', status: 'COMPLIANT' },
                                                { id: 'Section 75.1', name: '30s Boot Limit', mod: 'Orchestrator.runProtocol (Stopwatch)', status: 'VERIFIED' }
                                            ].map(row => (
                                                <tr key={row.id} className="hover:bg-gray-50 transition-colors">
                                                    <td className="px-6 py-4 font-bold text-purple-600">{row.id}</td>
                                                    <td className="px-6 py-4 font-semibold">{row.name}</td>
                                                    <td className="px-6 py-4 italic text-gray-500">{row.mod}</td>
                                                    <td className="px-6 py-4">
                                                        <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold border border-green-200">
                                                            {row.status}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-gray-900 text-white py-12 mt-20">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <p className="text-sm font-bold tracking-widest text-gray-500 uppercase mb-4">Verification Audit Complete</p>
                            <div className="flex justify-center gap-8 text-xs text-gray-400">
                                <span><i className="bi bi-geo-alt me-2"></i>Intelitor-v5.2</span>
                                <span><i className="bi bi-calendar3 me-2"></i>Jan 4, 2026</span>
                                <span><i className="bi bi-fingerprint me-2"></i>Indrajaal-Substrate-Core</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
