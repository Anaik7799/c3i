# Database Backup Configuration
# Generated: 2025-08-02 19:52:26 CEST
# Agent: Agent-4-Backup-Specialist

# PostgreSQL Backup Settings
postgresql:
  host: "localhost"
  port: 5433
  database: "indrajaal_dev"
  backup_format: "custom"
  compression: "gzip"
  encryption: true

# Backup Schedule
schedule:
  full_backup: "daily at 02:00"
  incremental_backup: "every 4 hours"
  transaction_log_backup: "every 15 minutes"

# Retention Policy
retention:
  daily_backups: 30
  weekly_backups: 12
  monthly_backups: 12
  yearly_backups: 5

# Storage Configuration
storage:
  local_path: "backups/database"
  remote_storage: "disabled"  # Configure for production
  encryption_key: "rotate_monthly"
  compression_level: 9

# Validation
validation:
  integrity_check: true
  test_restore: "weekly"
  checksum_verification: true
  size_validation: true
