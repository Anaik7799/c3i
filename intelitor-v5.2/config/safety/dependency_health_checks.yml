# Dependency Health Check Configuration
# Generated: 2025-08-02 19:52:26 CEST

health_checks:
  database:
    type: "postgresql"
    host: "localhost"
    port: 5433
    check_interval: 30
    timeout: 5
    retries: 3

  container_runtime:
    type: "podman"
    check_command: "podman --version"
    check_interval: 60
    timeout: 10

  filesystem:
    type: "storage"
    check_paths:
      - "/workspace"
      - "/tmp"
    check_interval: 120

  network:
    type: "connectivity"
    check_endpoints:
      - "localhost:4000"
      - "localhost:5433"
    check_interval: 30

failure_actions:
  - log_failure
  - alert_monitoring
  - attempt_recovery
  - escalate_if_critical
