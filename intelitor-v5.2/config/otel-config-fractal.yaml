# OTEL Collector SIL-4 Configuration
# Role: Central Nervous System Aggregator

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    # Aggressive flushing for real-time OODA (10ms)
    timeout: 10ms
    send_batch_size: 100

  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

exporters:
  # Export to SigNoz (Local)
  clickhouse:
    endpoint: "tcp://indrajaal-obs:9000"
    database: "signoz_traces"
    ttl_days: 7
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # Debug exporter (replaces deprecated logging exporter)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse]