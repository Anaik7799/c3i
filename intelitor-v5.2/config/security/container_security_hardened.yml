# =============================================================================
# Container Security Hardening Configuration - Enhanced for SC-CNT-009 to SC-CNT-016
# =============================================================================
# Version: 2.0.0
# Updated: 2025-12-19
# Framework: SOPv5.11 + STAMP + TPS
# STAMP Compliance: SC-CNT-009 to SC-CNT-016 (Container Safety Constraints)
#
# STAMP Constraints Covered:
# - SC-CNT-009: NixOS containers only (no Alpine/Ubuntu/Docker Hub)
# - SC-CNT-010: localhost/ registry only
# - SC-CNT-011: PHICS < 50ms latency
# - SC-CNT-012: Rootless execution enforced
# - SC-CNT-013: Health verification before operations
# - SC-CNT-014: Resource isolation maintained
# - SC-CNT-015: Network security enforced
# - SC-CNT-016: No registry drift allowed
# =============================================================================

# -----------------------------------------------------------------------------
# Section 1: Image Security & Scanning (Trivy Integration)
# -----------------------------------------------------------------------------
image_scanning:
  enabled: true
  scanner: trivy

  # Scan configuration
  scan_config:
    # Fail build on severity levels (per STAMP requirements)
    fail_on_critical: true
    fail_on_high: true
    fail_on_medium: false
    fail_on_low: false

    # Scan types
    scan_types:
      - vuln        # Vulnerability scanning
      - config      # Dockerfile/config misconfigurations
      - secret      # Secret detection in images
      - license     # License compliance check

    # Ignore unfixed vulnerabilities during scan
    ignore_unfixed: false

    # Skip specific vulnerability IDs (with justification)
    skip_vulnerabilities: []

    # Scan schedule
    schedule:
      on_build: true
      on_push: true
      periodic: "0 2 * * *"  # Daily at 2 AM

    # Output formats
    output:
      format: "json"
      path: "./data/security/scan-reports"
      upload_to_registry: false

  # Registry restrictions (SC-CNT-010)
  allowed_registries:
    - "localhost/"

  blocked_registries:
    - "docker.io/"
    - "ghcr.io/"
    - "gcr.io/"
    - "quay.io/"
    - "registry.hub.docker.com/"
    - "*.docker.com/"

  # Base image requirements (SC-CNT-009)
  allowed_base_images:
    - "localhost/sopv51-base:*"
    - "localhost/indrajaal-*:nixos-*"

  blocked_base_images:
    - "*alpine*"
    - "*ubuntu*"
    - "*debian*"
    - "*centos*"
    - "*fedora*"

# -----------------------------------------------------------------------------
# Section 2: Security Context (Per Container)
# -----------------------------------------------------------------------------
security_contexts:
  # Default security context applied to all containers
  default:
    # Run as non-root (SC-CNT-012)
    run_as_non_root: true
    run_as_user: 1000
    run_as_group: 1000

    # Filesystem security
    read_only_root_filesystem: true
    allow_privilege_escalation: false

    # seccomp profile
    seccomp_profile:
      type: RuntimeDefault

    # Capabilities (minimal set)
    capabilities:
      drop:
        - ALL
      add: []

  # Container-specific security contexts
  indrajaal-app:
    run_as_non_root: true
    run_as_user: 1000
    run_as_group: 1000
    read_only_root_filesystem: true
    allow_privilege_escalation: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE  # Required for Phoenix on port 4000
    seccomp_profile:
      type: RuntimeDefault

  indrajaal-db:
    run_as_non_root: true
    run_as_user: 999  # postgres user
    run_as_group: 999
    read_only_root_filesystem: false  # Database needs write access
    allow_privilege_escalation: false
    capabilities:
      drop:
        - ALL
      add:
        - CHOWN
        - SETUID
        - SETGID
        - FOWNER
    seccomp_profile:
      type: RuntimeDefault

  indrajaal-obs:
    run_as_non_root: true
    run_as_user: 1000
    run_as_group: 1000
    read_only_root_filesystem: true
    allow_privilege_escalation: false
    capabilities:
      drop:
        - ALL
      add: []
    seccomp_profile:
      type: RuntimeDefault

  indrajaal-redis:
    run_as_non_root: true
    run_as_user: 1000
    run_as_group: 1000
    read_only_root_filesystem: false  # Redis needs write access for persistence
    allow_privilege_escalation: false
    capabilities:
      drop:
        - ALL
      add: []
    seccomp_profile:
      type: RuntimeDefault

  indrajaal-nginx:
    run_as_non_root: true
    run_as_user: 1000
    run_as_group: 1000
    read_only_root_filesystem: true
    allow_privilege_escalation: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE  # Required for ports 80/443
    seccomp_profile:
      type: RuntimeDefault

# -----------------------------------------------------------------------------
# Section 3: Resource Limits (per STAMP ContainerAllocation Matrix)
# STAMP Reference: CLAUDE.md ContainerAllocation
# Total Resources: CPU 20, RAM 56GB
# -----------------------------------------------------------------------------
resource_limits:
  # indrajaal-app: Application container (CPU: 12, RAM: 32GB)
  indrajaal-app:
    limits:
      memory: "32Gi"
      cpu: "12000m"          # 12 CPUs
      ephemeral-storage: "20Gi"
    requests:
      memory: "16Gi"
      cpu: "6000m"           # 6 CPUs minimum
      ephemeral-storage: "10Gi"
    # PIDs limit to prevent fork bombs
    pids_limit: 4096

  # indrajaal-db: Database container (CPU: 4, RAM: 16GB)
  indrajaal-db:
    limits:
      memory: "16Gi"
      cpu: "4000m"           # 4 CPUs
      ephemeral-storage: "100Gi"
    requests:
      memory: "8Gi"
      cpu: "2000m"           # 2 CPUs minimum
      ephemeral-storage: "50Gi"
    pids_limit: 1024

  # indrajaal-obs: Observability container (CPU: 4, RAM: 8GB)
  indrajaal-obs:
    limits:
      memory: "8Gi"
      cpu: "4000m"           # 4 CPUs
      ephemeral-storage: "50Gi"
    requests:
      memory: "4Gi"
      cpu: "2000m"           # 2 CPUs minimum
      ephemeral-storage: "25Gi"
    pids_limit: 2048

  # Sidecar containers (share resources with parent)
  indrajaal-redis:
    limits:
      memory: "4Gi"
      cpu: "2000m"
      ephemeral-storage: "10Gi"
    requests:
      memory: "2Gi"
      cpu: "1000m"
      ephemeral-storage: "5Gi"
    pids_limit: 512

  indrajaal-nginx:
    limits:
      memory: "1Gi"
      cpu: "1000m"
      ephemeral-storage: "2Gi"
    requests:
      memory: "512Mi"
      cpu: "500m"
      ephemeral-storage: "1Gi"
    pids_limit: 256

  indrajaal-grafana:
    limits:
      memory: "2Gi"
      cpu: "1000m"
      ephemeral-storage: "5Gi"
    requests:
      memory: "1Gi"
      cpu: "500m"
      ephemeral-storage: "2Gi"
    pids_limit: 512

  indrajaal-prometheus:
    limits:
      memory: "2Gi"
      cpu: "1000m"
      ephemeral-storage: "20Gi"
    requests:
      memory: "1Gi"
      cpu: "500m"
      ephemeral-storage: "10Gi"
    pids_limit: 512

# -----------------------------------------------------------------------------
# Section 4: Runtime Security
# -----------------------------------------------------------------------------
runtime_security:
  # Container runtime enforcement
  runtime: podman
  version_minimum: "5.4.1"
  rootless_required: true

  # Podman-specific security options
  podman_options:
    userns: keep-id
    security_opt:
      - "no-new-privileges:true"
      - "seccomp=unconfined"  # Will use container's built-in seccomp

  # Mount options for security
  mount_options:
    default_bind: "z"  # SELinux context
    read_only_paths:
      - "/etc/passwd"
      - "/etc/group"
      - "/etc/hosts"

  # Deny dangerous operations
  deny_operations:
    - mount_proc: true
    - mount_sysfs: true
    - ptrace: true
    - kernel_modules: true
    - raw_sockets: true

# -----------------------------------------------------------------------------
# Section 5: Audit & Compliance
# -----------------------------------------------------------------------------
audit:
  enabled: true
  log_path: "./data/security/audit.log"

  # Events to audit
  audit_events:
    - container_start
    - container_stop
    - container_exec
    - network_connect
    - volume_mount
    - capability_add
    - security_violation

  # Compliance checks
  compliance:
    stamp_constraints: true
    cis_benchmark: true
    nist_800_190: true

# -----------------------------------------------------------------------------
# Section 6: Secrets Management
# -----------------------------------------------------------------------------
secrets:
  # Secrets should NOT be in environment variables
  disallow_env_secrets: true

  # Allowed secret injection methods
  allowed_methods:
    - file_mount
    - tmpfs_mount

  # Secret paths
  secret_paths:
    - "/run/secrets"
    - "/workspace/.secrets"

  # Secret scanning in images
  scan_for_secrets: true
  secret_patterns:
    - "(?i)password\\s*=\\s*['\"]?[^'\"\\s]+"
    - "(?i)api[_-]?key\\s*=\\s*['\"]?[^'\"\\s]+"
    - "(?i)secret\\s*=\\s*['\"]?[^'\"\\s]+"
    - "(?i)token\\s*=\\s*['\"]?[^'\"\\s]+"
