# Container Security Hardening Configuration
# Generated: 2025-08-02 19:52:26 CEST
# Agent: Agent-3-Security-Specialist

# Security Context
security_context:
  run_as_non_root: true
  run_as_user: 1000
  run_as_group: 1000
  fs_group: 1000
  seccomp_profile:
    type: RuntimeDefault

# Container Capabilities (Minimal Set)
capabilities:
  drop:
    - ALL
  add:
    - NET_BIND_SERVICE
    - SETUID
    - SETGID

# Resource Limits & Security
resources:
  limits:
    memory: "2Gi"
    cpu: "1000m"
    ephemeral-storage: "5Gi"
  requests:
    memory: "512Mi"
    cpu: "250m"
    ephemeral-storage: "1Gi"

# Network Policies
network_policy:
  enabled: true
  ingress:
    - from:
      - podSelector:
          matchLabels:
            app: indrajaal
      ports:
      - protocol: TCP
        port: 4000
  egress:
    - to:
      - podSelector:
          matchLabels:
            app: indrajaal-db
      ports:
      - protocol: TCP
        port: 5432

# Security Scanning
security_scanning:
  enabled: true
  fail_on_critical: true
  fail_on_high: true
  scan_schedule: "daily"
