worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    default_type application/octet-stream;
    
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # TDG-VALIDATED: Upstream service definitions
    upstream indrajaal_app {
        server indrajaal-app-demo:4000;
        # Health check would go here in enterprise setup
    }
    
    upstream grafana_backend {
        server indrajaal-grafana-demo:3000;
    }
    
    upstream prometheus_backend {
        server indrajaal-prometheus-demo:9090;
    }
    
    # Simple server block for testing
    server {
        listen 80;
        server_name localhost;
        
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        
        # Static health check
        location /health {
            access_log off;
            return 200 "nginx-proxy-healthy\n";
            add_header Content-Type text/plain;
            add_header X-Frame-Options DENY;
            add_header X-Content-Type-Options nosniff;
        }
        
        # Grafana dashboard (direct, no app dependency)
        location /grafana/ {
            proxy_pass http://indrajaal-grafana-demo:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Frame-Options DENY;
            add_header X-Content-Type-Options nosniff;
        }
        
        # Prometheus metrics (direct, no app dependency)
        location /prometheus/ {
            proxy_pass http://indrajaal-prometheus-demo:9090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-Frame-Options DENY;
            add_header X-Content-Type-Options nosniff;
        }
        
        # Default location - return service info
        location / {
            return 200 "Intelitor Demo Proxy - Services Available:\n/health - Health Check\n/grafana/ - Grafana Dashboard\n/prometheus/ - Prometheus Metrics\n";
            add_header Content-Type text/plain;
            add_header X-Frame-Options DENY;
            add_header X-Content-Type-Options nosniff;
        }
    }
}