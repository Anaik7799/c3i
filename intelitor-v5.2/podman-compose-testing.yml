# =============================================================================
# SOPv5.11 Testing/Demo Architecture
# =============================================================================
#
# STAMP Compliance:
# - SC-CNT-009: NixOS containers only
# - SC-CNT-010: localhost/ registry only
# - SC-CNT-012: Rootless Podman execution
# - SC-CNT-014: Resource isolation maintained
# - AOR-CNT-001: Podman ONLY (Docker FORBIDDEN)
#
# Architecture:
# - 3x indrajaal-app-{1,2,3}: Application cluster (load balanced)
# - 1x indrajaal-obs: Observability (Prometheus + Grafana demo)
# - 2x indrajaal-db-{primary,replica}: Database cluster with connection pooling
#
# Usage:
#   podman-compose -f podman-compose-testing.yml up -d
#
# =============================================================================

version: '3.8'

networks:
  indrajaal-test-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24
          gateway: 172.31.0.1

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # DATABASE CLUSTER (2 containers with connection pooling)
  # ═══════════════════════════════════════════════════════════════════════════

  # Primary Database
  indrajaal-db-primary:
    image: localhost/indrajaal-timescaledb-demo:nixos-devenv
    container_name: indrajaal-db-primary
    hostname: db-primary
    networks:
      indrajaal-test-net:
        ipv4_address: 172.31.0.10
    environment:
      POSTGRES_DB: indrajaal_test
      POSTGRES_USER: indrajaal
      POSTGRES_PASSWORD: indrajaal_test
      PGPORT: 5433
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TIMESCALEDB_TELEMETRY: "off"
      TS_TUNE_MEMORY: 4GB
      TS_TUNE_NUM_CPUS: 2
      # SOPv5.11 Compliance
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
    ports:
      - "5433:5433"
    volumes:
      - db_primary_data:/var/lib/postgresql/data:z
      - ./data/tmp:/var/log/claude:z
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indrajaal -d indrajaal_test -p 5433"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Replica Database with connection pooling configuration
  indrajaal-db-replica:
    image: localhost/indrajaal-timescaledb-demo:nixos-devenv
    container_name: indrajaal-db-replica
    hostname: db-replica
    networks:
      indrajaal-test-net:
        ipv4_address: 172.31.0.11
    environment:
      POSTGRES_DB: indrajaal_test
      POSTGRES_USER: indrajaal
      POSTGRES_PASSWORD: indrajaal_test
      PGPORT: 5434
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      # Connection pooling settings (application-level)
      PGBOUNCER_ENABLED: "true"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 50
      # SOPv5.11 Compliance
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
    ports:
      - "5434:5434"
      - "6432:6432"  # PgBouncer port
    volumes:
      - db_replica_data:/var/lib/postgresql/data:z
      - ./data/tmp:/var/log/claude:z
    depends_on:
      indrajaal-db-primary:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indrajaal -d indrajaal_test -p 5434"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION CLUSTER (3 containers)
  # Using indrajaal-sopv51-elixir-app:elixir-1.19-otp28 (Elixir 1.19.2, OTP 28)
  # Built from: containers/sopv51-elixir-app.nix
  # STAMP: SC-CNT-009 (NixOS), SC-CNT-010 (localhost registry)
  # ═══════════════════════════════════════════════════════════════════════════

  indrajaal-app-1:
    image: localhost/indrajaal-sopv51-elixir-app:elixir-1.19-otp28
    container_name: indrajaal-app-1
    hostname: app-1
    networks:
      indrajaal-test-net:
        ipv4_address: 172.31.0.20
    environment:
      MIX_ENV: test
      DATABASE_URL: ecto://indrajaal:indrajaal_test@172.31.0.10:5433/indrajaal_test
      REDIS_URL: redis://172.31.0.20:6379
      SECRET_KEY_BASE: test_secret_key_base_64_chars_long_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      PHX_HOST: localhost
      PHX_PORT: 4000
      PHX_SERVER: "true"
      NODE_NAME: "indrajaal@app-1"
      CLUSTER_NODES: "indrajaal@app-1,indrajaal@app-2,indrajaal@app-3"
      # SOPv5.11 Compliance
      CONTAINER_ENFORCEMENT: "true"
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
      ELIXIR_ERL_OPTIONS: "+S 4 +A 32 +K true +P 1048576"
      ERL_MAX_PORTS: 262144
      # CA Certificates for HTTPS
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_DIR: /etc/ssl/certs
      HEX_CACERTS_PATH: /etc/ssl/certs/ca-certificates.crt
    ports:
      - "4000:4000"
      - "6379:6379"
    volumes:
      - .:/workspace:z
      - app1_deps:/workspace/deps
      - app1_build:/workspace/_build
      - ./data/tmp:/var/log/claude:z
      # Mount host CA certificates
      - /etc/ssl/certs:/etc/ssl/certs:ro
    working_dir: /workspace
    command: >
      sh -c "mkdir -p /usr/bin && ln -sf /sbin/env /usr/bin/env && mix local.hex --force --if-missing && mix local.rebar --force && mix deps.get && mix ecto.create --quiet && mix ecto.migrate && mix phx.server"
    depends_on:
      indrajaal-db-primary:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health", "--max-time", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    restart: unless-stopped

  indrajaal-app-2:
    image: localhost/indrajaal-sopv51-elixir-app:elixir-1.19-otp28
    container_name: indrajaal-app-2
    hostname: app-2
    networks:
      indrajaal-test-net:
        ipv4_address: 172.31.0.21
    environment:
      MIX_ENV: test
      DATABASE_URL: ecto://indrajaal:indrajaal_test@172.31.0.11:5434/indrajaal_test
      REDIS_URL: redis://172.31.0.20:6379
      SECRET_KEY_BASE: test_secret_key_base_64_chars_long_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      PHX_HOST: localhost
      PHX_PORT: 4001
      PHX_SERVER: "true"
      NODE_NAME: "indrajaal@app-2"
      CLUSTER_NODES: "indrajaal@app-1,indrajaal@app-2,indrajaal@app-3"
      # SOPv5.11 Compliance
      CONTAINER_ENFORCEMENT: "true"
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
      ELIXIR_ERL_OPTIONS: "+S 4 +A 32 +K true +P 1048576"
      ERL_MAX_PORTS: 262144
      # CA Certificates for HTTPS
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_DIR: /etc/ssl/certs
      HEX_CACERTS_PATH: /etc/ssl/certs/ca-certificates.crt
    ports:
      - "4001:4001"
    volumes:
      - .:/workspace:z
      - app2_deps:/workspace/deps
      - app2_build:/workspace/_build
      - ./data/tmp:/var/log/claude:z
      # Mount host CA certificates
      - /etc/ssl/certs:/etc/ssl/certs:ro
    working_dir: /workspace
    command: >
      sh -c "mkdir -p /usr/bin && ln -sf /sbin/env /usr/bin/env && mix local.hex --force --if-missing && mix local.rebar --force && mix deps.get && mix ecto.migrate && mix phx.server"
    depends_on:
      indrajaal-db-replica:
        condition: service_healthy
      indrajaal-app-1:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health", "--max-time", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    restart: unless-stopped

  indrajaal-app-3:
    image: localhost/indrajaal-sopv51-elixir-app:elixir-1.19-otp28
    container_name: indrajaal-app-3
    hostname: app-3
    networks:
      indrajaal-test-net:
        ipv4_address: 172.31.0.22
    environment:
      MIX_ENV: test
      DATABASE_URL: ecto://indrajaal:indrajaal_test@172.31.0.11:5434/indrajaal_test
      REDIS_URL: redis://172.31.0.20:6379
      SECRET_KEY_BASE: test_secret_key_base_64_chars_long_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      PHX_HOST: localhost
      PHX_PORT: 4002
      PHX_SERVER: "true"
      NODE_NAME: "indrajaal@app-3"
      CLUSTER_NODES: "indrajaal@app-1,indrajaal@app-2,indrajaal@app-3"
      # SOPv5.11 Compliance
      CONTAINER_ENFORCEMENT: "true"
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
      ELIXIR_ERL_OPTIONS: "+S 4 +A 32 +K true +P 1048576"
      ERL_MAX_PORTS: 262144
      # CA Certificates for HTTPS
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_DIR: /etc/ssl/certs
      HEX_CACERTS_PATH: /etc/ssl/certs/ca-certificates.crt
    ports:
      - "4002:4002"
    volumes:
      - .:/workspace:z
      - app3_deps:/workspace/deps
      - app3_build:/workspace/_build
      - ./data/tmp:/var/log/claude:z
      # Mount host CA certificates
      - /etc/ssl/certs:/etc/ssl/certs:ro
    working_dir: /workspace
    command: >
      sh -c "mkdir -p /usr/bin && ln -sf /sbin/env /usr/bin/env && mix local.hex --force --if-missing && mix local.rebar --force && mix deps.get && mix ecto.migrate && mix phx.server"
    depends_on:
      indrajaal-db-replica:
        condition: service_healthy
      indrajaal-app-1:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health", "--max-time", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY (1 container - Prometheus demo placeholder)
  # ═══════════════════════════════════════════════════════════════════════════

  indrajaal-obs:
    image: localhost/indrajaal-prometheus-demo:nixos-devenv
    container_name: indrajaal-obs
    hostname: obs
    networks:
      indrajaal-test-net:
        ipv4_address: 172.31.0.30
    environment:
      # SOPv5.11 Compliance
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
      # Prometheus targets (for reference)
      PROMETHEUS_TARGETS: "172.31.0.20:4000,172.31.0.21:4001,172.31.0.22:4002"
    ports:
      - "9090:9090"   # Prometheus
      - "3000:3000"   # Grafana
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus:z
      - grafana_data:/var/lib/grafana:z
      - ./data/tmp:/var/log/claude:z
    # Note: Demo image uses sleep infinity (placeholder container)
    depends_on:
      indrajaal-db-primary:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "true"]  # Demo container always healthy
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # TEST RUNNER (Multi-Mode Container for Test Execution)
  # STAMP: SC-CNT-TEST-001 to SC-CNT-TEST-005
  # TDG: TDG-CNT-001 to TDG-CNT-003
  # AOR: AOR-CNT-TEST-001 to AOR-CNT-TEST-004
  # Reference: docs/architecture/container-multi-mode-architecture.md
  # Incident: INC-20251219-001
  # ═══════════════════════════════════════════════════════════════════════════

  indrajaal-test-runner:
    image: localhost/indrajaal-sopv51-elixir-app:elixir-1.19-otp28
    container_name: indrajaal-test-runner
    hostname: test-runner
    networks:
      indrajaal-test-net:
        ipv4_address: 172.31.0.25
    environment:
      # Multi-mode container settings (SC-CNT-TEST-001, SC-CNT-TEST-004)
      CONTAINER_MODE: test
      MIX_ENV: test
      # SC-CNT-TEST-003: NO Phoenix server in test mode
      PHX_SERVER: "false"
      # Database connectivity (SC-CNT-TEST-005)
      DATABASE_URL: ecto://indrajaal:indrajaal_test@172.31.0.10:5433/indrajaal_test
      POSTGRES_USER: indrajaal
      POSTGRES_PASSWORD: indrajaal_test
      SECRET_KEY_BASE: test_secret_key_base_64_chars_long_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      # SOPv5.11 Compliance
      CONTAINER_ENFORCEMENT: "true"
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      PATIENT_MODE: "enabled"
      INFINITE_PATIENCE: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
      # Optimized for test execution
      ELIXIR_ERL_OPTIONS: "+S 8 +A 64 +K true +P 1048576"
      ERL_MAX_PORTS: 262144
      # CA Certificates for HTTPS
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_DIR: /etc/ssl/certs
      HEX_CACERTS_PATH: /etc/ssl/certs/ca-certificates.crt
    volumes:
      - .:/workspace:z
      - test_runner_deps:/workspace/deps
      - test_runner_build:/workspace/_build
      - ./data/tmp:/var/log/claude:z
      # Mount host CA certificates
      - /etc/ssl/certs:/etc/ssl/certs:ro
    working_dir: /workspace
    # Note: Default entrypoint handles CONTAINER_MODE=test
    # Additional test arguments can be passed via command
    # Example: command: ["--max-failures", "50", "--cover"]
    depends_on:
      indrajaal-db-primary:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '8.0'
    # No healthcheck - test runner exits when done
    # Don't restart after tests complete
    restart: "no"

  # ═══════════════════════════════════════════════════════════════════════════
  # KMS CATALOG LAYER (Backstage Replacement)
  # ═══════════════════════════════════════════════════════════════════════════
  kms-catalog:
    build:
      context: .
      dockerfile: Dockerfile.kms-catalog
    image: localhost/cepaf-kms-catalog:latest
    container_name: kms-catalog
    hostname: kms-catalog
    networks:
      indrajaal-test-net:
        ipv4_address: 172.31.0.40
    environment:
      - KMS_DB_PATH=/app/data/kms/holons.db
    volumes:
      - ./data/kms:/app/data/kms:z
    depends_on:
      indrajaal-db-primary:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_primary_data:
    driver: local
  db_replica_data:
    driver: local
  app1_deps:
    driver: local
  app1_build:
    driver: local
  app2_deps:
    driver: local
  app2_build:
    driver: local
  app3_deps:
    driver: local
  app3_build:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  # Test runner volumes (SC-CNT-TEST-001)
  test_runner_deps:
    driver: local
  test_runner_build:
    driver: local