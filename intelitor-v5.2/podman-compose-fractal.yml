# Fractal Logging System - CEPAF 3-Container Deployment
# Version: 1.0.0
# Reference: docs/planning/FRACTAL_LOGGING_5LEVEL_CRITICALITY_PLAN.md
#
# Usage:
#   podman-compose -f podman-compose-fractal.yml up -d
#   podman-compose -f podman-compose-fractal.yml logs -f
#   podman-compose -f podman-compose-fractal.yml down
#
# STAMP Compliance:
#   SC-LOG-001: Async dispatch via BatchEncoder
#   SC-LOG-002: Auto-throttle at CPU > 90%
#   SC-LOG-006: HLC timestamps for L3+ logs
#   SC-LOG-007: Batch flush within 10ms
#   SC-CNT-009: Podman rootless containerization

version: "3.9"

services:
  # ============================================================
  # INDRAJAAL-APP: Phoenix Application with Fractal Logging
  # ============================================================
  indrajaal-app:
    image: localhost/indrajaal-app:latest
    container_name: indrajaal-app-fractal
    hostname: indrajaal-app
    environment:
      # Database Connection
      - DATABASE_URL=ecto://postgres:postgres@indrajaal-db:5432/indrajaal_dev
      - POSTGRES_HOST=indrajaal-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=indrajaal_dev

      # Phoenix Configuration
      - PHX_HOST=localhost
      - PHX_PORT=4000
      - SECRET_KEY_BASE=fractal_logging_secret_key_base_for_development_only_change_in_production

      # Fractal Logging Configuration
      - FRACTAL_LOGGING_ENABLED=true
      - FRACTAL_DEFAULT_LEVEL=l4
      - FRACTAL_CYBERNETIC_ENABLED=true
      - FRACTAL_OODA_CYCLE_MS=10000

      # Zenoh-Inspired Features
      - FRACTAL_ZENOH_FEATURES=key_expressions,write_filter,hlc,batch_encoding,content_routing

      # OpenTelemetry Configuration
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://indrajaal-obs:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=indrajaal-app
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=indrajaal,service.version=5.2.0

      # STAMP Constraints Configuration
      - FRACTAL_CPU_THRESHOLD=90
      - FRACTAL_MEMORY_THRESHOLD=85
      - FRACTAL_BATCH_FLUSH_MS=10
      - FRACTAL_MAX_BOOST_TTL_MS=3600000

      # Patient Mode (Always enabled)
      - NO_TIMEOUT=true
      - PATIENT_MODE=enabled
      - INFINITE_PATIENCE=true

    ports:
      - "4000:4000"
    depends_on:
      indrajaal-db:
        condition: service_healthy
      indrajaal-obs:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - fractal-net-auto
    volumes:
      - fractal-data:/app/data
    restart: unless-stopped
    labels:
      - "fractal.component=app"
      - "fractal.version=5.2.0"

  # ============================================================
  # INDRAJAAL-DB: PostgreSQL 17 with TimescaleDB
  # ============================================================
  indrajaal-db:
    image: localhost/indrajaal-db:latest
    pull_policy: never
    container_name: indrajaal-db-fractal
    hostname: indrajaal-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=indrajaal_dev
      - PGDATA=/var/lib/postgresql/data/pgdata

      # TimescaleDB Configuration
      - TIMESCALEDB_TELEMETRY=off

      # Performance Tuning
      - POSTGRES_SHARED_BUFFERS=256MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=768MB
      - POSTGRES_MAINTENANCE_WORK_MEM=64MB
      - POSTGRES_WAL_BUFFERS=16MB
      - POSTGRES_MAX_CONNECTIONS=200
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fractal-net-auto
    volumes:
      - fractal-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    labels:
      - "fractal.component=db"
      - "fractal.version=17"

  # ============================================================
  # INDRAJAAL-OBS: Observability Stack (OTEL Collector + SigNoz)
  # ============================================================
  indrajaal-obs:
    image: localhost/indrajaal-obs:latest
    pull_policy: never
    container_name: indrajaal-obs-fractal
    hostname: indrajaal-obs
    environment:
      # OpenTelemetry Collector Configuration
      - OTEL_COLLECTOR_CONFIG=/etc/otel/config.yaml

      # Fractal Logging Backend
      - FRACTAL_BATCH_FLUSH_MS=10
      - FRACTAL_CONTENT_ROUTING=enabled

      # SigNoz Configuration
      - SIGNOZ_ENDPOINT=http://localhost:8080

      # Retention Configuration
      - LOG_RETENTION_DAYS=30
      - METRIC_RETENTION_DAYS=90
      - TRACE_RETENTION_DAYS=14
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8080:8080"   # SigNoz UI
      - "13133:13133" # Health Check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - fractal-net-auto
    volumes:
      - fractal-obs-data:/var/lib/signoz
      - ./config/otel-config-fractal.yaml:/etc/otel/config.yaml:ro
    restart: unless-stopped
    labels:
      - "fractal.component=obs"
      - "fractal.version=1.0.0"

# ============================================================
# NETWORKS
# ============================================================
networks:
  fractal-net-auto:
    driver: bridge

# ============================================================
# VOLUMES
# ============================================================
volumes:
  fractal-data:
    name: fractal-data
  fractal-db-data:
    name: fractal-db-data
  fractal-obs-data:
    name: fractal-obs-data
