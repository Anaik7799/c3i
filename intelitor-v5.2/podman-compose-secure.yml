# =============================================================================
# SOPv5.11 Secure Container Orchestration Configuration
# =============================================================================
# Version: 2.0.0-SECURE
# Updated: 2025-12-19
# Framework: SOPv5.11 + TPS + STAMP + Security Hardening
#
# STAMP Compliance:
#   - SC-CNT-009: NixOS containers only
#   - SC-CNT-010: localhost/ registry only
#   - SC-CNT-011: PHICS < 50ms latency
#   - SC-CNT-012: Rootless execution enforced
#   - SC-CNT-013: Health verification before operations
#   - SC-CNT-014: Resource isolation maintained
#   - SC-CNT-015: Network security enforced
#   - SC-CNT-016: No registry drift allowed
#
# Security Features:
#   - Read-only root filesystem (where applicable)
#   - Dropped ALL capabilities (minimal additions)
#   - Non-root user execution (UID 1000)
#   - Resource limits per STAMP ContainerAllocation matrix
#   - Network isolation with explicit policies
#   - Security options (no-new-privileges, seccomp)
#
# Usage:
#   podman-compose -f podman-compose-secure.yml up -d
# =============================================================================

version: '3.8'

# =============================================================================
# Network Configuration with Security Isolation
# =============================================================================
networks:
  indrajaal-net:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1

# =============================================================================
# Services
# =============================================================================
services:

  # ===========================================================================
  # DATABASE CONTAINER (indrajaal-db)
  # Resources: CPU 4, RAM 16GB (per STAMP ContainerAllocation)
  # ===========================================================================
  indrajaal-db:
    image: localhost/indrajaal-timescaledb-demo:nixos-devenv
    container_name: indrajaal-db
    hostname: indrajaal-db
    networks:
      indrajaal-net:
        ipv4_address: 172.30.0.10

    # Security Context (SC-CNT-012)
    user: "999:999"  # postgres user
    read_only: false  # Database needs write access to data dir
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER

    # Resource Limits (STAMP ContainerAllocation: CPU 4, RAM 16GB)
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '4.0'
        reservations:
          memory: 8G
          cpus: '2.0'
    pids_limit: 1024

    environment:
      # Database Configuration
      POSTGRES_DB: indrajaal_dev
      POSTGRES_USER: indrajaal
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      PGPORT: 5433
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      # TimescaleDB Configuration
      TIMESCALEDB_TELEMETRY: "off"
      TS_TUNE_MEMORY: 8GB
      TS_TUNE_NUM_CPUS: 4
      TS_TUNE_MAX_CONNS: 200
      # SOPv5.11 Compliance
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"

    ports:
      - "127.0.0.1:5433:5433"  # Localhost only - database should not be exposed

    volumes:
      - ./data/timescaledb:/var/lib/postgresql/data:z
      - ./priv/repo/migrations:/docker-entrypoint-initdb.d:ro
      - ./scripts/timescale/init-timescaledb.sql:/docker-entrypoint-initdb.d/99-init-timescaledb.sql:ro
      - ./data/tmp:/var/log/claude:z
      # Secrets mount (tmpfs)
      - type: tmpfs
        target: /run/secrets
        tmpfs:
          size: 1048576  # 1MB

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indrajaal -d indrajaal_dev -p 5433 -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ===========================================================================
  # APPLICATION CONTAINER (indrajaal-app)
  # Resources: CPU 12, RAM 32GB (per STAMP ContainerAllocation)
  # ===========================================================================
  indrajaal-app:
    image: localhost/indrajaal-sopv51-elixir-app:nixos-25.05-devenv
    container_name: indrajaal-app
    hostname: indrajaal-app
    networks:
      indrajaal-net:
        ipv4_address: 172.30.0.20

    # Security Context (SC-CNT-012)
    user: "1000:1000"  # developer user
    read_only: true  # Read-only root filesystem
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for Phoenix on port 4000

    # Resource Limits (STAMP ContainerAllocation: CPU 12, RAM 32GB)
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '12.0'
        reservations:
          memory: 16G
          cpus: '6.0'
    pids_limit: 4096

    environment:
      # Application Configuration
      MIX_ENV: dev
      DATABASE_URL: ecto://indrajaal:indrajaal_dev@172.30.0.10:5433/indrajaal_dev
      REDIS_URL: redis://localhost:6379
      SECRET_KEY_BASE_FILE: /run/secrets/secret_key_base
      PHX_HOST: localhost
      PHX_PORT: 4000
      PHX_SERVER: "true"
      # SOPv5.11 Compliance
      CONTAINER_ENFORCEMENT: "true"
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
      # Performance Configuration
      ELIXIR_ERL_OPTIONS: "+S 12 +A 64 +K true +P 2097152"
      ERL_MAX_PORTS: 524288
      # Container Mode
      CONTAINER_MODE: dev

    ports:
      - "4000:4000"   # Phoenix app
      - "4001:4001"   # Phoenix LiveView

    volumes:
      # Read-only source code
      - .:/workspace:ro,z
      # Writable directories (tmpfs for security)
      - type: tmpfs
        target: /workspace/_build
        tmpfs:
          size: 4294967296  # 4GB
      - type: tmpfs
        target: /workspace/deps
        tmpfs:
          size: 2147483648  # 2GB
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 1073741824  # 1GB
      - type: tmpfs
        target: /run/secrets
        tmpfs:
          size: 1048576  # 1MB
      # Persistent data
      - ./data/tmp:/var/log/claude:z

    working_dir: /workspace

    depends_on:
      indrajaal-db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health", "--max-time", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"

  # ===========================================================================
  # REDIS SIDECAR (shares network with indrajaal-app)
  # ===========================================================================
  indrajaal-redis:
    image: localhost/indrajaal-redis-demo:nixos-devenv
    container_name: indrajaal-redis
    network_mode: "service:indrajaal-app"

    # Security Context
    user: "1000:1000"
    read_only: false  # Redis needs write access
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL

    # Resource Limits
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    pids_limit: 512

    environment:
      REDIS_MAXMEMORY: 2gb
      REDIS_MAXMEMORY_POLICY: allkeys-lru
      REDIS_APPENDONLY: "yes"

    volumes:
      - ./data/redis:/data:z

    depends_on:
      indrajaal-app:
        condition: service_started

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

    restart: unless-stopped

  # ===========================================================================
  # OBSERVABILITY CONTAINER (indrajaal-obs)
  # Resources: CPU 4, RAM 8GB (per STAMP ContainerAllocation)
  # ===========================================================================
  indrajaal-obs:
    image: localhost/indrajaal-prometheus-demo:nixos-devenv
    container_name: indrajaal-obs
    hostname: indrajaal-obs
    networks:
      indrajaal-net:
        ipv4_address: 172.30.0.30

    # Security Context (SC-CNT-012)
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL

    # Resource Limits (STAMP ContainerAllocation: CPU 4, RAM 8GB)
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'
    pids_limit: 2048

    environment:
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"

    ports:
      - "9090:9090"   # Prometheus
      - "3000:3000"   # Grafana (sidecar)

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Prometheus data (needs write access)
      - ./data/prometheus:/prometheus:z
      - ./data/tmp:/var/log/claude:z
      # tmpfs for runtime
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 536870912  # 512MB

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=20GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'

    depends_on:
      indrajaal-app:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    restart: unless-stopped

  # ===========================================================================
  # GRAFANA SIDECAR (shares network with indrajaal-obs)
  # ===========================================================================
  indrajaal-grafana:
    image: localhost/indrajaal-grafana-demo:nixos-devenv
    container_name: indrajaal-grafana
    network_mode: "service:indrajaal-obs"

    # Security Context
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL

    # Resource Limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    pids_limit: 512

    environment:
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_PATHS_PROVISIONING: /var/lib/grafana/provisioning
      GF_PATHS_DATA: /var/lib/grafana
      GF_PATHS_LOGS: /var/log/grafana

    volumes:
      - ./data/grafana:/var/lib/grafana:z
      - ./monitoring/grafana-indrajaal-dashboard.json:/var/lib/grafana/dashboards/indrajaal.json:ro
      - ./monitoring/grafana/provisioning:/var/lib/grafana/provisioning:ro
      # Secrets mount
      - type: tmpfs
        target: /run/secrets
        tmpfs:
          size: 1048576  # 1MB
      # Logs tmpfs
      - type: tmpfs
        target: /var/log/grafana
        tmpfs:
          size: 104857600  # 100MB

    depends_on:
      indrajaal-obs:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

    restart: unless-stopped

  # ===========================================================================
  # NGINX SIDECAR (shares network with indrajaal-app)
  # ===========================================================================
  indrajaal-nginx:
    image: localhost/indrajaal-nginx-demo:nixos-devenv
    container_name: indrajaal-nginx
    network_mode: "service:indrajaal-app"

    # Security Context
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for port 80/443

    # Resource Limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    pids_limit: 256

    environment:
      NGINX_WORKER_PROCESSES: auto
      NGINX_WORKER_CONNECTIONS: 4096

    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./priv/static:/var/www/static:ro
      # Nginx runtime dirs (tmpfs)
      - type: tmpfs
        target: /var/cache/nginx
        tmpfs:
          size: 268435456  # 256MB
      - type: tmpfs
        target: /var/run
        tmpfs:
          size: 10485760  # 10MB
      - type: tmpfs
        target: /var/log/nginx
        tmpfs:
          size: 104857600  # 100MB

    depends_on:
      indrajaal-app:
        condition: service_started

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

    restart: unless-stopped

  # ===========================================================================
  # KMS CATALOG (Backstage Replacement)
  # ===========================================================================
  kms-catalog:
    build:
      context: .
      dockerfile: Dockerfile.kms-catalog
    image: localhost/cepaf-kms-catalog:latest
    container_name: kms-catalog
    hostname: kms-catalog
    networks:
      indrajaal-net:
        ipv4_address: 172.30.0.40

    # Security Context
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

    environment:
      - KMS_DB_PATH=/app/data/kms/holons.db

    volumes:
      - ./data/kms:/app/data/kms:z
      # tmpfs for runtime
      - type: tmpfs
        target: /tmp

    depends_on:
      indrajaal-db:
        condition: service_healthy

    restart: unless-stopped