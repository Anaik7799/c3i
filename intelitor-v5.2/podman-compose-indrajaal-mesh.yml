# INDRAJAAL FULL STANDBY MESH MODE
# Architecture: 3-Container Model (App, DB, Obs) + Distributed Mesh
# Mode: Standby (Ready for immediate activation)
# STAMP: SC-MESH-001 to SC-ZENOH-001

version: '3.8'

networks:
  indrajaal-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  # ============================================================================
  # 1. DATABASE LAYER (indrajaal-db)
  # ============================================================================
  indrajaal-db:
    image: localhost/indrajaal-db:latest
    container_name: indrajaal-db
    hostname: indrajaal-db
    networks:
      indrajaal-mesh:
        ipv4_address: 172.30.0.10
    environment:
      POSTGRES_DB: indrajaal_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGPORT: 5433
      # Mesh Mode
      MESH_MODE: standby
      NODE_ROLE: database
    ports:
      - "5433:5433"
    volumes:
      - ./data/timescaledb:/var/lib/postgresql/data:z
      - ./data/tmp:/var/log/claude:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indrajaal_dev -p 5433 || pg_isready -U postgres -p 5433"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================================
  # 2. REDIS SIDECAR
  # ============================================================================
  indrajaal-redis:
    image: docker.io/library/redis:alpine
    container_name: indrajaal-redis
    hostname: indrajaal-redis
    networks:
      indrajaal-mesh:
        ipv4_address: 172.30.0.11
    environment:
      MESH_MODE: standby
      NODE_ROLE: cache
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data:z
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # 3. APPLICATION LAYER (indrajaal-app)
  # ============================================================================
  indrajaal-app:
    image: localhost/indrajaal-sopv51-elixir-app:nixos-25.05-devenv
    container_name: indrajaal-app
    hostname: indrajaal-app
    networks:
      indrajaal-mesh:
        ipv4_address: 172.30.0.20
    environment:
      # Mode Configuration
      CONTAINER_MODE: mesh_standby
      MIX_ENV: dev
      MESH_MODE: standby
      NODE_ROLE: application
      # Database
      DATABASE_URL: postgres://postgres:postgres@indrajaal-db:5433/indrajaal_dev
      REDIS_URL: redis://indrajaal-redis:6379
      # BEAM Tuning
      ELIXIR_ERL_OPTIONS: "+S 16 +A 32 +K true +P 1048576"
      ERL_MAX_PORTS: 524288
      # Patient Mode (SC-VAL-001)
      NO_TIMEOUT: 'true'
      PATIENT_MODE: enabled
      INFINITE_PATIENCE: 'true'
      # ════════════════════════════════════════════════════════════════
      # MESH CONFIGURATION (SC-MESH-001)
      # ════════════════════════════════════════════════════════════════
      DISTRIBUTED_MODE: 'true'
      CLUSTER_STRATEGY: 'mesh_standby'
      MESH_ROLE: 'primary'
      # Agent Mesh Configuration (7 Agents)
      AGENT_MESH_ENABLED: 'true'
      AGENT_OODA_ENABLED: 'true'
      AGENT_ACE_ENABLED: 'true'
      AGENT_CORTEX_ENABLED: 'true'
      AGENT_FRACTAL_ENABLED: 'true'
      AGENT_CEPAF_ENABLED: 'true'
      AGENT_SENTINEL_ENABLED: 'true'
      AGENT_KPI_DASHBOARD_ENABLED: 'true'
      # Worker Mesh Configuration (4 Workers)
      WORKER_MESH_ENABLED: 'true'
      WORKER_FLAME_ENABLED: 'true'
      WORKER_OBAN_ENABLED: 'true'
      WORKER_BROADWAY_ENABLED: 'true'
      WORKER_BATCH_ENABLED: 'true'
      # Zenoh Control Plane
      ZENOH_ENABLED: 'true'
      ZENOH_ROUTER_PORT: '7447'
      ZENOH_CONTROL_TOPIC: 'indrajaal/mesh/control'
      ZENOH_STATE_TOPIC: 'indrajaal/mesh/state'
      # FLAME Configuration
      FLAME_MIN_NODES: '0'
      FLAME_MAX_NODES: '10'
      FLAME_IDLE_TIMEOUT: '30000'
      # OpenTelemetry
      OTEL_SERVICE_NAME: indrajaal
      OTEL_EXPORTER_OTLP_ENDPOINT: http://indrajaal-otel:4317
      # Phoenix
      PHX_HOST: localhost
      PHX_PORT: 4000
      SECRET_KEY_BASE: mesh_standby_secret_key_base_64_chars_long_xxxxxxxxxxxxxxxxxxxxxxxx
    ports:
      - "4000:4000"
      - "4369:4369"   # EPMD
      - "7447:7447"   # Zenoh Router
      - "9100-9105:9100-9105"  # Distribution ports
    volumes:
      - .:/workspace:z
      - mesh_deps:/workspace/deps
      - mesh_build:/workspace/_build
      - ./data/tmp:/var/log/claude:z
    depends_on:
      indrajaal-db:
        condition: service_healthy
      indrajaal-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health", "||", "exit", "0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ============================================================================
  # 4. OBSERVABILITY LAYER
  # ============================================================================
  indrajaal-otel:
    image: docker.io/otel/opentelemetry-collector:latest
    container_name: indrajaal-otel
    hostname: indrajaal-otel
    networks:
      indrajaal-mesh:
        ipv4_address: 172.30.0.30
    environment:
      MESH_MODE: standby
      NODE_ROLE: telemetry
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/otel/config.yaml:/etc/otelcol/config.yaml:ro
    command: ["--config=/etc/otelcol/config.yaml"]
    restart: unless-stopped

  indrajaal-prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: indrajaal-prometheus
    hostname: indrajaal-prometheus
    networks:
      indrajaal-mesh:
        ipv4_address: 172.30.0.31
    environment:
      MESH_MODE: standby
      NODE_ROLE: metrics
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus:z
    restart: unless-stopped

  indrajaal-grafana:
    image: docker.io/grafana/grafana:latest
    container_name: indrajaal-grafana
    hostname: indrajaal-grafana
    networks:
      indrajaal-mesh:
        ipv4_address: 172.30.0.32
    environment:
      GF_SECURITY_ADMIN_PASSWORD: indrajaal
      MESH_MODE: standby
      NODE_ROLE: dashboard
    ports:
      - "3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana:z
    restart: unless-stopped

volumes:
  mesh_deps:
    driver: local
  mesh_build:
    driver: local
