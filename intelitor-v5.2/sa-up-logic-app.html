<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sa-up Logic Explorer | CEPAF v20.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --indra-purple: #6f42c1;
            --indra-dark: #1a1a1a;
            --indra-success: #198754;
            --indra-info: #0dcaf0;
        }
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero-section {
            background: linear-gradient(135deg, var(--indra-dark) 0%, var(--indra-purple) 100%);
            color: white;
            padding: 4rem 0;
            border-bottom: 5px solid var(--indra-info);
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s;
            height: 100%;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .flow-step {
            border-left: 4px solid var(--indra-purple);
            padding-left: 20px;
            margin-bottom: 30px;
            position: relative;
        }
        .flow-step::before {
            content: "";
            width: 16px;
            height: 16px;
            background: var(--indra-purple);
            border-radius: 50%;
            position: absolute;
            left: -10px;
            top: 0;
        }
        .badge-sop {
            background-color: var(--indra-info);
            color: var(--indra-dark);
            font-weight: bold;
        }
        .data-table th {
            background-color: var(--indra-dark);
            color: white;
        }
        pre {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('flow');

            return (
                <div>
                    <header className="hero-section text-center">
                        <div className="container">
                            <h1 className="display-4 fw-bold">sa-up Logic Protocol</h1>
                            <p className="lead">Cybernetic Execution & Performance Architect (CEPAF) v20.0</p>
                            <div className="d-flex justify-content-center gap-2">
                                <span className="badge badge-sop">SOPv5.11 COMPLIANT</span>
                                <span className="badge bg-success">SIL-4 VERIFIED</span>
                                <span className="badge bg-warning text-dark">AOR ENFORCED</span>
                            </div>
                        </div>
                    </header>

                    <nav className="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
                        <div className="container">
                            <div className="navbar-nav w-100 d-flex justify-content-around">
                                <button className={`nav-link btn btn-link ${activeTab === 'flow' ? 'active text-info' : ''}`} onClick={() => setActiveTab('flow')}> 
                                    <i className="bi bi-diagram-3-fill me-2"></i>Control Flow
                                </button>
                                <button className={`nav-link btn btn-link ${activeTab === 'data' ? 'active text-info' : ''}`} onClick={() => setActiveTab('data')}> 
                                    <i className="bi bi-database-fill me-2"></i>Data Flow
                                </button>
                                <button className={`nav-link btn btn-link ${activeTab === 'compliance' ? 'active text-info' : ''}`} onClick={() => setActiveTab('compliance')}> 
                                    <i className="bi bi-shield-lock-fill me-2"></i>Compliance
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="container my-5">
                        {activeTab === 'flow' && (
                            <div className="row">
                                <div className="col-md-8">
                                    <h2 className="mb-4">The Boot Sequence</h2>
                                    <div className="flow-step">
                                        <h4>Step 1: Initialization & Reset</h4>
                                        <p>Protocol starts in <code>Orchestrator.runProtocol</code>. Traces are initialized and the <code>warningCount</code> is reset to zero to enforce <strong>AOR-QUA-001</strong>.</p>
                                    </div>
                                    <div className="flow-step">
                                        <h4>Step 2: Pre-flight Verification</h4>
                                        <p>Invokes <code>Podman.captureSystemInfo</code>. This ensures the environment satisfies Axiom 2 (Isolation) before a single container is spawned.</p>
                                    </div>
                                    <div className="flow-step">
                                        <h4>Step 3: Standalone Verification Checks</h4>
                                        <p>Checks for specialized flags (<code>DbTestOnly</code>, <code>ObsTestOnly</code>). If active, it diverts flow to isolated verifiers instead of full deployment.</p>
                                    </div>
                                    <div className="flow-step">
                                        <h4>Step 4: DEPLOY Phase (The Hub)</h4>
                                        <p>Iterates through the <code>Registry</code>. Resolves absolute paths for <code>podman-compose</code> files. Triggers <code>Podman.composeUp</code> for each targeted environment.</p>
                                    </div>
                                    <div className="flow-step">
                                        <h4>Step 5: 30-Second Mandate</h4>
                                        <p>Verified via <code>Stopwatch</code>. If the duration between Step 4 start and Step 5 completion exceeds 30,000ms, the protocol fails with a <code>BootMandateViolation</code>.</p>
                                    </div>
                                    <div className="flow-step">
                                        <h4>Step 6: Homeostasis Validation</h4>
                                        <p>Runs <code>AceVerifier</code> and <code>UiVerifier</code>. Finally, checks the Zero-Warnings Gate. If success, emits <code>Homeostasis Achieved</code>.</p>
                                    </div>
                                </div>
                                <div className="col-md-4">
                                    <div className="card bg-dark text-white p-3">
                                        <h5><i className="bi bi-code-slash me-2"></i>Core Code snippet</h5>
                                        <pre>{`let runProtocol logger runner config = 
  asyncResult {
    do! Podman.captureSystemInfo
    for env in config.Environments do
      let! _ = Podman.composeUp
    do! AceVerifier.execute
    do! checkZeroWarningsGate
    return ()
  }`}</pre>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'data' && (
                            <div>
                                <h2 className="mb-4 text-center">Data Lifecycle</h2>
                                <div className="row row-cols-1 row-cols-md-3 g-4">
                                    <div className="col">
                                        <div className="card p-3">
                                            <h5 className="text-primary"><i className="bi bi-box-arrow-in-right me-2"></i>Input Data</h5>
                                            <ul className="list-group list-group-flush">
                                                <li className="list-group-item"><code>Registry</code>: Map of Env to Compose path</li>
                                                <li className="list-group-item"><code>CepaConfig</code>: Patient mode, timeouts</li>
                                                <li className="list-group-item"><code>Environment</code>: Target partitions</li>
                                            </ul>
                                        </div>
                                    </div>
                                    <div className="col">
                                        <div className="card p-3 border-primary">
                                            <h5 className="text-primary"><i className="bi bi-gear-wide-connected me-2"></i>State Data</h5>
                                            <ul className="list-group list-group-flush">
                                                <li className="list-group-item"><code>AsyncResult</code>: The ROP wrapper</li>
                                                <li className="list-group-item"><code>Stopwatch</code>: Performance metrics</li>
                                                <li className="list-group-item"><code>warningCount</code>: Quality gate state</li>
                                            </ul>
                                        </div>
                                    </div>
                                    <div className="col">
                                        <div className="card p-3">
                                            <h5 className="text-primary"><i className="bi bi-box-arrow-right me-2"></i>Quadplex Output</h5>
                                            <ul className="list-group list-group-flush">
                                                <li className="list-group-item"><strong>Console</strong>: ANSI formatted logs</li>
                                                <li className="list-group-item"><strong>File</strong>: Session .log artifacts</li>
                                                <li className="list-group-item"><strong>OTEL</strong>: Spans & Histograms</li>
                                                <li className="list-group-item"><strong>CubDB</strong>: Queryable state tree</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'compliance' && (
                            <div className="card p-4">
                                <h2>Safety & Quality Mandates</h2>
                                <table className="table table-hover mt-4 data-table">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Mandate</th>
                                            <th>Logic Implementation</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td><strong>SC-OBS-069</strong></td>
                                            <td>Quadplex Logging</td>
                                            <td>Implementation of <code>QuadplexLogger</code> backend in F#</td>
                                        </tr>
                                        <tr>
                                            <td><strong>AOR-QUA-001</strong></td>
                                            <td>Zero Warnings</td>
                                            <td>Atomic counter checked at protocol end</td>
                                        </tr>
                                        <tr>
                                            <td><strong>Section 75.1</strong></td>
                                            <td>30s Boot Target</td>
                                            <td><code>startupDuration &gt; config.BootThresholdMs</code> check</td>
                                        </tr>
                                        <tr>
                                            <td><strong>Axiom 2</strong></td>
                                            <td>Isolation</td>
                                            <td><code>Podman.captureSystemInfo</code> pre-flight gate</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    <footer className="bg-dark text-white py-4 mt-5">
                        <div className="container text-center">
                            <p className="mb-0">Indrajaal v20.0 | Cybernetic Architect Logic Explorer</p>
                            <small className="text-muted">Generated by Gemini | Sunday, January 4, 2026</small>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
