# podman-compose-swarm-14.yml
# Phase 4+7: Full 15-Container Swarm Architecture with Boot Optimization
# =============================================================================
# WHAT: Complete 15-container mesh with HA, Cognitive Plane, and Satellites
# WHY: Production-equivalent environment with full high-availability
# CONSTRAINTS: Requires rootless Podman 5.4.1+, ~40GB RAM
#
# MATHEMATICAL FOUNDATIONS (Phase 3.5):
#   - DAG: 15 nodes, 7 tiers, topological ordering
#   - CPM: Critical path ~120s (db → zenoh → bridge → app-1 → app-2)
#   - RCPSP: Memory 40GB, CPU 32 cores bounded
#   - DFA: 15 states per container lifecycle
#
# PHASE 7 OPTIMIZATIONS (2026-01-18):
#   - SC-OPT-005: Pre-compiled BEAM in image
#   - SC-OPT-006: Wave parallelization (W2+W3)
#   - SC-OPT-007: BEAM volume caching for faster restarts
#   - SC-OPT-008: Boot metrics published to Zenoh
#   - PHICS: Physical Interface Control System (<50ms latency)
#
# STAMP Constraints:
#   SC-SWARM-001 to SC-SWARM-020: Full swarm orchestration
#   SC-SIL6-006: 2oo3 voting for Zenoh quorum
#   SC-SIL6-001 to SC-SIL6-015: SIL-6 Biomorphic Extended Safety
#   SC-PHICS-001 to SC-PHICS-010: Physical Interface Control
#
# Wave Architecture (with parallelization):
#   Wave 1 (Foundation):      indrajaal-db-prod (sequential)
#   Wave 2 (Obs + Zenoh):     indrajaal-obs-prod, zenoh-router-{1,2,3} (PARALLEL)
#   Wave 3 (Cognitive):       cepaf-bridge, indrajaal-cortex (early start after quorum)
#   Wave 4 (Application):     indrajaal-ex-app-1
#   Wave 5 (HA + Satellites): indrajaal-ex-app-{2,3}, indrajaal-chaya, ml-runner-{1,2} (PARALLEL)
# =============================================================================

version: '3.8'

networks:
  indrajaal-swarm-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1

  indrajaal-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.31.0.0/16

# =============================================================================
# WAVE 1: FOUNDATION (DB) - IP: 172.30.0.20
# =============================================================================
services:
  indrajaal-db-prod:
    image: localhost/indrajaal-timescaledb-demo:nixos-devenv
    container_name: indrajaal-db-prod
    hostname: indrajaal-db-prod
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.20
      indrajaal-internal:
    environment:
      POSTGRES_DB: indrajaal_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGPORT: "5433"
      TS_TUNE_MEMORY: 4GB
      TS_TUNE_NUM_CPUS: 4
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
      PGDATA: /var/lib/postgresql/pgdata
    ports:
      - "5433:5433"
    volumes:
      - db_swarm_data:/var/lib/postgresql/pgdata:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indrajaal_prod -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: database
      environment: swarm-14
      wave: "1"
      priority: "P0"
      sil.level: "6"

# =============================================================================
# WAVE 2: OBSERVABILITY (172.30.0.30) + ZENOH 2oo3 QUORUM (172.30.0.40-42)
# =============================================================================

  indrajaal-obs-prod:
    image: localhost/indrajaal-obs-unified:nixos-devenv
    container_name: indrajaal-obs-prod
    hostname: indrajaal-obs-prod
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.30
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
      OTEL_SERVICE_NAME: indrajaal-obs-prod
      LOG_LEVEL: info
      FRACTAL_LOGGING_ENABLED: "true"
      PROMETHEUS_RETENTION_TIME: 15d
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: indrajaal
      GF_SERVER_HTTP_PORT: "3000"
      UNIFIED_OBS_MODE: "true"
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9090:9090"
      - "3000:3000"
      - "3100:3100"
    volumes:
      - otel_swarm_data:/var/log/otel:z
      - prometheus_swarm_data:/prometheus:z
      - grafana_swarm_data:/var/lib/grafana:z
      - loki_swarm_data:/loki:z
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy && wget -q --spider http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 10G
          cpus: '6'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: observability
      environment: swarm-14
      wave: "2"
      priority: "P1"
      sil.level: "6"

  # Zenoh Router 1 (Primary) - 172.30.0.40
  zenoh-router-1:
    image: eclipse/zenoh:1.0.0
    container_name: zenoh-router-1
    hostname: zenoh-router-1
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.40
    depends_on:
      indrajaal-db-prod:
        condition: service_healthy
    environment:
      RUST_LOG: info
      ZENOH_ROUTER_ID: router-1
    ports:
      - "7447:7447"
      - "8448:8448"
      - "8000:8000"
    volumes:
      - ../../../config/zenoh/zenoh-router-1.json5:/zenoh.json5:ro
    command: ["-c", "/zenoh.json5"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: zenoh-router
      environment: swarm-14
      wave: "2"
      priority: "P0"
      mesh.quorum: "router-1"
      sil.level: "6"

  # Zenoh Router 2 (Secondary) - 172.30.0.41
  zenoh-router-2:
    image: eclipse/zenoh:1.0.0
    container_name: zenoh-router-2
    hostname: zenoh-router-2
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.41
    depends_on:
      indrajaal-db-prod:
        condition: service_healthy
    environment:
      RUST_LOG: info
      ZENOH_ROUTER_ID: router-2
    ports:
      - "7448:7447"
      - "8449:8448"
      - "8001:8000"
    volumes:
      - ../../../config/zenoh/zenoh-router-2.json5:/zenoh.json5:ro
    command: ["-c", "/zenoh.json5"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: zenoh-router
      environment: swarm-14
      wave: "2"
      priority: "P0"
      mesh.quorum: "router-2"
      sil.level: "6"

  # Zenoh Router 3 (Tertiary) - 172.30.0.42
  zenoh-router-3:
    image: eclipse/zenoh:1.0.0
    container_name: zenoh-router-3
    hostname: zenoh-router-3
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.42
    depends_on:
      indrajaal-db-prod:
        condition: service_healthy
    environment:
      RUST_LOG: info
      ZENOH_ROUTER_ID: router-3
    ports:
      - "7449:7447"
      - "8450:8448"
      - "8002:8000"
    volumes:
      - ../../../config/zenoh/zenoh-router-3.json5:/zenoh.json5:ro
    command: ["-c", "/zenoh.json5"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: zenoh-router
      environment: swarm-14
      wave: "2"
      priority: "P0"
      mesh.quorum: "router-3"
      sil.level: "6"

# =============================================================================
# WAVE 3: COGNITIVE PLANE (172.30.0.50-60)
# =============================================================================

  cepaf-bridge:
    image: localhost/cepaf-bridge:latest
    container_name: cepaf-bridge
    hostname: cepaf-bridge
    stdin_open: true
    tty: true
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.50
    depends_on:
      zenoh-router-1:
        condition: service_healthy
      zenoh-router-2:
        condition: service_healthy
      zenoh-router-3:
        condition: service_healthy
    environment:
      CEPAF_BRIDGE_PORT: "9876"
      CEPAF_BRIDGE_HOST: "0.0.0.0"
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh-router-1:7447
      OTEL_EXPORTER_OTLP_ENDPOINT: http://indrajaal-obs-prod:4317
      OTEL_SERVICE_NAME: cepaf-bridge
      DOTNET_RUNNING_IN_CONTAINER: "true"
      PODMAN_SOCKET: /run/podman/podman.sock
    volumes:
      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock:z
    ports:
      - "9876:9876"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f dotnet || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: cepaf-bridge
      environment: swarm-14
      wave: "3"
      priority: "P1"
      sil.level: "6"

  indrajaal-cortex:
    image: localhost/indrajaal-cortex:latest
    container_name: indrajaal-cortex
    hostname: indrajaal-cortex
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.60
    depends_on:
      cepaf-bridge:
        condition: service_healthy
    environment:
      CORTEX_PORT: "9877"
      CORTEX_HOST: "0.0.0.0"
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh-router-1:7447
      CEPAF_BRIDGE_URL: http://cepaf-bridge:9876
      OTEL_EXPORTER_OTLP_ENDPOINT: http://indrajaal-obs-prod:4317
      OTEL_SERVICE_NAME: indrajaal-cortex
      DOTNET_RUNNING_IN_CONTAINER: "true"
    ports:
      - "9877:9877"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f dotnet || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: cortex
      environment: swarm-14
      wave: "3"
      priority: "P1"
      sil.level: "6"

# =============================================================================
# WAVE 4: PRIMARY APPLICATION (172.30.0.10)
# =============================================================================

  indrajaal-ex-app-1:
    image: localhost/indrajaal-app-unified:nixos-devenv
    container_name: indrajaal-ex-app-1
    hostname: indrajaal-ex-app-1
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.10
      indrajaal-internal:
    depends_on:
      indrajaal-db-prod:
        condition: service_healthy
      indrajaal-obs-prod:
        condition: service_healthy
      cepaf-bridge:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:postgres@indrajaal-db-prod:5433/indrajaal_prod
      POSTGRES_HOST: indrajaal-db-prod
      POSTGRES_PORT: "5433"
      REDIS_EMBEDDED: "true"
      REDIS_URL: redis://localhost:6379
      PHX_HOST: localhost
      PHX_PORT: "4000"
      SECRET_KEY_BASE: production_equivalent_secret_key_base_64_chars_minimum_here_change_me
      FLAME_ENABLED: "true"
      CLUSTERING_ENABLED: "true"
      RELEASE_NODE: indrajaal@indrajaal-ex-app-1
      RELEASE_COOKIE: indrajaal_swarm_cookie
      PRAJNA_COCKPIT_ENABLED: "true"
      ZENOH_ENABLED: "true"
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh-router-1:7447
      OTEL_EXPORTER_OTLP_ENDPOINT: http://indrajaal-obs-prod:4317
      OTEL_SERVICE_NAME: indrajaal-ex-app-1
      SKIP_ZENOH_NIF: "0"
      SKIP_LINEAGE_NIF: "0"
      # Phase 7: PHICS integration
      PHICS_ENABLED: "true"
      PHICS_LATENCY_BUDGET_MS: "50"
    ports:
      - "4000:4000"
      - "4001:4001"
      - "6379:6379"
    volumes:
      - app1_swarm_data:/app/data:z
      # Phase 7: BEAM cache for faster restarts (SC-OPT-007)
      - beam_cache_app1:/app/_build:z
      - deps_cache_shared:/app/deps:z
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: application
      environment: swarm-14
      wave: "4"
      priority: "P0"
      sil.level: "6"
      phase7.beam_cache: "enabled"
      phase7.phics: "enabled"

# =============================================================================
# WAVE 5: HA REPLICAS + SATELLITES (172.30.0.11-15, 172.30.0.70-71)
# =============================================================================

  indrajaal-ex-app-2:
    image: localhost/indrajaal-app-unified:nixos-devenv
    container_name: indrajaal-ex-app-2
    hostname: indrajaal-ex-app-2
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.11
      indrajaal-internal:
    depends_on:
      indrajaal-ex-app-1:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:postgres@indrajaal-db-prod:5433/indrajaal_prod
      POSTGRES_HOST: indrajaal-db-prod
      POSTGRES_PORT: "5433"
      REDIS_EMBEDDED: "true"
      REDIS_URL: redis://localhost:6379
      PHX_HOST: localhost
      PHX_PORT: "4002"
      SECRET_KEY_BASE: production_equivalent_secret_key_base_64_chars_minimum_here_change_me
      CLUSTERING_ENABLED: "true"
      RELEASE_NODE: indrajaal@indrajaal-ex-app-2
      RELEASE_COOKIE: indrajaal_swarm_cookie
      ZENOH_ENABLED: "true"
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh-router-2:7447
      OTEL_EXPORTER_OTLP_ENDPOINT: http://indrajaal-obs-prod:4317
      OTEL_SERVICE_NAME: indrajaal-ex-app-2
      SKIP_ZENOH_NIF: "0"
      # Phase 7: PHICS integration
      PHICS_ENABLED: "true"
      PHICS_LATENCY_BUDGET_MS: "50"
    ports:
      - "4002:4002"
    volumes:
      - app2_swarm_data:/app/data:z
      # Phase 7: BEAM cache for faster restarts (SC-OPT-007)
      - beam_cache_app2:/app/_build:z
      - deps_cache_shared:/app/deps:z
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: application
      environment: swarm-14
      wave: "5"
      priority: "P1"
      sil.level: "6"
      phase7.beam_cache: "enabled"
      phase7.phics: "enabled"

  indrajaal-ex-app-3:
    image: localhost/indrajaal-app-unified:nixos-devenv
    container_name: indrajaal-ex-app-3
    hostname: indrajaal-ex-app-3
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.12
      indrajaal-internal:
    depends_on:
      indrajaal-ex-app-1:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:postgres@indrajaal-db-prod:5433/indrajaal_prod
      POSTGRES_HOST: indrajaal-db-prod
      POSTGRES_PORT: "5433"
      REDIS_EMBEDDED: "true"
      REDIS_URL: redis://localhost:6379
      PHX_HOST: localhost
      PHX_PORT: "4003"
      SECRET_KEY_BASE: production_equivalent_secret_key_base_64_chars_minimum_here_change_me
      CLUSTERING_ENABLED: "true"
      RELEASE_NODE: indrajaal@indrajaal-ex-app-3
      RELEASE_COOKIE: indrajaal_swarm_cookie
      ZENOH_ENABLED: "true"
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh-router-3:7447
      OTEL_EXPORTER_OTLP_ENDPOINT: http://indrajaal-obs-prod:4317
      OTEL_SERVICE_NAME: indrajaal-ex-app-3
      SKIP_ZENOH_NIF: "0"
      # Phase 7: PHICS integration
      PHICS_ENABLED: "true"
      PHICS_LATENCY_BUDGET_MS: "50"
    ports:
      - "4003:4003"
    volumes:
      - app3_swarm_data:/app/data:z
      # Phase 7: BEAM cache for faster restarts (SC-OPT-007)
      - beam_cache_app3:/app/_build:z
      - deps_cache_shared:/app/deps:z
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: application
      environment: swarm-14
      wave: "5"
      priority: "P2"
      sil.level: "6"
      phase7.beam_cache: "enabled"
      phase7.phics: "enabled"

  indrajaal-chaya:
    image: localhost/indrajaal-chaya:latest
    container_name: indrajaal-chaya
    hostname: indrajaal-chaya
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.15
    depends_on:
      indrajaal-ex-app-1:
        condition: service_healthy
    environment:
      CHAYA_PORT: "4010"
      CHAYA_HOST: "0.0.0.0"
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh-router-1:7447
      PARENT_APP_URL: http://indrajaal-ex-app-1:4000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://indrajaal-obs-prod:4317
      OTEL_SERVICE_NAME: indrajaal-chaya
    ports:
      - "4010:4010"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4010/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: digital-twin
      environment: swarm-14
      wave: "5"
      priority: "P1"
      sil.level: "6"

  ml-runner-1:
    image: localhost/indrajaal-ml-runner:latest
    container_name: ml-runner-1
    hostname: ml-runner-1
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.70
    depends_on:
      indrajaal-cortex:
        condition: service_healthy
    environment:
      ML_RUNNER_ID: runner-1
      ML_RUNNER_PORT: "9880"
      CORTEX_URL: http://indrajaal-cortex:9877
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh-router-1:7447
      OTEL_EXPORTER_OTLP_ENDPOINT: http://indrajaal-obs-prod:4317
      OTEL_SERVICE_NAME: ml-runner-1
    ports:
      - "9880:9880"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: ml-runner
      environment: swarm-14
      wave: "5"
      priority: "P2"
      sil.level: "6"

  ml-runner-2:
    image: localhost/indrajaal-ml-runner:latest
    container_name: ml-runner-2
    hostname: ml-runner-2
    networks:
      indrajaal-swarm-mesh:
        ipv4_address: 172.30.0.71
    depends_on:
      indrajaal-cortex:
        condition: service_healthy
    environment:
      ML_RUNNER_ID: runner-2
      ML_RUNNER_PORT: "9881"
      CORTEX_URL: http://indrajaal-cortex:9877
      ZENOH_ROUTER_ENDPOINT: tcp/zenoh-router-1:7447
      OTEL_EXPORTER_OTLP_ENDPOINT: http://indrajaal-obs-prod:4317
      OTEL_SERVICE_NAME: ml-runner-2
    ports:
      - "9881:9881"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    restart: unless-stopped
    labels:
      project: indrajaal
      component: ml-runner
      environment: swarm-14
      wave: "5"
      priority: "P2"
      sil.level: "6"

# =============================================================================
# VOLUMES
# Phase 7: Added BEAM cache volumes for faster restarts (SC-OPT-007)
# =============================================================================
volumes:
  # Database volumes
  db_swarm_data:

  # Observability volumes
  otel_swarm_data:
  prometheus_swarm_data:
  grafana_swarm_data:
  loki_swarm_data:

  # Application data volumes
  app1_swarm_data:
  app2_swarm_data:
  app3_swarm_data:

  # Phase 7: BEAM cache volumes (SC-OPT-007)
  # Caches compiled BEAM files for faster container restarts
  beam_cache_app1:
    name: beam_cache_app1
    labels:
      project: indrajaal
      purpose: beam-cache
      phase: "7"
  beam_cache_app2:
    name: beam_cache_app2
    labels:
      project: indrajaal
      purpose: beam-cache
      phase: "7"
  beam_cache_app3:
    name: beam_cache_app3
    labels:
      project: indrajaal
