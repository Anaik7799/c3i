# ═══════════════════════════════════════════════════════════════════════════════
# PROMETHEUS SCRAPE CONFIGURATION FOR STANDALONE DISTRIBUTED MODE
# ═══════════════════════════════════════════════════════════════════════════════
#
# P1.2: Comprehensive Prometheus configuration for monitoring the standalone
#       distributed cluster with all STAMP-compliant metrics.
#
# STAMP Compliance:
#   - SC-OBS-069: Dual logging (Terminal + SigNoz)
#   - SC-OBS-071: 4 OTEL modules integration
#   - SC-PRF-050: Response time < 50ms monitoring
#
# Mathematical Coverage:
#   ∀ container ∈ Cluster: Scraped(container) = true
#   ∀ metric ∈ {erlang, phoenix, ecto, oban, cluster}: Collected(metric) = true
#
# ═══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  # Labels applied to all time series
  external_labels:
    cluster: 'indrajaal-standalone'
    environment: 'development'
    framework: 'sopv511'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Recording rules
rule_files:
  - /etc/prometheus/rules/standalone-alerts.yml

# ═══════════════════════════════════════════════════════════════════════════════
# SCRAPE CONFIGURATIONS
# ═══════════════════════════════════════════════════════════════════════════════

scrape_configs:

  # ─────────────────────────────────────────────────────────────────────────────
  # PROMETHEUS SELF-MONITORING
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          layer: 'observability'

  # ─────────────────────────────────────────────────────────────────────────────
  # PHOENIX APPLICATION METRICS (Layer 3)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'indrajaal-app'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['indrajaal-ex-app-1:4000']
        labels:
          service: 'phoenix'
          layer: 'application'
          container: 'indrajaal-ex-app-1'

    # Add relabeling for better metric organization
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'

    metric_relabel_configs:
      # Group Phoenix metrics
      - source_labels: [__name__]
        regex: 'phoenix_(.*)'
        target_label: subsystem
        replacement: 'phoenix'

      # Group Ecto metrics
      - source_labels: [__name__]
        regex: 'ecto_(.*)'
        target_label: subsystem
        replacement: 'ecto'

      # Group Oban metrics
      - source_labels: [__name__]
        regex: 'oban_(.*)'
        target_label: subsystem
        replacement: 'oban'

  # ─────────────────────────────────────────────────────────────────────────────
  # ERLANG VM METRICS
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'erlang-vm'
    scrape_interval: 15s
    metrics_path: '/metrics/beam'
    static_configs:
      - targets: ['indrajaal-ex-app-1:4000']
        labels:
          service: 'beam'
          layer: 'runtime'

    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'erlang_(.*)'
        target_label: vm_metric
        replacement: '${1}'

  # ─────────────────────────────────────────────────────────────────────────────
  # CLUSTER DISTRIBUTION METRICS
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'cluster-distribution'
    scrape_interval: 30s
    metrics_path: '/metrics/cluster'
    static_configs:
      - targets: ['indrajaal-ex-app-1:4000']
        labels:
          service: 'cluster'
          layer: 'distribution'
          stamp: 'SC-CLU'

  # ─────────────────────────────────────────────────────────────────────────────
  # POSTGRESQL / TIMESCALEDB METRICS (Layer 0)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'postgresql'
    scrape_interval: 30s
    static_configs:
      - targets: ['indrajaal-db-standalone:9187']
        labels:
          service: 'postgresql'
          layer: 'database'
          container: 'indrajaal-db-standalone'

  # ─────────────────────────────────────────────────────────────────────────────
  # REDIS METRICS (Layer 1)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'redis'
    scrape_interval: 15s
    static_configs:
      - targets: ['indrajaal-redis-standalone:9121']
        labels:
          service: 'redis'
          layer: 'cache'
          container: 'indrajaal-redis-standalone'

  # ─────────────────────────────────────────────────────────────────────────────
  # OTEL COLLECTOR METRICS (Layer 2)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'otel-collector'
    scrape_interval: 30s
    static_configs:
      - targets: ['indrajaal-obs-standalone:8888']
        labels:
          service: 'otel-collector'
          layer: 'observability'
          stamp: 'SC-OBS-071'

  # ─────────────────────────────────────────────────────────────────────────────
  # SIGNOZ METRICS
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'signoz'
    scrape_interval: 30s
    static_configs:
      - targets: ['indrajaal-obs-standalone:3301']
        labels:
          service: 'signoz'
          layer: 'observability'
          stamp: 'SC-OBS-069'

  # ─────────────────────────────────────────────────────────────────────────────
  # GRAFANA METRICS
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'grafana'
    scrape_interval: 30s
    static_configs:
      - targets: ['indrajaal-obs-standalone:3000']
        labels:
          service: 'grafana'
          layer: 'observability'

  # ─────────────────────────────────────────────────────────────────────────────
  # CONTAINER METRICS (cAdvisor via Podman)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'containers'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.containers.internal:9323']
        labels:
          service: 'podman'
          layer: 'infrastructure'

  # ─────────────────────────────────────────────────────────────────────────────
  # NODE EXPORTER (Host Metrics)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.containers.internal:9100']
        labels:
          service: 'node'
          layer: 'infrastructure'

  # ─────────────────────────────────────────────────────────────────────────────
  # ZENOH ROUTER METRICS (P2.2)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'zenoh'
    scrape_interval: 30s
    static_configs:
      - targets: ['indrajaal-ex-app-1:7447']
        labels:
          service: 'zenoh'
          layer: 'messaging'
          stamp: 'SC-MSG'

  # ─────────────────────────────────────────────────────────────────────────────
  # TAILSCALE MESH METRICS (SC-CLU-005)
  # ─────────────────────────────────────────────────────────────────────────────
  - job_name: 'tailscale'
    scrape_interval: 60s
    metrics_path: '/metrics/tailscale'
    static_configs:
      - targets: ['indrajaal-ex-app-1:4000']
        labels:
          service: 'tailscale'
          layer: 'network'
          stamp: 'SC-CLU-005'

