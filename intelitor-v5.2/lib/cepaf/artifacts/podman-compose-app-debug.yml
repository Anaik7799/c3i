# podman-compose-app-debug.yml
# FULL VERBOSE DEBUG MODE - All Components
# SOPv5.11 + STAMP + TDG Compliance
# Date: 2024-12-24

version: '3.8'

networks:
  app-debug-net:
    driver: bridge
  db-standalone-net:
    external: true
    name: artifacts_db-standalone-net

services:
  indrajaal-ex-app-1:
    image: localhost/indrajaal-sopv51-elixir-app:nixos-25.05-devenv
    container_name: indrajaal-ex-app-1
    hostname: app-debug

    networks:
      - app-debug-net
      - db-standalone-net

    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -x
        export PS4='[DEBUG:$${LINENO}] '

        echo ""
        echo "╔══════════════════════════════════════════════════════════════════════╗"
        echo "║  INDRAJAAL APP CONTAINER - FULL VERBOSE DEBUG MODE                    ║"
        echo "║  SOPv5.11 + STAMP + TDG Compliance                                    ║"
        echo "╚══════════════════════════════════════════════════════════════════════╝"
        echo ""
        echo "[SYSTEM] Started at: $$(date '+%Y-%m-%d %H:%M:%S %Z')"
        echo "[SYSTEM] Hostname: $$(hostname)"
        echo "[SYSTEM] User: $$(whoami)"
        echo "[SYSTEM] Working Directory: $$(pwd)"
        echo "[SYSTEM] Elixir Version: $$(elixir --version 2>&1 | head -2)"
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ ENVIRONMENT VARIABLES (DEBUG)                                       ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        echo "[ENV] MIX_ENV=$$MIX_ENV"
        echo "[ENV] MIX_DEBUG=$$MIX_DEBUG"
        echo "[ENV] LOGGER_LEVEL=$$LOGGER_LEVEL"
        echo "[ENV] ECTO_DEBUG=$$ECTO_DEBUG"
        echo "[ENV] NO_TIMEOUT=$$NO_TIMEOUT"
        echo "[ENV] PATIENT_MODE=$$PATIENT_MODE"
        echo "[ENV] DATABASE_URL=$$DATABASE_URL"
        echo "[ENV] CEPAF_DEBUG=$$CEPAF_DEBUG"
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ PHASE 2.1: HEX INSTALLATION                                         ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        echo "[P2.1] Started at: $$(date '+%H:%M:%S')"
        mix local.hex --force --if-missing 2>&1 | while IFS= read -r line; do
            echo "[P2.1:HEX] $$line"
        done
        echo "[P2.1] Completed at: $$(date '+%H:%M:%S')"
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ PHASE 2.2: REBAR INSTALLATION                                       ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        echo "[P2.2] Started at: $$(date '+%H:%M:%S')"
        mix local.rebar --force --if-missing 2>&1 | while IFS= read -r line; do
            echo "[P2.2:REBAR] $$line"
        done
        echo "[P2.2] Completed at: $$(date '+%H:%M:%S')"
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ PHASE 3.1: DATABASE CONNECTIVITY                                    ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        echo "[P3.1] Started at: $$(date '+%H:%M:%S')"
        echo "[P3.1] Target: indrajaal-db-test:5433"
        ATTEMPT=1
        MAX_ATTEMPTS=60
        while [ $$ATTEMPT -le $$MAX_ATTEMPTS ]; do
            echo "[P3.1] Attempt $$ATTEMPT/$$MAX_ATTEMPTS at $$(date '+%H:%M:%S')..."
            if pg_isready -h indrajaal-db-test -p 5433 -U postgres 2>&1; then
                echo "[P3.1] ✓ Database is READY"
                break
            fi
            echo "[P3.1] Database not ready, waiting 2s..."
            sleep 2
            ATTEMPT=$$((ATTEMPT + 1))
        done
        if [ $$ATTEMPT -gt $$MAX_ATTEMPTS ]; then
            echo "[P3.1] ✗ FATAL: Database connection timeout after $$MAX_ATTEMPTS attempts"
            exit 1
        fi
        echo "[P3.1] Completed at: $$(date '+%H:%M:%S')"
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ PHASE 2.3: DEPENDENCIES FETCH                                       ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        echo "[P2.3] Started at: $$(date '+%H:%M:%S')"
        cd /workspace
        echo "[P2.3] Working directory: $$(pwd)"
        echo "[P2.3] mix.exs exists: $$(test -f mix.exs && echo 'YES' || echo 'NO')"
        echo "[P2.3] mix.lock exists: $$(test -f mix.lock && echo 'YES' || echo 'NO')"
        mix deps.get --only test 2>&1 | while IFS= read -r line; do
            echo "[P2.3:DEPS.GET] $$line"
        done
        echo "[P2.3] Dependencies count: $$(ls deps/ 2>/dev/null | wc -l)"
        echo "[P2.3] Completed at: $$(date '+%H:%M:%S')"
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ PHASE 2.4: DEPENDENCIES COMPILE                                     ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        echo "[P2.4] Started at: $$(date '+%H:%M:%S')"
        START_P24=$$(date +%s)
        mix deps.compile 2>&1 | while IFS= read -r line; do
            ELAPSED=$$((($$(date +%s) - START_P24)))
            echo "[P2.4:DEPS.COMPILE +$${ELAPSED}s] $$line"
        done
        echo "[P2.4] Compiled libs: $$(ls _build/test/lib/ 2>/dev/null | wc -l)"
        echo "[P2.4] Completed at: $$(date '+%H:%M:%S')"
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ PHASE 3.2: DATABASE CREATION                                        ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        echo "[P3.2] Started at: $$(date '+%H:%M:%S')"
        mix ecto.create 2>&1 | while IFS= read -r line; do
            echo "[P3.2:ECTO.CREATE] $$line"
        done || echo "[P3.2] Database may already exist"
        echo "[P3.2] Completed at: $$(date '+%H:%M:%S')"
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ PHASE 3.3: DATABASE MIGRATIONS                                      ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        echo "[P3.3] Started at: $$(date '+%H:%M:%S')"
        echo "[P3.3] Migration files: $$(ls priv/repo/migrations/*.exs 2>/dev/null | wc -l)"
        mix ecto.migrate 2>&1 | while IFS= read -r line; do
            echo "[P3.3:ECTO.MIGRATE] $$line"
        done || echo "[P3.3] Migrations may already be run"
        echo "[P3.3] Completed at: $$(date '+%H:%M:%S')"
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ PHASE 4.1: APPLICATION COMPILE (PATIENT MODE)                       ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        echo "[P4.1] Started at: $$(date '+%H:%M:%S')"
        echo "[P4.1] Source files: $$(find lib -name '*.ex' 2>/dev/null | wc -l)"
        echo "[P4.1] Patient Mode: $$PATIENT_MODE"
        echo "[P4.1] No Timeout: $$NO_TIMEOUT"
        START_P41=$$(date +%s)
        mix compile 2>&1 | tee /var/log/claude/compile.log | while IFS= read -r line; do
            ELAPSED=$$((($$(date +%s) - START_P41)))
            echo "[P4.1:COMPILE +$${ELAPSED}s] $$line"
        done
        END_P41=$$(date +%s)
        DURATION_P41=$$((END_P41 - START_P41))
        echo "[P4.1] Compilation duration: $${DURATION_P41} seconds"
        echo "[P4.1] Warnings: $$(grep -c 'warning:' /var/log/claude/compile.log 2>/dev/null || echo 0)"
        echo "[P4.1] Errors: $$(grep -c 'error:' /var/log/claude/compile.log 2>/dev/null || echo 0)"
        echo "[P4.1] Completed at: $$(date '+%H:%M:%S')"
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ PHASE 4.4: WARNING ANALYSIS (SC-CMP-025)                            ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        WARN_COUNT=$$(grep -c 'warning:' /var/log/claude/compile.log 2>/dev/null || echo 0)
        echo "[P4.4] Total warnings: $$WARN_COUNT"
        if [ "$$WARN_COUNT" -gt 0 ]; then
            echo "[P4.4] ⚠️  SC-CMP-025 CHECK: $$WARN_COUNT warnings detected"
            echo "[P4.4] First 10 warnings:"
            grep 'warning:' /var/log/claude/compile.log 2>/dev/null | head -10 | while IFS= read -r line; do
                echo "[P4.4:WARN] $$line"
            done
        else
            echo "[P4.4] ✓ SC-CMP-025 COMPLIANT: Zero warnings"
        fi
        echo ""

        echo "┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓"
        echo "┃ PHASE 5.1: PHOENIX SERVER START                                     ┃"
        echo "┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛"
        echo "[P5.1] Started at: $$(date '+%H:%M:%S')"
        echo "[P5.1] PHX_HOST: $$PHX_HOST"
        echo "[P5.1] PHX_PORT: $$PHX_PORT"
        echo "[P5.1] LOGGER_LEVEL: $$LOGGER_LEVEL"
        echo "[P5.1] Starting Phoenix server..."
        echo ""

        exec mix phx.server 2>&1 | while IFS= read -r line; do
            echo "[P5.1:PHOENIX] $$line"
        done

    environment:
      # ═══════════════════════════════════════════════════════════════
      # ELIXIR/ERLANG DEBUG SETTINGS
      # ═══════════════════════════════════════════════════════════════
      ELIXIR_ERL_OPTIONS: "+S 10:10 +fnu +W w"
      ERL_CRASH_DUMP: /var/log/claude/erl_crash.dump
      ERL_CRASH_DUMP_SECONDS: "60"

      # ═══════════════════════════════════════════════════════════════
      # MIX DEBUG SETTINGS
      # ═══════════════════════════════════════════════════════════════
      MIX_DEBUG: "1"
      MIX_ENV: test
      MIX_BUILD_ROOT: /workspace/_build
      ELIXIR_EDITOR: cat

      # ═══════════════════════════════════════════════════════════════
      # LOGGER DEBUG SETTINGS
      # ═══════════════════════════════════════════════════════════════
      LOGGER_LEVEL: debug
      LOG_LEVEL: debug
      LOGGER_TRUNCATE: "infinity"

      # ═══════════════════════════════════════════════════════════════
      # PHOENIX DEBUG SETTINGS
      # ═══════════════════════════════════════════════════════════════
      PHX_HOST: 0.0.0.0
      PHX_PORT: 4000
      PHX_SERVER: "true"
      DEBUG_ERRORS: "true"
      SECRET_KEY_BASE: debug-secret-key-base-minimum-64-characters-required-for-phoenix-security

      # ═══════════════════════════════════════════════════════════════
      # DATABASE DEBUG SETTINGS
      # ═══════════════════════════════════════════════════════════════
      DATABASE_URL: ecto://postgres:postgres@indrajaal-db-test:5433/indrajaal_test
      ECTO_DEBUG: "true"
      DB_HOST: indrajaal-db-test
      PGPORT: "5433"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

      # ═══════════════════════════════════════════════════════════════
      # PATIENT MODE (MANDATORY - SC-VAL-001)
      # ═══════════════════════════════════════════════════════════════
      NO_TIMEOUT: "true"
      PATIENT_MODE: "enabled"
      INFINITE_PATIENCE: "true"

      # ═══════════════════════════════════════════════════════════════
      # OTEL/TELEMETRY DEBUG SETTINGS
      # ═══════════════════════════════════════════════════════════════
      OTEL_LOG_LEVEL: debug
      OTEL_TRACES_EXPORTER: console
      OTEL_METRICS_EXPORTER: console
      OTEL_RESOURCE_ATTRIBUTES: service.name=indrajaal-ex-app-1

      # ═══════════════════════════════════════════════════════════════
      # CEPAF DEBUG SETTINGS
      # ═══════════════════════════════════════════════════════════════
      CEPAF_DEBUG: "1"
      CEPAF_VERBOSE: "1"
      CEPAF_TRACE: "1"
      CEPAF_LOG_LEVEL: trace

      # ═══════════════════════════════════════════════════════════════
      # CONTAINER DEBUG SETTINGS
      # ═══════════════════════════════════════════════════════════════
      CONTAINER_DEBUG: "true"
      CONTAINER_VERBOSE: "true"
      SOPV51_DEBUG: "true"

    ports:
      - "4000:4000"   # HTTP API
      - "4001:4001"   # LiveDashboard
      - "9568:9568"   # Prometheus metrics

    volumes:
      - /home/an/dev/ver/indrajaal-v5.2:/workspace:z
      - type: tmpfs
        target: /var/log/claude

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 600s  # 10 minutes for Patient Mode debug

    restart: "no"

    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '8'
        reservations:
          memory: 4G
          cpus: '4'

    labels:
      project: indrajaal
      component: app
      environment: debug
      mode: verbose
      stamp.verified: "pending"
      stamp.constraints: "SC-CNT-009,SC-CMP-025,SC-VAL-001"
      tdg.compliant: "true"
      sopv51.mode: debug
      patient.mode: enabled
      debug.level: "5"
