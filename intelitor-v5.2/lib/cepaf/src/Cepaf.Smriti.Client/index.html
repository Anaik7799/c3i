<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Z-KMS - Zettelkasten Knowledge Management</title>
    <style>
      /* Reset and base styles */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f3f4f6;
      }

      #root {
        min-height: 100vh;
      }

      /* Spinner animation */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Loading state */
      .loading-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        flex-direction: column;
        gap: 1rem;
      }

      .loading-spinner {
        width: 3rem;
        height: 3rem;
        border: 3px solid #e5e7eb;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loading-text {
        color: #6b7280;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading state while JS loads -->
      <div class="loading-container">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading Z-KMS...</p>
      </div>
    </div>
    <script type="module" src="./build/src/Main.fs.js"></script>
  </body>
</html>
