# Cepaf.Podman Release Pipeline
# Creates GitHub releases and publishes NuGet packages
name: Cepaf.Podman Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            # Extract version from tag (remove 'v' prefix)
            VERSION="${GITHUB_REF#refs/tags/v}"
            # Check if it's a prerelease (contains alpha, beta, rc, preview)
            if [[ "$VERSION" =~ (alpha|beta|rc|preview) ]]; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION (prerelease: $IS_PRERELEASE)"

  build-release:
    name: Build Release Artifacts
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.fsproj', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Cepaf.sln

      - name: Build Release
        run: |
          dotnet build Cepaf.sln \
            --configuration Release \
            --no-restore \
            /p:Version=${{ needs.validate.outputs.version }}

      - name: Run tests
        run: |
          dotnet test Cepaf.sln \
            --configuration Release \
            --no-build \
            --verbosity normal

      - name: Pack Cepaf.Podman
        run: |
          dotnet pack src/Cepaf.Podman/Cepaf.Podman.fsproj \
            --configuration Release \
            --no-build \
            --output ./artifacts/packages \
            /p:PackageVersion=${{ needs.validate.outputs.version }}

      - name: Build CLI tool (self-contained)
        run: |
          dotnet publish tools/Cepaf.Podman.Cli/Cepaf.Podman.Cli.fsproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output ./artifacts/cli/linux-x64 \
            /p:PublishSingleFile=true \
            /p:Version=${{ needs.validate.outputs.version }}

      - name: Create CLI archive
        run: |
          cd ./artifacts/cli
          tar -czvf ../cepaf-cli-linux-x64-${{ needs.validate.outputs.version }}.tar.gz linux-x64/

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: release-nuget-packages
          path: |
            ./artifacts/packages/*.nupkg
            ./artifacts/packages/*.snupkg
          retention-days: 90

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-cli-artifacts
          path: ./artifacts/*.tar.gz
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: [validate, build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-nuget-packages
          path: ./packages

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-cli-artifacts
          path: ./cli

      - name: Generate release notes
        id: notes
        run: |
          cat << 'EOF' > release-notes.md
          ## Cepaf.Podman v${{ needs.validate.outputs.version }}

          ### Installation

          **NuGet Package:**
          ```bash
          dotnet add package Cepaf.Podman --version ${{ needs.validate.outputs.version }}
          ```

          **CLI Tool:**
          Download the appropriate archive for your platform from the assets below.

          ### Included Packages
          - `Cepaf.Podman` - F# Podman client library with STAMP safety constraints
          - `cepaf-cli` - Command-line interface for Podman operations

          ### Features
          - Type-safe container lifecycle management
          - STAMP safety constraint validation
          - Unix socket and HTTP API support
          - Compose file parsing
          - Event streaming with System.Reactive
          - Health probes

          ### Requirements
          - .NET 8.0 or later
          - Podman 4.0+ (for runtime operations)

          ---
          *Full changelog: https://github.com/indrajaal/cepaf/compare/v${{ needs.validate.outputs.version }}...HEAD*
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cepaf.Podman v${{ needs.validate.outputs.version }}
          tag_name: v${{ needs.validate.outputs.version }}
          body_path: release-notes.md
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          draft: false
          files: |
            ./packages/*.nupkg
            ./packages/*.snupkg
            ./cli/*.tar.gz
          generate_release_notes: true

  publish-nuget:
    name: Publish to NuGet.org
    needs: [validate, build-release, create-release]
    runs-on: ubuntu-latest
    if: needs.validate.outputs.is_prerelease == 'false'
    environment: nuget-production

    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-nuget-packages
          path: ./packages

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish to NuGet.org
        run: |
          echo "Publishing to NuGet.org..."
          # Uncomment when ready to publish:
          # dotnet nuget push ./packages/*.nupkg \
          #   --api-key ${{ secrets.NUGET_API_KEY }} \
          #   --source https://api.nuget.org/v3/index.json \
          #   --skip-duplicate
          echo "Note: NuGet publishing is configured but requires NUGET_API_KEY secret"
          echo "Packages ready for manual upload:"
          ls -la ./packages/
