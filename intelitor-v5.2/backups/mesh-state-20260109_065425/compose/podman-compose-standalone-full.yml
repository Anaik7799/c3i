# podman-compose-standalone-full.yml
# Purpose: Full standalone environment for CEPAF and Cockpit testing
# WHAT: Complete containerized test environment with DB, App, and Observability
# WHY: Enable end-to-end testing of CEPAF F# and Prajna Cockpit
# CONSTRAINTS: Requires rootless Podman 5.4.1+, NixOS images
# SOPv5.11 Compliance: SC-CNT-009, SC-CNT-010, SC-CNT-012, SC-CNT-013

version: '3.8'

networks:
  standalone-net:
    driver: bridge

services:
  # =============================================================================
  # DATABASE SERVICE (TimescaleDB/PostgreSQL)
  # =============================================================================
  indrajaal-db-standalone:
    image: localhost/indrajaal-timescaledb-demo:nixos-devenv
    container_name: indrajaal-db-standalone
    hostname: db-standalone
    networks:
      - standalone-net
    environment:
      POSTGRES_DB: indrajaal_standalone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGPORT: 5433
      TS_TUNE_MEMORY: 2GB
      TS_TUNE_NUM_CPUS: 2
      PHICS_ENABLED: "true"
      NO_TIMEOUT: "true"
      CONTAINER_OS: nixos
      SOPV51_COMPLIANT: "true"
    ports:
      - "5433:5433"
    volumes:
      - db_standalone_data:/var/lib/postgresql/data:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indrajaal_standalone -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: "no"
    labels:
      project: indrajaal
      component: database
      environment: standalone
      stamp.verified: "true"

  # =============================================================================
  # OBSERVABILITY SERVICE (OTEL Collector)
  # =============================================================================
  indrajaal-obs-standalone:
    image: localhost/indrajaal-otel-collector:nixos-devenv
    container_name: indrajaal-obs-standalone
    hostname: obs-standalone
    networks:
      - standalone-net
    depends_on:
      indrajaal-db-standalone:
        condition: service_healthy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
      OTEL_SERVICE_NAME: indrajaal-standalone
      LOG_LEVEL: info
      FRACTAL_LOGGING_ENABLED: "true"
      ZENOH_ENABLED: "false"
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - obs_standalone_data:/var/log/otel:z
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: "no"
    labels:
      project: indrajaal
      component: observability
      environment: standalone
      stamp.verified: "true"

  # =============================================================================
  # PROMETHEUS (Metrics Collection)
  # =============================================================================
  indrajaal-prometheus-standalone:
    image: localhost/indrajaal-prometheus:nixos-devenv
    container_name: indrajaal-prometheus-standalone
    hostname: prometheus-standalone
    networks:
      - standalone-net
    depends_on:
      - indrajaal-obs-standalone
    environment:
      PROMETHEUS_CONFIG: /etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - prometheus_standalone_data:/prometheus:z
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: "no"
    labels:
      project: indrajaal
      component: metrics
      environment: standalone

  # =============================================================================
  # GRAFANA (Visualization Dashboard)
  # =============================================================================
  indrajaal-grafana-standalone:
    image: localhost/indrajaal-grafana:nixos-devenv
    container_name: indrajaal-grafana-standalone
    hostname: grafana-standalone
    networks:
      - standalone-net
    depends_on:
      - indrajaal-prometheus-standalone
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: indrajaal
      GF_SERVER_HTTP_PORT: 3000
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_standalone_data:/var/lib/grafana:z
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: "no"
    labels:
      project: indrajaal
      component: dashboard
      environment: standalone

volumes:
  db_standalone_data:
  obs_standalone_data:
  prometheus_standalone_data:
  grafana_standalone_data:

# =============================================================================
# Usage Instructions
# =============================================================================
#
# Start Full Stack:
#   podman-compose -f podman-compose-standalone-full.yml up -d
#
# Wait for All Services:
#   podman-compose -f podman-compose-standalone-full.yml ps
#
# Start Phoenix App (from host):
#   source .env.standalone
#   MIX_ENV=dev mix phx.server
#
# Run CEPAF Tests:
#   ./scripts/testing/cepaf_remote_test.sh --full
#
# Start Cockpit:
#   ./scripts/testing/cockpit_manual_test.sh --start
#
# Access Points:
#   - Phoenix App:    http://localhost:4001
#   - Prajna Cockpit: http://localhost:4001/prajna
#   - Grafana:        http://localhost:3000 (admin/indrajaal)
#   - Prometheus:     http://localhost:9090
#
# Cleanup:
#   podman-compose -f podman-compose-standalone-full.yml down -v
# =============================================================================
