# DevEnv YAML Configuration
# Project: Indrajaal Security Monitoring System
# Framework: AEE SOPv5.11 + NixOS + Podman

name: indrajaal-demo

allowUnfree: true

# Import the main Nix configuration
imports:
  - ./devenv.nix

# Additional inputs for specialized packages
inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/nixos-unstable
  systems:
    url: github:nix-systems/default
  browser-previews:
    url: github:nix-community/browser-previews

# Environment configuration
env:
  # AEE SOPv5.11 Framework
  AEE_MODE: "enabled"
  SOPV511_ENABLED: "true"
  CYBERNETIC_EXECUTION: "true"
  
  # Patient Mode
  NO_TIMEOUT: "true"
  PATIENT_MODE: "enabled"
  INFINITE_PATIENCE: "true"
  
  # Container Configuration
  CONTAINER_ONLY: "true"
  PODMAN_REQUIRED: "true"
  NIXOS_ONLY: "true"
  PHICS_ENABLED: "true"
  
  # Multi-Agent Architecture
  AGENT_COORDINATION: "true"
  SUPERVISOR_AGENTS: "1"
  HELPER_AGENTS: "4"
  WORKER_AGENTS: "6"
  
  # Methodology Frameworks
  TPS_INTEGRATION: "true"
  STAMP_VALIDATION: "true"
  TDG_COMPLIANCE: "true"
  GDE_FRAMEWORK: "true"
  FPPS_ENABLED: "true"
  
  # Performance
  ELIXIR_ERL_OPTIONS: "+S 16 +A 32"

# Automatic setup on shell entry
enterShell: |
  echo "🚀 Indrajaal Development Environment"
  echo "===================================="
  echo "Framework: AEE SOPv5.11 + NixOS + Podman"
  echo "Elixir: 1.19 | Erlang: 28 | PostgreSQL: 17 | Mojo: Enabled"
  echo ""
  echo "Available commands:"
  echo "  mix deps.get       - Install dependencies"
  echo "  mix compile        - Compile project"
  echo "  mix phx.server     - Start Phoenix server"
  echo "  mix test           - Run tests"
  echo "  mix qa-all         - Run all quality checks"
  echo "  podman ps          - List containers"
  echo ""
  echo "Patient mode compilation:"
  echo "  NO_TIMEOUT=true PATIENT_MODE=enabled mix compile --verbose"
  echo ""
  
  # Set up Elixir
  mix local.hex --force
  mix local.rebar --force
  
  # Ensure PostgreSQL is running
  if [ -S "$PGDATA/postmaster.pid" ]; then
    echo "✅ PostgreSQL is running on port 5433"
  else
    echo "⚠️  PostgreSQL is not running. Starting..."
    pg_ctl start
  fi
  
  # Check for MinIO
  if pgrep -x "minio" > /dev/null; then
    echo "✅ MinIO is running on port 9000"
  else
    echo "⚠️  MinIO is not running. Run: devenv up"
  fi
  
  echo ""
  echo "Ready for development!"